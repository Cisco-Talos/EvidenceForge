name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests without coverage
        if: matrix.python-version != '3.12' || github.event_name != 'pull_request' || github.base_ref != 'main'
        run: uv run pytest --no-cov

      - name: Run release coverage gate
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request' && github.base_ref == 'main'
        run: uv run pytest --cov=evidenceforge --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request' && github.base_ref == 'main'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  ci-required:
    name: Required CI
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: always()

    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint finished with result: ${{ needs.lint.result }}"
            exit 1
          fi

          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "Tests finished with result: ${{ needs.tests.result }}"
            exit 1
          fi
