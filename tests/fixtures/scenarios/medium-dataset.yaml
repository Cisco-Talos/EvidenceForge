personas:
  - name: executive
    description: "C-level and senior management"
    typical_activities: ["email", "web browsing", "document review"]
    work_hours: "8am-6pm (lunch 12pm-1pm)"
    application_usage: ["Outlook", "Chrome", "Word"]
    risk_profile: "low"

  - name: developer
    description: "Software engineers and DevOps"
    typical_activities: ["coding", "building", "git operations"]
    work_hours: "9am-6pm (lunch 12pm-1pm)"
    application_usage: ["VS Code", "Terminal", "Chrome"]
    risk_profile: "high"

  - name: analyst
    description: "Business and data analysts"
    typical_activities: ["database queries", "report generation", "data analysis"]
    work_hours: "8am-5pm (lunch 12pm-1pm)"
    application_usage: ["Excel", "SQL Client", "Chrome"]
    risk_profile: "medium"

time_window:
  start: "2024-06-15T06:00:00Z"
  duration: "8h"

baseline_activity:
  description: "Normal weekday office activity"
  intensity: medium
  variation: medium

output:
  logs:
    - {format: windows_event_security}
    - {format: zeek_conn}
    - {format: ecar}
    - {format: syslog}
    - {format: bash_history}
  destination: ./output
