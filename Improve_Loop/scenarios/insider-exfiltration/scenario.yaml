time_window:
  start: "2024-03-13T11:00:00Z"
  duration: "72h"

baseline_activity:
  description: >
    Normal business operations at a financial services firm during a typical
    mid-week period (Wednesday through Friday). Trading desk is active during
    market hours, analysts run database queries, sales team accesses CRM,
    IT performs routine administration. High intensity reflects the large
    user population generating constant background activity.
  intensity: high
  variation: medium

storyline:
  # ========================================================================
  # DAY 1 — WEDNESDAY: Reconnaissance and initial data collection
  # Diego begins accessing file shares and databases outside his normal scope.
  # His normal work involves querying SRV-DB-02 (reporting database) and
  # accessing \\SRV-FILE-02\AnalyticsReports. Today he starts exploring
  # client data on servers he doesn't normally touch.
  # ========================================================================

  - time: "+7h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Browses investment research file share normally accessed only by the trading team"
    details:
      process_name: "C:\\Windows\\explorer.exe"
      dst_ip: "10.10.100.12"
      dst_port: 445
      service: "smb"
      network_path: "\\\\SRV-FILE-01\\InvestmentResearch"
      technique: "T1083 - File and Directory Discovery"

  - time: "+7h25m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Navigates to restricted client portfolios share on the primary file server"
    details:
      process_name: "C:\\Windows\\explorer.exe"
      dst_ip: "10.10.100.12"
      dst_port: 445
      service: "smb"
      network_path: "\\\\SRV-FILE-01\\ClientPortfolios"
      technique: "T1039 - Data from Network Shared Drive"

  - time: "+8h15m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Opens SQL Server Management Studio and queries client account tables on the production database server — normally uses only SRV-DB-02 for reporting"
    details:
      process_name: "C:\\Program Files (x86)\\Microsoft SQL Server Management Studio 18\\Common7\\IDE\\Ssms.exe"
      command_line: "Ssms.exe"
      dst_ip: "10.10.100.14"
      dst_port: 1433
      service: "mssql"
      sql_query: "SELECT TOP 1000 AccountID, ClientName, AccountType, PortfolioValue, AdvisorName FROM ClientDB.dbo.ClientAccounts ORDER BY PortfolioValue DESC"
      technique: "T1213 - Data from Information Repositories"

  - time: "+9h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Copies client portfolio documents from file share to local staging directory"
    details:
      process_name: "C:\\Windows\\System32\\robocopy.exe"
      command_line: "robocopy.exe \\\\SRV-FILE-01\\ClientPortfolios\\HighNetWorth C:\\Users\\diego.ramirez\\Documents\\ProjectData\\portfolios /E /R:1 /W:1"
      dst_ip: "10.10.100.12"
      dst_port: 445
      service: "smb"
      technique: "T1039 - Data from Network Shared Drive"

  - time: "+10h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "After most staff have left for the day, accesses trading records share on the departmental file server"
    details:
      process_name: "C:\\Windows\\explorer.exe"
      dst_ip: "10.10.100.13"
      dst_port: 445
      service: "smb"
      network_path: "\\\\SRV-FILE-02\\TradingRecords"
      technique: "T1039 - Data from Network Shared Drive"

  - time: "+11h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Copies trading strategy documents to local staging directory"
    details:
      process_name: "C:\\Windows\\System32\\robocopy.exe"
      command_line: "robocopy.exe \\\\SRV-FILE-02\\TradingRecords\\Strategies C:\\Users\\diego.ramirez\\Documents\\ProjectData\\trading /E /R:1 /W:1"
      dst_ip: "10.10.100.13"
      dst_port: 445
      service: "smb"
      technique: "T1074.001 - Data Staged: Local Data Staging"

  # ========================================================================
  # DAY 2 — THURSDAY: Bulk data collection and staging
  # Diego escalates — accessing compliance reports with client PII, running
  # bulk database exports, and accessing the CRM. He stages and compresses
  # everything on his local workstation.
  # ========================================================================

  - time: "+28h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Accesses compliance reports share containing client due diligence files with PII"
    details:
      process_name: "C:\\Windows\\explorer.exe"
      dst_ip: "10.10.100.13"
      dst_port: 445
      service: "smb"
      network_path: "\\\\SRV-FILE-02\\ComplianceReports\\ClientDueDiligence"
      technique: "T1039 - Data from Network Shared Drive"

  - time: "+28h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Copies compliance due diligence files to local staging directory"
    details:
      process_name: "C:\\Windows\\System32\\robocopy.exe"
      command_line: "robocopy.exe \\\\SRV-FILE-02\\ComplianceReports\\ClientDueDiligence C:\\Users\\diego.ramirez\\Documents\\ProjectData\\compliance /E /R:1 /W:1"
      dst_ip: "10.10.100.13"
      dst_port: 445
      service: "smb"
      technique: "T1074.001 - Data Staged: Local Data Staging"

  - time: "+30h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Runs bulk database export using BCP utility to extract full client account records to CSV"
    details:
      process_name: "C:\\Program Files\\Microsoft SQL Server\\Client SDK\\ODBC\\170\\Tools\\Binn\\bcp.exe"
      command_line: "bcp.exe \"SELECT AccountID, ClientName, SSN, DateOfBirth, Address, Phone, Email, AccountType, PortfolioValue, AdvisorName, OpenDate FROM ClientDB.dbo.ClientAccounts\" queryout \"C:\\Users\\diego.ramirez\\Documents\\ProjectData\\client_accounts_full.csv\" -S SRV-DB-01 -T -c -t\",\""
      dst_ip: "10.10.100.14"
      dst_port: 1433
      service: "mssql"
      technique: "T1213 - Data from Information Repositories"

  - time: "+30h45m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Exports portfolio holdings data from production database"
    details:
      process_name: "C:\\Program Files\\Microsoft SQL Server\\Client SDK\\ODBC\\170\\Tools\\Binn\\bcp.exe"
      command_line: "bcp.exe \"SELECT h.HoldingID, a.ClientName, h.SecurityName, h.Ticker, h.Shares, h.MarketValue, h.CostBasis, h.PurchaseDate FROM ClientDB.dbo.PortfolioHoldings h JOIN ClientDB.dbo.ClientAccounts a ON h.AccountID = a.AccountID\" queryout \"C:\\Users\\diego.ramirez\\Documents\\ProjectData\\portfolio_holdings.csv\" -S SRV-DB-01 -T -c -t\",\""
      dst_ip: "10.10.100.14"
      dst_port: 1433
      service: "mssql"
      technique: "T1213 - Data from Information Repositories"

  - time: "+31h15m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Accesses CRM web application and exports client contact list"
    details:
      process_name: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
      dst_ip: "10.10.100.17"
      dst_port: 443
      service: "https"
      url_path: "/crm/export/contacts?format=csv&filter=all"
      technique: "T1213.002 - Data from Information Repositories: Sharepoint"

  - time: "+33h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Compresses collected portfolio and trading data into a password-protected ZIP archive"
    details:
      process_name: "C:\\Program Files\\7-Zip\\7z.exe"
      command_line: "7z.exe a -tzip -pQ1FiscalReview2024 C:\\Users\\diego.ramirez\\Documents\\ProjectData\\fiscal_review_q1.zip C:\\Users\\diego.ramirez\\Documents\\ProjectData\\portfolios\\* C:\\Users\\diego.ramirez\\Documents\\ProjectData\\trading\\*"
      technique: "T1560.001 - Archive Collected Data: Archive via Utility"

  - time: "+34h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Creates second encrypted archive containing client PII exports and compliance documents"
    details:
      process_name: "C:\\Program Files\\7-Zip\\7z.exe"
      command_line: "7z.exe a -tzip -pQ1FiscalReview2024 C:\\Users\\diego.ramirez\\Documents\\ProjectData\\client_data_q1.zip C:\\Users\\diego.ramirez\\Documents\\ProjectData\\client_accounts_full.csv C:\\Users\\diego.ramirez\\Documents\\ProjectData\\portfolio_holdings.csv C:\\Users\\diego.ramirez\\Documents\\ProjectData\\compliance\\*"
      technique: "T1560.001 - Archive Collected Data: Archive via Utility"

  # ========================================================================
  # DAY 3 — FRIDAY: Exfiltration and cleanup
  # Diego grabs final files, uploads everything to a personal pCloud account,
  # then cleans up traces on his workstation before logging off for the
  # weekend (and likely his last week at the company).
  # ========================================================================

  - time: "+50h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Final collection — accesses remaining client portfolio documents from file share"
    details:
      process_name: "C:\\Windows\\System32\\robocopy.exe"
      command_line: "robocopy.exe \\\\SRV-FILE-01\\ClientPortfolios\\Institutional C:\\Users\\diego.ramirez\\Documents\\ProjectData\\institutional /E /R:1 /W:1"
      dst_ip: "10.10.100.12"
      dst_port: 445
      service: "smb"
      technique: "T1039 - Data from Network Shared Drive"

  - time: "+50h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Compresses final batch of institutional client data"
    details:
      process_name: "C:\\Program Files\\7-Zip\\7z.exe"
      command_line: "7z.exe a -tzip -pQ1FiscalReview2024 C:\\Users\\diego.ramirez\\Documents\\ProjectData\\institutional_q1.zip C:\\Users\\diego.ramirez\\Documents\\ProjectData\\institutional\\*"
      technique: "T1560.001 - Archive Collected Data: Archive via Utility"

  - time: "+52h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Begins uploading first archive to personal pCloud account via web browser"
    details:
      process_name: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
      dst_ip: "185.26.156.40"
      dst_port: 443
      service: "https"
      domain: "api.pcloud.com"
      bytes_out: 157286400
      technique: "T1567.002 - Exfiltration Over Web Service: Exfiltration to Cloud Storage"

  - time: "+53h"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Uploads second archive containing client PII data to pCloud"
    details:
      process_name: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
      dst_ip: "185.26.156.40"
      dst_port: 443
      service: "https"
      domain: "api.pcloud.com"
      bytes_out: 234881024
      technique: "T1567.002 - Exfiltration Over Web Service: Exfiltration to Cloud Storage"

  - time: "+54h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Final upload — institutional client data archive to pCloud"
    details:
      process_name: "C:\\Program Files\\Google\\Chrome\\Application\\chrome.exe"
      dst_ip: "185.26.156.40"
      dst_port: 443
      service: "https"
      domain: "api.pcloud.com"
      bytes_out: 104857600
      technique: "T1567.002 - Exfiltration Over Web Service: Exfiltration to Cloud Storage"

  - time: "+55h30m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Deletes local staging directory and all collected data"
    details:
      process_name: "C:\\Windows\\System32\\cmd.exe"
      command_line: "cmd.exe /c rmdir /s /q C:\\Users\\diego.ramirez\\Documents\\ProjectData"
      technique: "T1070.004 - Indicator Removal: File Deletion"

  - time: "+55h45m"
    actor: diego.ramirez
    system: DATA-WS-02
    activity: "Clears recent documents list and temporary files"
    details:
      process_name: "C:\\Windows\\System32\\cmd.exe"
      command_line: "cmd.exe /c del /q /f %APPDATA%\\Microsoft\\Windows\\Recent\\* & del /q /f %LOCALAPPDATA%\\Temp\\fiscal_review* & del /q /f %LOCALAPPDATA%\\Temp\\client_data* & del /q /f %LOCALAPPDATA%\\Temp\\institutional*"
      technique: "T1070.004 - Indicator Removal: File Deletion"

  - time: "+56h"
