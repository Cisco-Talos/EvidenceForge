version: "1.0"
name: insider-exfiltration
description: |
  Insider threat scenario at Meridian Capital Group, a mid-size investment management
  firm in Chicago. A data analyst who was recently passed over for promotion begins
  systematically accessing client data outside his normal scope, staging it locally,
  and exfiltrating it to a personal cloud storage account over three business days.
  The challenge: all tools used are legitimate — the only signal is behavioral anomaly
  buried in 100+ users' worth of normal activity.

environment:
  description: >
    Meridian Capital Group is a mid-size investment management and financial advisory
    firm headquartered in Chicago, IL. The firm manages approximately $4.2 billion in
    assets under management across institutional and high-net-worth individual clients.
    The IT environment is Windows-dominant with centralized file servers, SQL Server
    databases for client data, and an on-premises CRM system. The firm employs
    approximately 105 staff across trading, analytics, finance, compliance, sales,
    IT, and corporate support functions.

  timezone:
    default: "America/Chicago"

