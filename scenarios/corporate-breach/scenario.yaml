version: "1.0"
name: corporate-breach
description: |
  Multi-stage corporate breach at a mid-size biotech firm. An external attacker
  compromises a developer workstation via a watering-hole attack on a poisoned
  npm package mirror, pivots through the developer subnet to the R&D network,
  exfiltrates proprietary research data, and establishes persistent access.
  Simultaneously, a disgruntled R&D engineer copies sensitive files to a personal
  cloud storage account via the corporate proxy — an insider threat running in
  parallel with the external breach. The scenario spans 48 hours across a Tuesday
  and Wednesday, exercising all log formats, multiple network segments, overlapping
  sensor visibility, Linux and Windows systems, and every supported event type.

environment:
  description: >
    Helix BioSciences — a 35-person biotech company in San Diego, CA. The company
    develops novel gene therapy delivery mechanisms. The network is segmented into
    four zones: a DMZ hosting public-facing services, a general business operations
    subnet, a developer/engineering subnet, and a restricted R&D network with
    sensitive research systems. Two Zeek sensors provide partially overlapping
    network visibility, and two Snort IDS sensors monitor the DMZ perimeter and
    the core network. A forward proxy handles all outbound HTTP/HTTPS traffic
    from internal subnets. The DMZ web server is exposed to both internal and
    external traffic, while an internal wiki/intranet server serves only internal
    users.

