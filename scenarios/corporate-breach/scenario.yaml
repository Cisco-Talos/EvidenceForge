        name: snort-dmz
        hostname: IDS-DMZ
        monitoring_segments: [dmz]
        direction: bidirectional
        placement: tap
        log_formats: [snort_alert]

      # Snort IDS 2: core network — span placement, maximum internal visibility
      - type: ids
        name: snort-core
        hostname: IDS-CORE
        monitoring_segments: [business, engineering, research, core]
        direction: bidirectional
        placement: span
        log_formats: [snort_alert]

