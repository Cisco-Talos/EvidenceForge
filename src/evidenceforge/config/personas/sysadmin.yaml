# Persona: sysadmin — System administrator who manages servers, networks, and infrastructure using remote access and admin tools
#
# Required fields: name, description, typical_activities, work_hours,
#   application_usage, risk_profile, browsing_intensity
# Valid risk_profile: low, medium, high
# Valid browsing_intensity: light, normal, heavy
#
# Cross-references:
#   - Persona name must match this filename (without .yaml)
#   - Referenced by application_catalog.yaml personas: lists
#   - May be referenced by traffic_profiles.yaml persona_traffic: keys
#
# Full schema: see commands/eforge/references/config-personas.md

name: sysadmin
description: "System administrator who manages servers, networks, and infrastructure using remote access and admin tools"
typical_activities:
  - "Monitor and maintain server infrastructure"
  - "Execute PowerShell scripts for automation"
  - "Manage user accounts and group policies"
  - "Troubleshoot network and system issues"
  - "Apply patches and security updates"
work_hours: "8am-6pm (lunch 12pm-1pm)"
application_usage:
  - "PowerShell"
  - "Remote Desktop"
  - "Event Viewer"
  - "SSH"
risk_profile: "high"
browsing_intensity: "normal"
