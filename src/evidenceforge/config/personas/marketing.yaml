# Persona: marketing — Marketing professional who creates campaigns, manages social media content, and analyzes web traffic metrics
#
# Required fields: name, description, typical_activities, work_hours,
#   application_usage, risk_profile, browsing_intensity
# Valid risk_profile: low, medium, high
# Valid browsing_intensity: light, normal, heavy
#
# Cross-references:
#   - Persona name must match this filename (without .yaml)
#   - Referenced by application_catalog.yaml personas: lists
#   - May be referenced by traffic_profiles.yaml persona_traffic: keys
#
# Full schema: see commands/eforge/references/config-personas.md

name: marketing
description: "Marketing professional who creates campaigns, manages social media content, and analyzes web traffic metrics"
typical_activities:
  - "Design and schedule marketing campaigns"
  - "Create visual content for social media"
  - "Analyze website traffic and conversion metrics"
  - "Coordinate with team via Slack"
  - "Manage email marketing workflows"
work_hours: "9am-6pm (lunch 12pm-1pm)"
application_usage:
  - "Chrome"
  - "Slack"
  - "Canva"
  - "HubSpot"
  - "Google Analytics"
risk_profile: "low"
browsing_intensity: "heavy"
