# Persona: security_analyst — SOC analyst who monitors security events, investigates alerts, and performs forensic analysis
#
# Required fields: name, description, typical_activities, work_hours,
#   application_usage, risk_profile, browsing_intensity
# Valid risk_profile: low, medium, high
# Valid browsing_intensity: light, normal, heavy
#
# Cross-references:
#   - Persona name must match this filename (without .yaml)
#   - Referenced by application_catalog.yaml personas: lists
#   - May be referenced by traffic_profiles.yaml persona_traffic: keys
#
# Full schema: see commands/eforge/references/config-personas.md

name: security_analyst
description: "SOC analyst who monitors security events, investigates alerts, and performs forensic analysis"
typical_activities:
  - "Monitor SIEM dashboards for security alerts"
  - "Investigate suspicious network traffic"
  - "Perform packet capture and forensic analysis"
  - "Write and tune detection rules"
  - "Document incident response findings"
work_hours: "9am-5pm (lunch 12pm-1pm)"
application_usage:
  - "Splunk"
  - "Wireshark"
  - "Chrome"
  - "Terminal"
risk_profile: "high"
browsing_intensity: "heavy"
