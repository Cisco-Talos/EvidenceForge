# Persona: developer — Software engineer who writes code, runs builds, and uses version control frequently
#
# Required fields: name, description, typical_activities, work_hours,
#   application_usage, risk_profile, browsing_intensity
# Valid risk_profile: low, medium, high
# Valid browsing_intensity: light, normal, heavy
#
# Cross-references:
#   - Persona name must match this filename (without .yaml)
#   - Referenced by application_catalog.yaml personas: lists
#   - May be referenced by traffic_profiles.yaml persona_traffic: keys
#
# Full schema: see commands/eforge/references/config-personas.md

name: developer
description: "Software engineer who writes code, runs builds, and uses version control frequently"
typical_activities:
  - "Write and edit source code"
  - "Run builds and tests"
  - "Push/pull from git repositories"
  - "Browse documentation and Stack Overflow"
  - "Attend video meetings"
work_hours: "9am-6pm (lunch 12pm-1pm)"
application_usage:
  - "VS Code"
  - "Terminal"
  - "Chrome"
  - "Docker"
  - "Git"
risk_profile: "high"
browsing_intensity: "heavy"
