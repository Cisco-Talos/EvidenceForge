# co_occurrence.yaml — Tier B record-level fidelity rules
#
# Purpose: Checks that when a condition matches in a generated record,
#   required field constraints hold (e.g., network logon has valid IP).
#
# Depends on: format definitions in config/formats/ (field names must exist)
# Depended on by: evaluation engine (eforge eval)
#
# To add a new rule:
#   1. Add under the format name key (e.g., windows_event_security:)
#   2. Define condition: fields that must match for the rule to apply
#   3. Define checks: constraints that must hold when condition matches
#   4. Valid check types: not_equal, present, min_length, matches
#
# Full schema: see commands/eforge/references/config-evaluation.md

windows_event_security:
  - name: "Network logon (type 3) requires valid IP"
    condition:
      EventID: 4624
      LogonType: 3
      exclude:
        TargetUserName: "ANONYMOUS LOGON"
    checks:
      - field: IpAddress
        not_equal: "-"
      - field: IpAddress
        not_equal: ""

  - name: "Interactive logon (type 2) uses local workstation"
    condition:
      EventID: 4624
      LogonType: 2
    checks:
      - field: WorkstationName
        not_equal: ""

  - name: "Process creation has process name"
    condition:
      EventID: 4688
    checks:
      - field: NewProcessName
        min_length: 1

  - name: "Logoff must have a logon type"
    condition:
      EventID: 4634
    checks:
      - field: LogonType
        present: true

  - name: "Logon has valid SID"
    condition:
      EventID: 4624
    checks:
      - field: TargetUserSid
        not_equal: ""

  - name: "Failed logon has status code"
    condition:
      EventID: 4625
    checks:
      - field: Status
        present: true
      - field: TargetUserName
        min_length: 1

  - name: "Special privileges has privilege list"
    condition:
      EventID: 4672
    checks:
      - field: PrivilegeList
        min_length: 1

  - name: "Process termination has process name"
    condition:
      EventID: 4689
    checks:
      - field: ProcessName
        min_length: 1
      - field: ProcessId
        present: true

  - name: "Kerberos TGT has krbtgt service"
    condition:
      EventID: 4768
    checks:
      - field: ServiceName
        equals: "krbtgt"
      - field: IpAddress
        not_equal: "-"

  - name: "Kerberos service ticket has service name"
    condition:
      EventID: 4769
    checks:
      - field: ServiceName
        min_length: 1
      - field: IpAddress
        not_equal: "-"

  - name: "NTLM validation has workstation"
    condition:
      EventID: 4776
    checks:
      - field: Workstation
        min_length: 1
      - field: TargetUserName
        min_length: 1

  - name: "Kerberos preauth failure has status"
    condition:
      EventID: 4771
    checks:
      - field: Status
        present: true
      - field: TargetUserName
        min_length: 1

  - name: "WFP connection has direction"
    condition:
      EventID: 5156
    checks:
      - field: Direction
        in: ["%%14592", "%%14593"]
      - field: SourceAddress
        present: true
      - field: DestAddress
        present: true

  - name: "Explicit creds has target server"
    condition:
      EventID: 4648
    checks:
      - field: TargetServerName
        min_length: 1
      - field: TargetUserName
        min_length: 1

zeek_conn:
  - name: "Completed connection (SF) has duration"
    condition:
      conn_state: "SF"
    checks:
      - field: duration
        present: true

  - name: "Completed connection (SF) has byte counts"
    condition:
      conn_state: "SF"
    checks:
      - field: orig_bytes
        present: true
      - field: resp_bytes
        present: true

  - name: "Connection has valid protocol"
    condition: {}
    checks:
      - field: proto
        in: ["tcp", "udp", "icmp"]

  # Impossible combinations
  - name: "Completed TCP (SF) cannot have zero duration"
    condition:
      conn_state: "SF"
      proto: "tcp"
    checks:
      - field: duration
        not_equal: 0


ecar:
  # Core fields: always present on every eCAR record
  - name: "All records have pid"
    condition: {}
    checks:
      - field: pid
        present: true

  - name: "All records have tid"
    condition: {}
    checks:
      - field: tid
        present: true

  - name: "All records have objectID"
    condition: {}
    checks:
      - field: objectID
        present: true

  # PROCESS-specific
  - name: "PROCESS/CREATE has image_path"
    condition:
      object: "PROCESS"
      action: "CREATE"
    checks:
      - field: image_path
        present: true

  - name: "PROCESS/CREATE has ppid"
    condition:
      object: "PROCESS"
      action: "CREATE"
    checks:
      - field: ppid
        present: true

  - name: "PROCESS/CREATE has command_line"
    condition:
      object: "PROCESS"
      action: "CREATE"
    checks:
      - field: command_line
        present: true

  # THREAD-specific
  - name: "THREAD/REMOTE_CREATE has target info"
    condition:
      object: "THREAD"
      action: "REMOTE_CREATE"
    checks:
      - field: target_pid
        present: true
      - field: image_path
        present: true

  # PROCESS/OPEN-specific
  - name: "PROCESS/OPEN has source image"
    condition:
      object: "PROCESS"
      action: "OPEN"
    checks:
      - field: image_path
        present: true

  # FLOW-specific
  - name: "FLOW events have network fields"
    condition:
      object: "FLOW"
    checks:
      - field: src_ip
        present: true
      - field: dst_ip
        present: true

  # SERVICE-specific
  - name: "SERVICE/CREATE has service name"
    condition:
      object: "SERVICE"
      action: "CREATE"
    checks:
      - field: service_name
        present: true

  # USER_SESSION-specific
  - name: "USER_SESSION LOGIN has principal"
    condition:
      object: "USER_SESSION"
      action: "LOGIN"
    checks:
      - field: principal
        present: true

syslog:
  - name: "Syslog has non-empty message"
    condition: {}
    checks:
      - field: message
        min_length: 1

  - name: "Syslog has hostname"
    condition: {}
    checks:
      - field: hostname
        not_equal: ""

snort_alert:
  - name: "Alert has valid priority"
    condition: {}
    checks:
      - field: priority
        min_value: 1
        max_value: 4

  - name: "Alert has source and destination"
    condition: {}
    checks:
      - field: src_ip
        present: true
      - field: dst_ip
        present: true

web_access:
  - name: "Request has valid status code"
    condition: {}
    checks:
      - field: status_code
        min_value: 100
        max_value: 599

  - name: "Request has HTTP method"
    condition: {}
    checks:
      - field: method
        in: ["GET", "POST", "PUT", "DELETE", "HEAD", "OPTIONS", "PATCH"]

zeek_dns:
  - name: "DNS query has non-empty query field"
    condition: {}
    checks:
      - field: query
        min_length: 1

  - name: "DNS response has rcode"
    condition: {}
    checks:
      - field: rcode_name
        present: true

zeek_http:
  - name: "HTTP CONNECT must not have response body"
    condition:
      method: "CONNECT"
    checks:
      - field: response_body_len
        equals: 0

  - name: "HTTP response has method"
    condition: {}
    checks:
      - field: method
        in: ["GET", "POST", "PUT", "DELETE", "HEAD", "OPTIONS", "PATCH", "CONNECT", "TRACE"]

bash_history:
  - name: "Command is non-empty"
    condition: {}
    checks:
      - field: command
        min_length: 1

  - name: "Has username"
    condition: {}
    checks:
      - field: username
        not_equal: ""
