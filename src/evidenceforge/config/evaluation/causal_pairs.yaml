# causal_pairs.yaml — Temporal realism (Dimension 4) causal ordering rules
#
# Purpose: Defines before/after event pairs that must be correctly
#   ordered when they share matching field values (e.g., logon
#   must precede process creation for the same LogonId).
#
# Depends on: format definitions in config/formats/ (field names must exist)
# Depended on by: evaluation engine (eforge eval)
#
# To add a new causal pair:
#   1. Add under the pairs: list
#   2. Define before/after events with format and condition
#   3. Specify match_fields to link the two events
#   4. Use exclude_accounts for system accounts that don't follow normal chains
#
# Full schema: see commands/eforge/references/config-evaluation.md

pairs:
  - name: "Logon before process creation"
    before:
      format: windows_event_security
      condition:
        EventID: 4624
    after:
      format: windows_event_security
      condition:
        EventID: 4688
    match_fields:
      before: TargetLogonId
      after: SubjectLogonId
    exclude_accounts: ["SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE", "DWM-1", "DWM-2", "DWM-3", "UMFD-0", "UMFD-1", "UMFD-2", "ANONYMOUS LOGON"]

  - name: "Logon before logoff"
    before:
      format: windows_event_security
      condition:
        EventID: 4624
    after:
      format: windows_event_security
      condition:
        EventID: 4634
    match_fields:
      before: TargetLogonId
      after: TargetLogonId

  - name: "eCAR login before process create"
    before:
      format: ecar
      condition:
        object: USER_SESSION
        action: LOGIN
    after:
      format: ecar
      condition:
        object: PROCESS
        action: CREATE
    match_fields:
      before: principal
      after: principal
    extra_match: hostname
    exclude_accounts: ["SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE", "root", "www-data", "nobody", "daemon", "mysql", "postgres", "syslog"]
    allow_missing_prior: true

  - name: "Process creation before process termination"
    before:
      format: windows_event_security
      condition:
        EventID: 4688
    after:
      format: windows_event_security
      condition:
        EventID: 4689
    match_fields:
      before: NewProcessId
      after: ProcessId
    extra_match: Computer

  - name: "eCAR process create before process terminate"
    before:
      format: ecar
      condition:
        object: PROCESS
        action: CREATE
    after:
      format: ecar
      condition:
        object: PROCESS
        action: TERMINATE
    match_fields:
      before: pid
      after: pid
    extra_match: hostname

  - name: "Sysmon process create before process terminate"
    before:
      format: windows_event_sysmon
      condition:
        EventID: 1
    after:
      format: windows_event_sysmon
      condition:
        EventID: 5
    match_fields:
      before: ProcessGuid
      after: ProcessGuid
    extra_match: Computer

  - name: "SSH accept before bash commands"
    before:
      format: syslog
      message_contains: "Accepted"
    after:
      format: bash_history
      condition: {}
    match_fields:
      before: hostname
      after: hostname

  # Causal expansion engine rules — verify auto-generated prerequisites

  - name: "DNS resolution before TCP connection"
    before:
      format: zeek_dns
      condition:
        rcode_name: NOERROR
    after:
      format: zeek_conn
      condition:
        proto: tcp
    match_fields:
      before: "answers"
      after: "id.resp_h"
    match_mode: list_contains
    exclude_ports: [53]
    # Allow up to 3% of TCP connections without preceding DNS (hardcoded IPs,
    # static hosts entries, infrastructure services configured by IP).
    tolerance: 0.03
    allow_missing_prior: true

  - name: "Kerberos TGT before service ticket"
    before:
      format: windows_event_security
      condition:
        EventID: 4768
    after:
      format: windows_event_security
      condition:
        EventID: 4769
    match_fields:
      before: TargetUserName
      after: TargetUserName
    extra_match: Computer

  - name: "Kerberos TGT before domain logon"
    before:
      format: windows_event_security
      condition:
        EventID: 4768
    after:
      format: windows_event_security
      condition:
        EventID: 4624
    match_fields:
      before: TargetUserName
      after: TargetUserName
