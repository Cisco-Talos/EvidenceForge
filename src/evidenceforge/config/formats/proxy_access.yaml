# proxy_access format definition — HTTP/HTTPS forward proxy access log (W3C Extended Log Format)
#
# Category: host
# Standalone: yes (no cross-file dependencies)
# Note: Field names may be referenced by evaluation rules in config/evaluation/
#
# Full schema: see commands/eforge/references/config-formats.md

name: proxy_access
version: "1.0"
description: "HTTP/HTTPS forward proxy access log (W3C Extended Log Format)"
category: host

fields:
  - name: timestamp
    type: timestamp
    required: true
    description: "Request timestamp"

  - name: client_ip
    type: ip_address
    required: true
    description: "Original client IP address (internal user)"

  - name: username
    type: string
    required: false
    description: "Authenticated proxy username"

  - name: method
    type: string
    required: true
    description: "HTTP method (GET, POST, CONNECT, HEAD, PUT, DELETE)"

  - name: url
    type: string
    required: true
    description: "Full destination URL or host:port for CONNECT"

  - name: protocol
    type: string
    required: true
    description: "HTTP protocol version"

  - name: status_code
    type: integer
    required: true
    description: "HTTP response status code"
    constraints:
      min_value: 100
      max_value: 599

  - name: sc_bytes
    type: integer
    required: false
    description: "Server to client bytes"

  - name: cs_bytes
    type: integer
    required: false
    description: "Client to server bytes"

  - name: time_taken
    type: integer
    required: false
    description: "Request duration in milliseconds"

  - name: user_agent
    type: string
    required: false
    description: "Client User-Agent string"

  - name: host
    type: string
    required: true
    description: "Destination hostname"

  - name: content_type
    type: string
    required: false
    description: "Response Content-Type"

  - name: cache_result
    type: string
    required: false
    description: "Cache result (HIT, MISS, NONE, DENIED)"

  - name: referrer
    type: string
    required: false
    description: "HTTP Referer header"

output:
  format: text
  file_extension: ".log"
  encoding: utf-8
  header_template: |
    #Software: EvidenceForge Proxy Log
    #Version: 1.0
    #Fields: date time c-ip cs-username cs-method cs-uri cs-version sc-status sc-bytes cs-bytes time-taken cs(User-Agent) cs-host rs(Content-Type) s-cache-result cs(Referer)
  template: |
    {{ timestamp.strftime('%Y-%m-%d %H:%M:%S') }} {{ client_ip }} {{ username if username else '-' }} {{ method }} {{ url }} {{ protocol if protocol else 'HTTP/1.1' }} {{ status_code }} {{ sc_bytes if sc_bytes else 0 }} {{ cs_bytes if cs_bytes else 0 }} {{ time_taken if time_taken else 0 }} "{{ user_agent if user_agent else '-' }}" {{ host }} {{ content_type if content_type else '-' }} {{ cache_result if cache_result else '-' }} "{{ referrer if referrer else '-' }}"
