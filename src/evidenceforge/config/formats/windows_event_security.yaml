# windows_event_security format definition — Windows Security Event Log format (XML output)
#
# Category: host
# Standalone: yes (no cross-file dependencies)
# Note: Field names may be referenced by evaluation rules in config/evaluation/
#
# Full schema: see commands/eforge/references/config-formats.md

name: windows_event_security
version: "1.0"
description: "Windows Security Event Log format (XML output)"
category: host

# Base fields common to all Windows Event Log entries
fields:
  - name: EventID
    type: integer
    required: true
    description: "Windows Event ID"
    constraints:
      allowed_values: [1102, 4624, 4625, 4634, 4648, 4672, 4688, 4689, 4697, 4698, 4699, 4700, 4701, 4720, 4723, 4724, 4726, 4728, 4729, 4732, 4733, 4738, 4756, 4757, 4768, 4769, 4770, 4771, 4776, 4800, 4801, 5156]

  - name: TimeCreated
    type: timestamp
    required: true
    description: "Event creation timestamp"

  - name: Computer
    type: string
    required: true
    description: "Computer name where event was generated"

  - name: Channel
    type: string
    required: true
    description: "Event log channel"
    default: "Security"

  - name: Level
    type: integer
    required: true
    description: "Event level (0=LogAlways, 4=Information)"
    constraints:
      allowed_values: [0, 1, 2, 3, 4]

  - name: EventRecordID
    type: integer
    required: true
    description: "Sequential event record ID"
    constraints:
      min_value: 1

  - name: ExecutionProcessID
    type: integer
    required: true
    description: "Process ID of event logging service"

  - name: ExecutionThreadID
    type: integer
    required: true
    description: "Thread ID of event logging service"

# Event variants for different EventIDs
variants:
  # EventID 4624: An account was successfully logged on
  - name: logon
    event_id: "4624"
    description: "User logon event"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
        description: "SID of account that reported the logon"

      - name: SubjectUserName
        type: string
        required: true
        description: "Account name that reported the logon"

      - name: SubjectDomainName
        type: string
        required: true
        description: "Domain of account that reported the logon"

      - name: SubjectLogonId
        type: hex_string
        required: true
        description: "Logon ID of the account that reported the logon"

      - name: TargetUserSid
        type: sid
        required: true
        description: "SID of the account that was logged on"

      - name: TargetUserName
        type: string
        required: true
        description: "Account name that was logged on"

      - name: TargetDomainName
        type: string
        required: true
        description: "Domain of the account that was logged on"

      - name: TargetLogonId
        type: hex_string
        required: true
        description: "Logon ID of the new logon session"

      - name: LogonType
        type: integer
        required: true
        description: "Type of logon (2=Interactive, 3=Network, 10=RemoteInteractive)"
        constraints:
          allowed_values: [2, 3, 4, 5, 7, 8, 9, 10, 11]

      - name: LogonProcessName
        type: string
        required: false
        description: "Name of the logon process"

      - name: AuthenticationPackageName
        type: string
        required: false
        description: "Authentication package used"

      - name: WorkstationName
        type: string
        required: true
        description: "Source workstation name"

      - name: LogonGuid
        type: string
        required: false
        description: "GUID to correlate with RADIUS/802.1x events"

      - name: TransmittedServices
        type: string
        required: false
        description: "List of transmitted services"

      - name: LmPackageName
        type: string
        required: false
        description: "LAN Manager package name"

      - name: KeyLength
        type: integer
        required: false
        description: "Length of NTLM session security key"

      - name: ProcessId
        type: hex_string
        required: true
        description: "Process ID of the logon process"

      - name: ProcessName
        type: string
        required: true
        description: "Full path of the logon process executable"

      - name: IpAddress
        type: string
        required: true
        description: "Source IP address (use '-' for local logons)"

      - name: IpPort
        type: integer
        required: true
        description: "Source port number (use 0 for local logons)"
        constraints:
          min_value: 0
          max_value: 65535

      - name: ImpersonationLevel
        type: string
        required: false
        description: "Impersonation level"

      - name: RestrictedAdminMode
        type: string
        required: false
        description: "Restricted Admin mode indicator"

      - name: TargetOutboundUserName
        type: string
        required: false
        description: "Outbound account name"

      - name: TargetOutboundDomainName
        type: string
        required: false
        description: "Outbound domain name"

      - name: VirtualAccount
        type: string
        required: false
        description: "Virtual account indicator"

      - name: ElevatedToken
        type: string
        required: false
        description: "Elevated token indicator (Yes/No)"

      - name: TargetLinkedLogonId
        type: hex_string
        required: false
        description: "Linked logon ID for split-token logons"

      - name: RemoteUserID
        type: sid
        required: false
        description: "SID of the remote user"

      - name: RemoteMachineID
        type: sid
        required: false
        description: "SID of the remote machine"

  # EventID 4634: An account was logged off
  - name: logoff
    event_id: "4634"
    description: "User logoff event"
    fields:
      - name: TargetUserSid
        type: sid
        required: true
        description: "SID of the account that was logged off"

      - name: TargetUserName
        type: string
        required: true
        description: "Account name that was logged off"

      - name: TargetDomainName
        type: string
        required: true
        description: "Domain of the account that was logged off"

      - name: TargetLogonId
        type: hex_string
        required: true
        description: "Logon ID of the session that was logged off"

      - name: LogonType
        type: integer
        required: true
        description: "Type of logon that was ended"
        constraints:
          allowed_values: [2, 3, 4, 5, 7, 8, 9, 10, 11]

  # EventID 4688: A new process has been created
  - name: process_creation
    event_id: "4688"
    description: "Process creation event"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
        description: "SID of account that created the process"

      - name: SubjectUserName
        type: string
        required: true
        description: "Account name that created the process"

      - name: SubjectDomainName
        type: string
        required: true
        description: "Domain of account that created the process"

      - name: SubjectLogonId
        type: hex_string
        required: true
        description: "Logon ID of the account that created the process"

      - name: NewProcessId
        type: hex_string
        required: true
        description: "Process ID of the newly created process"

      - name: NewProcessName
        type: string
        required: true
        description: "Full path of the newly created process"

      - name: TokenElevationType
        type: string
        required: true
        description: "Token elevation type (%%1936=Type1, %%1937=Type2, %%1938=Type3)"

      - name: ProcessId
        type: hex_string
        required: true
        description: "Process ID of the creator process"

      - name: CommandLine
        type: string
        required: false
        description: "Command line of the new process"

      - name: TargetUserSid
        type: sid
        required: false
        description: "SID of target user for new process"

      - name: TargetUserName
        type: string
        required: false
        description: "Target user name for new process"

      - name: TargetDomainName
        type: string
        required: false
        description: "Target domain for new process"

      - name: TargetLogonId
        type: hex_string
        required: false
        description: "Target logon ID for new process"

      - name: ParentProcessName
        type: string
        required: false
        description: "Full path of the parent process"

      - name: MandatoryLabel
        type: string
        required: false
        description: "Mandatory integrity label"

  # EventID 4625: An account failed to log on
  - name: failed_logon
    event_id: "4625"
    description: "Failed logon event"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
        description: "SID of account reporting the failure"

      - name: SubjectUserName
        type: string
        required: true
        description: "Account name reporting the failure"

      - name: SubjectDomainName
        type: string
        required: true
        description: "Domain of account reporting the failure"

      - name: SubjectLogonId
        type: hex_string
        required: true
        description: "Logon ID of the reporting account"

      - name: TargetUserSid
        type: sid
        required: true
        description: "SID of the account that failed to log on"

      - name: TargetUserName
        type: string
        required: true
        description: "Account name that failed to log on"

      - name: TargetDomainName
        type: string
        required: true
        description: "Domain of the account that failed to log on"

      - name: Status
        type: hex_string
        required: true
        description: "Failure status code (e.g., 0xC000006D)"

      - name: SubStatus
        type: hex_string
        required: true
        description: "Sub-status code for failure reason"

      - name: FailureReason
        type: string
        required: true
        description: "Human-readable failure reason"

      - name: LogonType
        type: integer
        required: true
        description: "Type of logon attempted"
        constraints:
          allowed_values: [2, 3, 4, 5, 7, 8, 9, 10, 11]

      - name: LogonProcessName
        type: string
        required: false
        description: "Logon process name"

      - name: AuthenticationPackageName
        type: string
        required: false
        description: "Authentication package used"

      - name: WorkstationName
        type: string
        required: false
        description: "Source workstation name"

      - name: IpAddress
        type: string
        required: true
        description: "Source IP address"

      - name: IpPort
        type: integer
        required: false
        description: "Source port number"
        constraints:
          min_value: 0
          max_value: 65535

      - name: TransmittedServices
        type: string
        required: false
        description: "List of transmitted services"

      - name: LmPackageName
        type: string
        required: false
        description: "LAN Manager package name"

      - name: KeyLength
        type: integer
        required: false
        description: "Length of NTLM session security key"

      - name: ProcessId
        type: hex_string
        required: false
        description: "Process ID of the logon process"

      - name: ProcessName
        type: string
        required: false
        description: "Full path of the logon process executable"

      - name: RemoteUserID
        type: sid
        required: false
        description: "SID of the remote user"

      - name: RemoteMachineID
        type: sid
        required: false
        description: "SID of the remote machine"

  # EventID 4672: Special privileges assigned to new logon
  - name: special_privileges
    event_id: "4672"
    description: "Special privileges assigned to new logon"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
        description: "SID of the privileged account"

      - name: SubjectUserName
        type: string
        required: true
        description: "Account name with special privileges"

      - name: SubjectDomainName
        type: string
        required: true
        description: "Domain of the privileged account"

      - name: SubjectLogonId
        type: hex_string
        required: true
        description: "Logon ID of the privileged session"

      - name: PrivilegeList
        type: string
        required: true
        description: "List of assigned special privileges"

  # EventID 4800: The workstation was locked
  - name: workstation_locked
    event_id: "4800"
    description: "Workstation locked"
    fields:
      - name: TargetUserSid
        type: sid
        required: true
        description: "SID of the user who locked the workstation"

      - name: TargetUserName
        type: string
        required: true
        description: "Account name of the user"

      - name: TargetDomainName
        type: string
        required: true
        description: "Domain of the user"

      - name: TargetLogonId
        type: hex_string
        required: true
        description: "Logon ID of the locked session"

      - name: SessionId
        type: integer
        required: true
        description: "Terminal Services session ID"

  # EventID 4801: The workstation was unlocked
  - name: workstation_unlocked
    event_id: "4801"
    description: "Workstation unlocked"
    fields:
      - name: TargetUserSid
        type: sid
        required: true
        description: "SID of the user who unlocked the workstation"

      - name: TargetUserName
        type: string
        required: true
        description: "Account name of the user"

      - name: TargetDomainName
        type: string
        required: true
        description: "Domain of the user"

      - name: TargetLogonId
        type: hex_string
        required: true
        description: "Logon ID of the unlocked session"

      - name: SessionId
        type: integer
        required: true
        description: "Terminal Services session ID"

  # EventID 4689: A process has exited
  - name: process_termination
    event_id: "4689"
    description: "Process termination event"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
        description: "SID of account under which process ran"

      - name: SubjectUserName
        type: string
        required: true
        description: "Account name under which process ran"

      - name: SubjectDomainName
        type: string
        required: true
        description: "Domain of account under which process ran"

      - name: SubjectLogonId
        type: hex_string
        required: true
        description: "Logon ID of the session"

      - name: Status
        type: hex_string
        required: true
        description: "Process exit status code"

      - name: ProcessId
        type: hex_string
        required: true
        description: "Process ID of the exited process"

      - name: ProcessName
        type: string
        required: true
        description: "Full path of the exited process"

  # EventID 4648: A logon was attempted using explicit credentials
  - name: explicit_credentials
    event_id: "4648"
    description: "Explicit credentials logon (RunAs, scheduled tasks)"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetServerName
        type: string
        required: true
      - name: TargetInfo
        type: string
        required: false
      - name: ProcessId
        type: hex_string
        required: true
      - name: ProcessName
        type: string
        required: true
      - name: NetworkAddress
        type: string
        required: false
      - name: NetworkPort
        type: integer
        required: false
      - name: LogonGuid
        type: string
        required: false
        description: "GUID to correlate with Kerberos authentication"
      - name: TargetLogonGuid
        type: string
        required: false
        description: "GUID for target logon correlation"

  # EventID 4768: A Kerberos authentication ticket (TGT) was requested
  - name: kerberos_tgt
    event_id: "4768"
    description: "Kerberos TGT request"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: ServiceName
        type: string
        required: true
        description: "Always krbtgt for TGT requests"
      - name: ServiceSid
        type: sid
        required: true
      - name: TicketOptions
        type: hex_string
        required: true
      - name: Status
        type: hex_string
        required: true
      - name: TicketEncryptionType
        type: hex_string
        required: true
      - name: PreAuthType
        type: integer
        required: false
      - name: IpAddress
        type: string
        required: true
      - name: IpPort
        type: integer
        required: false
      - name: CertIssuerName
        type: string
        required: false
      - name: CertSerialNumber
        type: string
        required: false
      - name: CertThumbprint
        type: string
        required: false

  # EventID 4769: A Kerberos service ticket was requested
  - name: kerberos_service_ticket
    event_id: "4769"
    description: "Kerberos service ticket request"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: ServiceName
        type: string
        required: true
      - name: ServiceSid
        type: sid
        required: true
      - name: TicketOptions
        type: hex_string
        required: true
      - name: TicketEncryptionType
        type: hex_string
        required: true
      - name: IpAddress
        type: string
        required: true
      - name: IpPort
        type: integer
        required: false
      - name: Status
        type: hex_string
        required: true
      - name: LogonGuid
        type: string
        required: false
      - name: TransmittedServices
        type: string
        required: false

  # EventID 4776: The computer attempted to validate the credentials
  - name: ntlm_validation
    event_id: "4776"
    description: "NTLM credential validation"
    fields:
      - name: PackageName
        type: string
        required: true
        description: "Always MICROSOFT_AUTHENTICATION_PACKAGE_V1_0"
      - name: TargetUserName
        type: string
        required: true
      - name: Workstation
        type: string
        required: true
      - name: Status
        type: hex_string
        required: true

  # EventID 5156: Windows Filtering Platform has permitted a connection
  - name: wfp_connection
    event_id: "5156"
    description: "WFP connection allowed"
    fields:
      - name: ProcessID
        type: integer
        required: true
      - name: Application
        type: string
        required: true
      - name: Direction
        type: string
        required: true
        description: "%%14592=Inbound, %%14593=Outbound"
      - name: SourceAddress
        type: string
        required: true
      - name: SourcePort
        type: integer
        required: true
      - name: DestAddress
        type: string
        required: true
      - name: DestPort
        type: integer
        required: true
      - name: Protocol
        type: integer
        required: true
        description: "6=TCP, 17=UDP"
      - name: FilterRTID
        type: integer
        required: false
      - name: LayerName
        type: string
        required: false
      - name: LayerRTID
        type: integer
        required: false
      - name: RemoteUserID
        type: sid
        required: false
      - name: RemoteMachineID
        type: sid
        required: false

  # EventID 4771: Kerberos pre-authentication failed
  - name: kerberos_preauth_failed
    event_id: "4771"
    description: "Kerberos pre-authentication failed"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: ServiceName
        type: string
        required: true
      - name: TicketOptions
        type: hex_string
        required: true
      - name: Status
        type: hex_string
        required: true
      - name: PreAuthType
        type: integer
        required: false
      - name: IpAddress
        type: string
        required: true
      - name: IpPort
        type: integer
        required: false
      - name: CertIssuerName
        type: string
        required: false
      - name: CertSerialNumber
        type: string
        required: false
      - name: CertThumbprint
        type: string
        required: false

  # EventID 1102: Security log cleared
  - name: log_cleared
    event_id: "1102"
    description: "Security audit log was cleared"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true

  # EventID 4697: A service was installed in the system
  - name: service_installed
    event_id: "4697"
    description: "Service installed in the system"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true
      - name: ServiceName
        type: string
        required: true
      - name: ServiceFileName
        type: string
        required: true
      - name: ServiceType
        type: string
        required: false
      - name: ServiceStartType
        type: string
        required: false
      - name: ServiceAccount
        type: string
        required: false

  # EventID 4698/4699/4700/4701: Scheduled task events
  - name: scheduled_task
    event_id: "4698"
    description: "Scheduled task created/deleted/enabled/disabled"
    fields:
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true
      - name: TaskName
        type: string
        required: true
      - name: TaskContent
        type: string
        required: false

  # EventID 4728/4729/4732/4733/4756/4757: Group membership changes
  - name: group_membership_change
    event_id: "4728"
    description: "Member added/removed from security group"
    fields:
      - name: MemberName
        type: string
        required: false
      - name: MemberSid
        type: sid
        required: true
      - name: TargetUserName
        type: string
        required: true
        description: "Group name"
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true
      - name: PrivilegeList
        type: string
        required: false

  # EventID 4720: User account created
  - name: account_created
    event_id: "4720"
    description: "A user account was created"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true
      - name: SamAccountName
        type: string
        required: false
      - name: DisplayName
        type: string
        required: false
      - name: UserPrincipalName
        type: string
        required: false
      - name: HomeDirectory
        type: string
        required: false
      - name: HomePath
        type: string
        required: false
      - name: ScriptPath
        type: string
        required: false
      - name: ProfilePath
        type: string
        required: false
      - name: UserWorkstations
        type: string
        required: false
      - name: PasswordLastSet
        type: string
        required: false
      - name: AccountExpires
        type: string
        required: false
      - name: PrimaryGroupId
        type: string
        required: false
      - name: AllowedToDelegateTo
        type: string
        required: false
      - name: OldUacValue
        type: string
        required: false
      - name: NewUacValue
        type: string
        required: false
      - name: UserAccountControl
        type: string
        required: false
      - name: UserParameters
        type: string
        required: false
      - name: SidHistory
        type: string
        required: false
      - name: LogonHours
        type: string
        required: false
      - name: PrivilegeList
        type: string
        required: false

  # EventID 4723: Password change attempt
  - name: password_change
    event_id: "4723"
    description: "An attempt was made to change an account password"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true

  # EventID 4724: Password reset attempt
  - name: password_reset
    event_id: "4724"
    description: "An attempt was made to reset an account password"
    fields:
      - name: TargetUserName
        type: string
        required: true
      - name: TargetDomainName
        type: string
        required: true
      - name: TargetSid
        type: sid
        required: true
      - name: SubjectUserSid
        type: sid
        required: true
      - name: SubjectUserName
        type: string
        required: true
      - name: SubjectDomainName
        type: string
        required: true
      - name: SubjectLogonId
        type: hex_string
        required: true

  # EventID 4726: User account deleted
