    </Event>

# Cross-field validators using JSON Logic
validators:
  # Network logons (type 3) should have valid IP address (not "-")
  - if:
      - and:
          - "==": [{"var": "EventID"}, 4624]
          - "==": [{"var": "LogonType"}, 3]
    then:
      "!=": [{"var": "IpAddress"}, "-"]
