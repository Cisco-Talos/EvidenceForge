# zeek_ocsp format definition — Zeek ocsp.log format (JSON output) - OCSP response logging
#
# Category: network
# Standalone: yes (no cross-file dependencies)
# Note: Field names may be referenced by evaluation rules in config/evaluation/
#
# Full schema: see commands/eforge/references/config-formats.md

name: zeek_ocsp
version: "1.0"
description: "Zeek ocsp.log format (JSON output) - OCSP response logging"
category: network

fields:
  - name: ts
    type: timestamp
    required: true
    description: "Timestamp"

  - name: id
    type: string
    required: true
    description: "OCSP response file ID"

  - name: uid
    type: string
    required: true
    description: "Connection UID (shared with conn.log)"
    constraints:
      pattern: "^[A-Za-z0-9]{17,19}$"

  - name: id.orig_h
    type: ip_address
    required: true
    description: "Originator host for the connection carrying OCSP evidence"

  - name: id.orig_p
    type: port
    required: true
    description: "Originator port"

  - name: id.resp_h
    type: ip_address
    required: true
    description: "Responder host for the connection carrying OCSP evidence"

  - name: id.resp_p
    type: port
    required: true
    description: "Responder port"

  - name: hashAlgorithm
    type: string
    required: true
    description: "Hash algorithm"

  - name: issuerNameHash
    type: string
    required: true
    description: "Issuer name hash (hex)"

  - name: issuerKeyHash
    type: string
    required: true
    description: "Issuer key hash (hex)"

  - name: serialNumber
    type: string
    required: true
    description: "Certificate serial number (hex)"

  - name: certStatus
    type: string
    required: true
    description: "Certificate status (good, revoked, unknown)"

  - name: thisUpdate
    type: float
    required: true
    description: "OCSP response timestamp (epoch)"

  - name: nextUpdate
    type: float
    required: true
    description: "Next update timestamp (epoch)"

output:
  format: json
  file_extension: ".json"
  encoding: utf-8
  template: |
    {
      "ts": {{ ts | tojson }},
      "id": {{ id | tojson }},
      "uid": {{ uid | tojson }},
      "id.orig_h": {{ data["id.orig_h"] | tojson }},
      "id.orig_p": {{ data["id.orig_p"] | tojson }},
      "id.resp_h": {{ data["id.resp_h"] | tojson }},
      "id.resp_p": {{ data["id.resp_p"] | tojson }},
      "hashAlgorithm": {{ hashAlgorithm | tojson }},
      "issuerNameHash": {{ issuerNameHash | tojson }},
      "issuerKeyHash": {{ issuerKeyHash | tojson }},
      "serialNumber": {{ serialNumber | tojson }},
      "certStatus": {{ certStatus | tojson }},
      "thisUpdate": {{ thisUpdate | tojson }},
      "nextUpdate": {{ nextUpdate | tojson }}
    }
