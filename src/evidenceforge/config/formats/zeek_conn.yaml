# zeek_conn format definition — Zeek conn.log format (JSON output)
#
# Category: network
# Standalone: yes (no cross-file dependencies)
# Note: Field names may be referenced by evaluation rules in config/evaluation/
#
# Full schema: see commands/eforge/references/config-formats.md

name: zeek_conn
version: "1.0"
description: "Zeek conn.log format (JSON output)"
category: network

# All Zeek conn.log fields
fields:
  - name: ts
    type: timestamp
    required: true
    description: "Timestamp of connection start"

  - name: uid
    type: string
    required: true
    description: "Unique connection identifier"
    constraints:
      pattern: "^[A-Za-z0-9]{17,19}$"

  - name: id.orig_h
    type: ip_address
    required: true
    description: "Originator IP address"

  - name: id.orig_p
    type: port
    required: true
    description: "Originator port"

  - name: id.resp_h
    type: ip_address
    required: true
    description: "Responder IP address"

  - name: id.resp_p
    type: port
    required: true
    description: "Responder port"

  - name: proto
    type: enum
    required: true
    description: "Transport protocol"
    constraints:
      allowed_values: ["tcp", "udp", "icmp"]

  - name: service
    type: string
    required: false
    description: "Application protocol (http, ssh, dns, etc.)"

  - name: duration
    type: float
    required: false
    description: "Connection duration in seconds (unset if not ended)"

  - name: orig_bytes
    type: integer
    required: false
    description: "Bytes sent by originator"
    constraints:
      min_value: 0

  - name: resp_bytes
    type: integer
    required: false
    description: "Bytes sent by responder"
    constraints:
      min_value: 0

  - name: conn_state
    type: enum
    required: true
    description: "Connection state"
    constraints:
      allowed_values: ["S0", "S1", "SF", "REJ", "S2", "S3", "RSTO", "RSTR", "RSTOS0", "RSTRH", "SH", "SHR", "OTH"]

  - name: local_orig
    type: boolean
    required: false
    description: "Connection originated locally"

  - name: local_resp
    type: boolean
    required: false
    description: "Connection responded to locally"

  - name: missed_bytes
    type: integer
    required: false
    description: "Bytes missed in content gaps"
    constraints:
      min_value: 0

  - name: history
    type: string
    required: false
    description: "Connection state history (flags)"

  - name: orig_pkts
    type: integer
    required: false
    description: "Packets sent by originator"
    constraints:
      min_value: 0

  - name: orig_ip_bytes
    type: integer
    required: false
    description: "IP-level bytes sent by originator"
    constraints:
      min_value: 0

  - name: resp_pkts
    type: integer
    required: false
    description: "Packets sent by responder"
    constraints:
      min_value: 0

  - name: resp_ip_bytes
    type: integer
    required: false
    description: "IP-level bytes sent by responder"
    constraints:
      min_value: 0

  - name: ip_proto
    type: integer
    required: false
    description: "IP protocol number (6=TCP, 17=UDP, 1=ICMP)"

  - name: tunnel_parents
    type: string
    required: false
    description: "Tunnel UIDs if connection was tunneled"

# Output template in Zeek JSON format
output:
  format: json
  file_extension: ".json"
  encoding: "utf-8"

  # JSON template (no header needed - JSON is self-describing)
  # Note: For fields with dots, emitter should pass data as 'data' context variable
  #
  # Template formatting: Uses {%- and -%} for whitespace control to keep conditionals
  # readable without affecting JSON output. The '-' strips whitespace, allowing each
  # conditional to be on its own line while commas stay correctly positioned in output.
  template: |
    {
      "ts": {{ ts | tojson }},
      "uid": {{ uid | tojson }},
      "id.orig_h": {{ data['id.orig_h'] | tojson }},
      "id.orig_p": {{ data['id.orig_p'] | tojson }},
      "id.resp_h": {{ data['id.resp_h'] | tojson }},
      "id.resp_p": {{ data['id.resp_p'] | tojson }},
      "proto": {{ proto | tojson }}
      {%- if service %},
      "service": {{ service | tojson }}
      {%- endif %}
      {%- if duration %},
      "duration": {{ duration | tojson }}
      {%- endif %}
      {%- if orig_bytes is not none %},
      "orig_bytes": {{ orig_bytes | tojson }}
      {%- endif %}
      {%- if resp_bytes is not none %},
      "resp_bytes": {{ resp_bytes | tojson }}
      {%- endif %},
      "conn_state": {{ conn_state | tojson }}
      {%- if local_orig is not none %},
      "local_orig": {{ local_orig | tojson }}
      {%- endif %}
      {%- if local_resp is not none %},
      "local_resp": {{ local_resp | tojson }}
      {%- endif %}
      {%- if missed_bytes is not none %},
      "missed_bytes": {{ missed_bytes | tojson }}
      {%- endif %}
      {%- if history %},
      "history": {{ history | tojson }}
      {%- endif %}
      {%- if orig_pkts is not none %},
      "orig_pkts": {{ orig_pkts | tojson }}
      {%- endif %}
      {%- if orig_ip_bytes is not none %},
      "orig_ip_bytes": {{ orig_ip_bytes | tojson }}
      {%- endif %}
      {%- if resp_pkts is not none %},
      "resp_pkts": {{ resp_pkts | tojson }}
      {%- endif %}
      {%- if resp_ip_bytes is not none %},
      "resp_ip_bytes": {{ resp_ip_bytes | tojson }}
      {%- endif %}
      {%- if ip_proto is not none %},
      "ip_proto": {{ ip_proto | tojson }}
      {%- endif %}
      {%- if tunnel_parents %},
      "tunnel_parents": {{ tunnel_parents | tojson }}
      {%- endif %}
    }

# Cross-field validators
validators:
  # If duration is set, it should be non-negative
  - if:
      - "!=": [{"var": "duration"}, null]
    then:
      ">=": [{"var": "duration"}, 0]

  # If service is set, duration should also be set (established connection)
  - if:
      - "!=": [{"var": "service"}, null]
    then:
      "!=": [{"var": "duration"}, null]

  # SF state (normal connection) should have duration and bytes
  - if:
      - "==": [{"var": "conn_state"}, "SF"]
    then:
      and:
        - "!=": [{"var": "duration"}, null]
        - "!=": [{"var": "orig_bytes"}, null]
        - "!=": [{"var": "resp_bytes"}, null]
