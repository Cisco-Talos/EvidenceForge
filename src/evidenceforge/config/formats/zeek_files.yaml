# zeek_files format definition — Zeek files.log format (JSON output) - File transfer metadata
#
# Category: network
# Standalone: yes (no cross-file dependencies)
# Note: Field names may be referenced by evaluation rules in config/evaluation/
#
# Full schema: see commands/eforge/references/config-formats.md

name: zeek_files
version: "1.0"
description: "Zeek files.log format (JSON output) - File transfer metadata"
category: network

fields:
  - name: ts
    type: timestamp
    required: true
    description: "Timestamp of file transfer"

  - name: fuid
    type: string
    required: true
    description: "File unique ID (F-prefix)"
    constraints:
      pattern: "^F[A-Za-z0-9]{16,18}$"

  - name: uid
    type: string
    required: true
    description: "Connection UID (shared with conn.log)"
    constraints:
      pattern: "^[A-Za-z0-9]{17,19}$"

  - name: id.orig_h
    type: ip_address
    required: true
    description: "Source IP address"

  - name: id.orig_p
    type: port
    required: true
    description: "Source port"

  - name: id.resp_h
    type: ip_address
    required: true
    description: "Destination IP address"

  - name: id.resp_p
    type: port
    required: true
    description: "Destination port"

  - name: source
    type: string
    required: true
    description: "Protocol source (HTTP, SSL, SMTP)"

  - name: depth
    type: integer
    required: true
    description: "Directory depth"

  - name: analyzers
    type: string
    required: false
    description: "Analyzers array (rendered as JSON array)"

  - name: mime_type
    type: string
    required: false
    description: "MIME type"

  - name: duration
    type: float
    required: false
    description: "Transfer duration in seconds"

  - name: local_orig
    type: boolean
    required: false
    description: "Originator is local?"

  - name: is_orig
    type: boolean
    required: true
    description: "Is file from originator?"

  - name: seen_bytes
    type: integer
    required: true
    description: "Bytes observed"

  - name: total_bytes
    type: integer
    required: false
    description: "Total bytes expected"

  - name: missing_bytes
    type: integer
    required: true
    description: "Missing bytes"

  - name: overflow_bytes
    type: integer
    required: true
    description: "Overflow bytes"

  - name: timedout
    type: boolean
    required: true
    description: "Did transfer timeout?"

output:
  format: json
  file_extension: ".json"
  encoding: utf-8
  template: |
    {
      "ts": {{ ts | tojson }},
      "fuid": {{ fuid | tojson }},
      "uid": {{ uid | tojson }},
      "id.orig_h": {{ data['id.orig_h'] | tojson }},
      "id.orig_p": {{ data['id.orig_p'] | tojson }},
      "id.resp_h": {{ data['id.resp_h'] | tojson }},
      "id.resp_p": {{ data['id.resp_p'] | tojson }},
      "source": {{ source | tojson }},
      "depth": {{ depth | tojson }}
      {%- if analyzers is not none %},
      "analyzers": {{ analyzers | tojson }}
      {%- endif %}
      {%- if mime_type is not none %},
      "mime_type": {{ mime_type | tojson }}
      {%- endif %}
      {%- if duration is not none %},
      "duration": {{ duration | tojson }}
      {%- endif %}
      {%- if local_orig is not none %},
      "local_orig": {{ local_orig | tojson }}
      {%- endif %},
      "is_orig": {{ is_orig | tojson }},
      "seen_bytes": {{ seen_bytes | tojson }}
      {%- if total_bytes is not none %},
      "total_bytes": {{ total_bytes | tojson }}
      {%- endif %},
      "missing_bytes": {{ missing_bytes | tojson }},
      "overflow_bytes": {{ overflow_bytes | tojson }},
      "timedout": {{ timedout | tojson }}
    }
