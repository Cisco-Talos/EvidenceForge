# Extra syslog program messages for baseline diversity.
#
# Each entry has:
#   app: syslog app_name
#   messages: list of message templates ({} placeholders filled at generation time)
#   distro: optional - "ubuntu" to restrict to Debian/Ubuntu (excluded on RHEL-like)
#   roles: optional - list of required host roles (any match = include)
#   exclude_roles: optional - list of host roles to suppress
#   system_types: optional - workstation/server/domain_controller scope
#   transient: optional - true if the process forks per invocation (random PID)
#
# If distro/roles/system_types are omitted, the entry appears on all Linux hosts.
#
# Depended on by: generation engine (syslog baseline diversity)
# Depends on: nothing — standalone (distro/role filters are soft matches)
#
# Full schema: see commands/eforge/references/config-extra-syslog-messages.md

programs:
  - app: NetworkManager
    system_types: [workstation]
    weight: 3
    messages:
      - "<info>  [{}] dhcp4 (ens160): state changed renew -> bound"
      - "<info>  [{}] device (ens160): state change: disconnected -> prepare"
      - "<info>  [{}] device (ens160): state change: ip-config -> activated"
      - "<info>  [{}] manager: NetworkManager state is now CONNECTED_GLOBAL"

  - app: dbus-daemon
    weight: 2
    messages:
      - "[system] Activating via systemd: service name='org.freedesktop.hostname1' unit='dbus-org.freedesktop.hostname1.service' requested by ':1.{}'"
      - "[system] Successfully activated service 'org.freedesktop.resolve1' for ':1.{}'"
      - "[system] Activating via systemd: service name='org.freedesktop.timedate1' unit='dbus-org.freedesktop.timedate1.service' requested by ':1.{}'"
      - "[system] Successfully activated service 'org.freedesktop.locale1' for ':1.{}'"
      - "[system] Activating via systemd: service name='org.freedesktop.login1' unit='dbus-org.freedesktop.login1.service' requested by ':1.{}'"

  - app: rsyslogd
    weight: 1
    messages:
      - "imuxsock: Acquired UNIX socket '/run/systemd/journal/syslog' fd {}"
      - '[origin software="rsyslogd"] rsyslogd was HUPed after config reload id {}'
      - "omfwd: remote syslog target stayed connected, action queue watermark {}"

  - app: sudo
    transient: true
    weight: 2
    params:
      sudo_user:
        - admin
        - deploy
        - ops
        - ubuntu
        - svc_app
        - backup
      tty:
        - pts/0
        - pts/1
        - pts/2
        - pts/3
        - pts/5
      cwd:
        - /home/admin
        - /home/deploy
        - /home/ops
        - /srv/app
        - /etc
        - /var/log
        - /tmp
      service:
        - ssh
        - cron
        - app-agent
        - nginx
        - apache2
        - mysql
        - postgresql
      sudo_command:
        - /bin/systemctl status {service}
        - /bin/systemctl restart {service}
        - /usr/bin/journalctl -u {service} -n 50
        - /usr/bin/journalctl -u {service} --since "30 min ago"
        - /usr/bin/apt list --upgradable
        - /usr/bin/apt-cache policy openssl
        - /usr/bin/tail -n 100 /var/log/auth.log
        - /usr/bin/tail -n 80 /var/log/syslog
        - /usr/bin/grep -i error /var/log/syslog
        - /usr/bin/ss -ltnp
        - /usr/bin/lsblk
        - /usr/bin/df -h /var
        - /usr/bin/du -sh /var/log
        - /usr/bin/find /var/log -type f -mtime -1
        - /usr/sbin/service {service} status
    messages:
      - "{sudo_user} : TTY={tty} ; PWD={cwd} ; USER=root ; COMMAND={sudo_command}"

  - app: sudo
    transient: true
    roles: [web_server, forward_proxy]
    weight: 1
    params:
      web_user:
        - www-data
        - nginx
        - apache
      denied_command:
        - /bin/cat /etc/shadow
        - /usr/bin/head /etc/shadow
        - /usr/bin/tail /var/log/auth.log
        - /usr/bin/find /root -maxdepth 1
        - /usr/bin/id
        - /usr/bin/curl -s http://169.254.169.254/latest/meta-data/
        - /bin/ls /root
        - /usr/bin/grep -R password /etc
      denied_tty:
        - unknown
        - pts/0
        - pts/2
    messages:
      - "{web_user} : command not allowed ; TTY={denied_tty} ; USER=root ; COMMAND={denied_command}"

  - app: dhclient
    messages:
      - "DHCPREQUEST for {ip} on ens160 to {server} port 67"
      - "DHCPACK of {ip} from {server}"
      - "bound to {ip} -- renewal in {renewal} seconds."

  - app: polkitd
    weight: 2
    params:
      auth_subject:
        - unix-process
        - unix-session
        - system-bus-name
    messages:
      - "Registered Authentication Agent for {auth_subject}:{0} (system bus name :1.{0})"
      - "Unregistered Authentication Agent for {auth_subject}:{0} (system bus name :1.{0})"
      - "Operator of unix-process:{} successfully authenticated as 'root'"

  - app: multipathd
    system_types: [server]
    roles: [database]
    weight: 1
    params:
      device:
        - sda
        - sdb
        - dm-0
      active_paths:
        - "1"
        - "2"
    messages:
      - "{device}: add missing path"
      - "{device}: remaining active paths: {active_paths}"

  - app: accounts-daemon
    system_types: [workstation]
    weight: 1
    params:
      desktop_user:
        - admin
        - ubuntu
        - deploy
    messages:
      - "user '{desktop_user}' has logged in"

  - app: packagekitd
    system_types: [workstation]
    distro: ubuntu
    weight: 1
    messages:
      - "search-names transaction /{}"
      - "resolve transaction /{}"
      - "get-updates transaction /{}"

  - app: unattended-upgr
    distro: ubuntu
    system_types: [server]
    weight: 1
    params:
      origin_set:
        - "o=Ubuntu,a=jammy-security"
        - "o=Ubuntu,a=jammy-updates"
        - "o=Ubuntu,a=jammy; o=Ubuntu,a=jammy-security"
      package_name:
        - openssl
        - ca-certificates
        - base-files
        - libc6
        - python3-apt
        - tzdata
    messages:
      - "Allowed origins are: {origin_set}"
      - "Checking for unattended upgrades from {origin_set}"
      - "No packages found that can be upgraded unattended (run {})"
      - "Package {package_name} kept back for phased update percentage {}"
      - "dpkg --status-fd: processing triggers for man-db ({package_name})"

  - app: systemd-resolved
    distro: ubuntu
    weight: 1
    params:
      feature_set:
        - UDP
        - TCP
        - UDP+EDNS0
      trust_anchor:
        - "20326 8 2 e06d44b80b8f1d39a95c0b0d7c65d08458e880409bbc683457104237c7f8ec8d"
        - "38696 8 2 683d2d0acb8c9b712a1948b27f741219298d0a450d612c483af444a4c0fb2b16"
        - "20326 8 1 2f6d2c6bdab2a2d15eb06fcddcb0b195"
    messages:
      - "Using degraded feature set {feature_set} instead of UDP+EDNS0 for DNS server {dns_server} after transaction {0}."
      - "Grace period over, resuming full feature set {feature_set} for DNS server {dns_server} after probe {0}."
      - "Positive Trust Anchors: . IN DS {trust_anchor}"
      - "Cache miss for transaction {}, retrying DNS server {dns_server} with {feature_set}."

  - app: thermald
    system_types: [workstation]
    weight: 1
    params:
      cooling_device:
        - "0"
        - "1"
      zone:
        - x86_pkg_temp
        - acpitz
    messages:
      - "Unsupported cpu model, use default config"
      - "cooling device {cooling_device} intel_powerclamp type: 0x02"
      - "thermal zone {zone}: trip point updated"

  - app: irqbalance
    weight: 1
    params:
      cpu:
        - "0"
        - "1"
        - "2"
        - "3"
      numa_node:
        - "0"
        - "1"
    messages:
      - "Balancing is ineffective: IRQs are pinned by affinity policy on CPU {cpu} during sample {0}"
      - "IRQ {} affinity hint keeps vector on CPU {cpu}"
      - "NUMA node {numa_node}: no movable IRQs found during rebalance pass {0}"
