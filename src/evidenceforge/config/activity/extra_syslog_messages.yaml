# Extra syslog program messages for baseline diversity.
#
# Each entry has:
#   app: syslog app_name
#   messages: list of message templates ({} placeholders filled at generation time)
#   distro: optional - "ubuntu" to restrict to Debian/Ubuntu (excluded on RHEL-like)
#   roles: optional - list of required host roles (any match = include)
#   exclude_roles: optional - list of host roles to suppress
#   system_types: optional - workstation/server/domain_controller scope
#   transient: optional - true if the process forks per invocation (random PID)
#
# If distro/roles/system_types are omitted, the entry appears on all Linux hosts.
#
# Depended on by: generation engine (syslog baseline diversity)
# Depends on: nothing — standalone (distro/role filters are soft matches)
#
# Full schema: see commands/eforge/references/config-extra-syslog-messages.md

programs:
  - app: NetworkManager
    system_types: [workstation]
    weight: 3
    messages:
      - "<info>  [{}] dhcp4 (ens160): state changed renew -> bound"
      - "<info>  [{}] device (ens160): state change: disconnected -> prepare"
      - "<info>  [{}] device (ens160): state change: ip-config -> activated"
      - "<info>  [{}] manager: NetworkManager state is now CONNECTED_GLOBAL"

  - app: dbus-daemon
    weight: 2
    messages:
      - "[system] Activating via systemd: service name='org.freedesktop.hostname1' unit='dbus-org.freedesktop.hostname1.service' requested by ':1.{}'"
      - "[system] Successfully activated service 'org.freedesktop.resolve1' for ':1.{}'"
      - "[system] Activating via systemd: service name='org.freedesktop.timedate1' unit='dbus-org.freedesktop.timedate1.service' requested by ':1.{}'"
      - "[system] Successfully activated service 'org.freedesktop.locale1' for ':1.{}'"
      - "[system] Activating via systemd: service name='org.freedesktop.login1' unit='dbus-org.freedesktop.login1.service' requested by ':1.{}'"

  - app: rsyslogd
    weight: 1
    params:
      action_name:
        - send_remote
        - fwd_core
        - local_file
        - dyn_file_cache
      conf_file:
        - /etc/rsyslog.d/20-forwarding.conf
        - /etc/rsyslog.d/50-default.conf
        - /etc/rsyslog.conf
      module_name:
        - imjournal
        - imuxsock
        - omfwd
        - omfile
      queue_name:
        - fwdRule1
        - action-remote
        - main
        - local-spool
      relay_target:
        - logrelay01
        - siem-forwarder
        - 10.10.2.30
      worker_count:
        - "1"
        - "2"
        - "3"
    messages:
      - "imuxsock: Acquired UNIX socket '/run/systemd/journal/syslog' fd {}"
      - "configuration reload completed after SIGHUP, reload id {}"
      - "omfwd: target {relay_target} using disk-assisted queue {queue_name}, checkpoint {}"
      - "action '{action_name}' resumed after retry {}, next retry disabled"
      - "module {module_name}: worker thread pool adjusted to {worker_count}"
      - "configuration file {conf_file} reloaded, checksum {}"
      - "main Q: queue {queue_name} has {} messages pending, worker threads {worker_count}"

  - app: sudo
    transient: true
    weight: 1
    params:
      sudo_user:
        - admin
        - deploy
        - ops
        - ubuntu
        - svc_app
        - backup
      tty:
        - pts/0
        - pts/1
        - pts/2
        - pts/3
        - pts/5
      cwd:
        - /home/admin
        - /home/deploy
        - /home/ops
        - /srv/app
        - /etc
        - /var/log
        - /tmp
      service:
        - ssh
        - cron
        - app-agent
        - auditd
        - nginx
        - apache2
        - mysql
        - php-fpm
        - postgresql
        - rsyslog
        - systemd-resolved
      sudo_command:
        - /bin/systemctl status {service}
        - /bin/systemctl restart {service}
        - /usr/bin/journalctl -u {service} -n 50
        - /usr/bin/journalctl -u {service} --since "30 min ago"
        - /usr/bin/systemctl list-timers --all --no-pager
        - /usr/bin/systemctl list-units --state=failed --no-pager
        - /usr/bin/systemd-analyze blame
        - /usr/bin/apt list --upgradable
        - /usr/bin/apt-cache policy openssl
        - /usr/bin/apt-get -s upgrade
        - /usr/bin/needrestart -b
        - /usr/bin/tail -n 100 /var/log/auth.log
        - /usr/bin/tail -n 80 /var/log/syslog
        - /usr/bin/grep -i error /var/log/syslog
        - /usr/bin/grep -i failed /var/log/auth.log
        - /usr/bin/grep -i oom /var/log/kern.log
        - /usr/bin/find /etc/systemd/system -maxdepth 2 -type l
        - /usr/bin/find /var/tmp -maxdepth 1 -mtime +7 -type f
        - /usr/bin/ss -ltnp
        - /usr/sbin/ss -s
        - /usr/bin/lsof -i -P -n
        - /usr/sbin/iptables -L -n -v
        - /usr/bin/lsblk
        - /usr/bin/df -h /var
        - /usr/bin/free -m
        - /usr/bin/vmstat 1 5
        - /usr/bin/iostat -xz 1 3
        - /usr/bin/du -sh /var/log
        - /usr/bin/find /var/log -type f -mtime -1
        - /usr/sbin/service {service} status
    messages:
      - "{sudo_user} : TTY={tty} ; PWD={cwd} ; USER=root ; COMMAND={sudo_command}"

  - app: cron
    weight: 1
    params:
      cron_user:
        - root
        - sysstat
      cron_command:
        - /usr/sbin/logrotate /etc/logrotate.conf
        - test -x /usr/sbin/anacron || run-parts --report /etc/cron.daily
        - command -v debian-sa1 > /dev/null && debian-sa1 1 1
        - /usr/lib/apt/apt.systemd.daily
        - /usr/bin/find /tmp -xdev -type f -mtime +10 -delete
        - /usr/bin/test -x /usr/lib/update-notifier/update-motd-reboot-required && /usr/lib/update-notifier/update-motd-reboot-required
    messages:
      - "({cron_user}) CMD ({cron_command})"

  - app: anacron
    distro: ubuntu
    system_types: [server, workstation]
    weight: 1
    params:
      job_name:
        - cron.daily
        - cron.weekly
        - logrotate
      delay_minutes:
        - "2"
        - "5"
        - "11"
        - "17"
      run_count:
        - "1"
        - "2"
    messages:
      - "Anacron 2.3 started on {}"
      - "Will run job `{job_name}' in {delay_minutes} min."
      - "Job `{job_name}' started"
      - "Job `{job_name}' terminated"
      - "Normal exit ({run_count} job run)"

  - app: sudo
    transient: true
    roles: [web_server, forward_proxy]
    weight: 1
    params:
      web_user:
        - www-data
        - nginx
        - apache
      denied_command:
        - /bin/cat /etc/shadow
        - /usr/bin/head /etc/shadow
        - /usr/bin/tail /var/log/auth.log
        - /usr/bin/find /root -maxdepth 1
        - /usr/bin/id
        - /usr/bin/curl -s http://169.254.169.254/latest/meta-data/
        - /bin/ls /root
        - /usr/bin/grep -R password /etc
      denied_tty:
        - unknown
        - pts/0
        - pts/2
    messages:
      - "{web_user} : command not allowed ; TTY={denied_tty} ; USER=root ; COMMAND={denied_command}"

  - app: dhclient
    messages:
      - "DHCPREQUEST for {ip} on ens160 to {server} port 67"
      - "DHCPACK of {ip} from {server}"
      - "bound to {ip} -- renewal in {renewal} seconds."

  - app: polkitd
    weight: 2
    params:
      auth_subject:
        - unix-process
        - unix-session
        - system-bus-name
    messages:
      - "Registered Authentication Agent for {auth_subject}:{0} (system bus name :1.{0})"
      - "Unregistered Authentication Agent for {auth_subject}:{0} (system bus name :1.{0})"
      - "Operator of unix-process:{} successfully authenticated as 'root'"

  - app: multipathd
    system_types: [server]
    roles: [database]
    weight: 1
    params:
      device:
        - sda
        - sdb
        - dm-0
      active_paths:
        - "1"
        - "2"
    messages:
      - "{device}: add missing path"
      - "{device}: remaining active paths: {active_paths}"

  - app: accounts-daemon
    system_types: [workstation]
    weight: 1
    params:
      desktop_user:
        - admin
        - ubuntu
        - deploy
    messages:
      - "user '{desktop_user}' has logged in"

  - app: packagekitd
    system_types: [workstation]
    distro: ubuntu
    weight: 1
    messages:
      - "search-names transaction /{}"
      - "resolve transaction /{}"
      - "get-updates transaction /{}"

  - app: unattended-upgr
    distro: ubuntu
    system_types: [server]
    weight: 1
    params:
      origin_set:
        - "o=Ubuntu,a=jammy-security"
        - "o=Ubuntu,a=jammy-updates"
        - "o=Ubuntu,a=jammy; o=Ubuntu,a=jammy-security"
      package_name:
        - openssl
        - ca-certificates
        - base-files
        - libc6
        - python3-apt
        - tzdata
    messages:
      - "Allowed origins are: {origin_set}"
      - "Checking for unattended upgrades from {origin_set}"
      - "No packages found that can be upgraded unattended (run {})"
      - "Package {package_name} kept back for phased update percentage {}"
      - "dpkg --status-fd: processing triggers for man-db ({package_name})"

  - app: systemd-resolved
    distro: ubuntu
    weight: 1
    params:
      feature_set:
        - UDP
        - TCP
        - UDP+EDNS0
      degraded_feature_set:
        - UDP
        - TCP
      scope:
        - global
        - eth0
        - ens160
        - br0
      cache_bucket:
        - positive
        - negative
        - stale
      packet_size:
        - "512"
        - "1232"
        - "1472"
    messages:
      - "Using degraded feature set {degraded_feature_set} instead of UDP+EDNS0 for DNS server {dns_server} after transaction {0}."
      - "Grace period over, resuming full feature set UDP+EDNS0 for DNS server {dns_server} after probe {0}."
      - "Flushed {cache_bucket} cache scope {scope} after DNS server {dns_server} changed features."
      - "Transaction {0} switched to {feature_set} with advertised UDP packet size {packet_size}."

  - app: thermald
    system_types: [workstation]
    weight: 1
    params:
      cooling_device:
        - "0"
        - "1"
      zone:
        - x86_pkg_temp
        - acpitz
    messages:
      - "Unsupported cpu model, use default config"
      - "cooling device {cooling_device} intel_powerclamp type: 0x02"
      - "thermal zone {zone}: trip point updated"

  - app: irqbalance
    weight: 1
    params:
      cpu:
        - "0"
        - "1"
        - "2"
        - "3"
      numa_node:
        - "0"
        - "1"
      irq:
        - "16"
        - "24"
        - "32"
        - "45"
        - "64"
        - "86"
        - "122"
        - "137"
        - "154"
        - "181"
      device:
        - ens160
        - nvme0q1
        - ahci
        - virtio0-input
        - mlx5_comp0
      affinity_mask:
        - "00000001"
        - "00000002"
        - "00000004"
        - "00000008"
      moved:
        - "0"
        - "1"
        - "2"
    messages:
      - "IRQ {irq} affinity hint keeps vector on CPU {cpu} ({device})"
      - "IRQ {irq} classified for CPU {cpu} balancing on {device}"
      - "Skipping IRQ {irq}: banned by affinity mask {affinity_mask} ({device})"
      - "NUMA node {numa_node}: balancing pass complete, {moved} IRQs moved"
