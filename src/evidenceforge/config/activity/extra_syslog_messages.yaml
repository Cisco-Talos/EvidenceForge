# Extra syslog program messages for baseline diversity.
#
# Each entry has:
#   app: syslog app_name
#   messages: list of message templates ({} placeholders filled at generation time)
#   distro: optional - "ubuntu" to restrict to Debian/Ubuntu (excluded on RHEL-like)
#   roles: optional - list of required host roles (any match = include)
#   transient: optional - true if the process forks per invocation (random PID)
#
# If distro/roles are omitted, the entry appears on all Linux hosts.
#
# Depended on by: generation engine (syslog baseline diversity)
# Depends on: nothing — standalone (distro/role filters are soft matches)
#
# Full schema: see commands/eforge/references/config-extra-syslog-messages.md

programs:
  - app: NetworkManager
    messages:
      - "<info>  [{}] dhcp4 (ens160): state changed renew -> bound"
      - "<info>  [{}] device (ens160): state change: disconnected -> prepare"
      - "<info>  [{}] device (ens160): state change: ip-config -> activated"
      - "<info>  [{}] manager: NetworkManager state is now CONNECTED_GLOBAL"

  - app: dbus-daemon
    messages:
      - "[system] Activating via systemd: service name='org.freedesktop.hostname1'"
      - "[system] Successfully activated service 'org.freedesktop.resolve1'"
      - "[system] Activating via systemd: service name='org.freedesktop.timedate1'"

  - app: rsyslogd
    weight: 1
    messages:
      - "imuxsock: Acquired UNIX socket '/run/systemd/journal/syslog'"
      - '[origin software="rsyslogd"] rsyslogd was HUPed'

  - app: sudo
    transient: true
    weight: 2
    params:
      sudo_user:
        - admin
        - deploy
        - ops
        - ubuntu
        - svc_app
        - backup
      tty:
        - pts/0
        - pts/1
        - pts/2
        - pts/3
        - pts/5
      cwd:
        - /home/admin
        - /home/deploy
        - /home/ops
        - /srv/app
        - /etc
        - /var/log
        - /tmp
      service:
        - ssh
        - cron
        - app-agent
        - nginx
        - apache2
        - mysql
        - postgresql
      sudo_command:
        - /bin/systemctl status {service}
        - /bin/systemctl restart {service}
        - /usr/bin/journalctl -u {service} -n 50
        - /usr/bin/journalctl -u {service} --since "30 min ago"
        - /usr/bin/apt list --upgradable
        - /usr/bin/apt-cache policy openssl
        - /usr/bin/tail -n 100 /var/log/auth.log
        - /usr/bin/tail -n 80 /var/log/syslog
        - /usr/bin/grep -i error /var/log/syslog
        - /usr/bin/ss -ltnp
        - /usr/bin/lsblk
        - /usr/bin/df -h /var
        - /usr/bin/du -sh /var/log
        - /usr/bin/find /var/log -type f -mtime -1
        - /usr/sbin/service {service} status
    messages:
      - "{sudo_user} : TTY={tty} ; PWD={cwd} ; USER=root ; COMMAND={sudo_command}"

  - app: sudo
    transient: true
    roles: [web_server, forward_proxy]
    weight: 1
    params:
      web_user:
        - www-data
        - nginx
        - apache
      denied_command:
        - /bin/cat /etc/shadow
        - /usr/bin/head /etc/shadow
        - /usr/bin/tail /var/log/auth.log
        - /usr/bin/find /root -maxdepth 1
        - /usr/bin/id
        - /usr/bin/curl -s http://169.254.169.254/latest/meta-data/
        - /bin/ls /root
        - /usr/bin/grep -R password /etc
      denied_tty:
        - unknown
        - pts/0
        - pts/2
    messages:
      - "{web_user} : command not allowed ; TTY={denied_tty} ; USER=root ; COMMAND={denied_command}"

  - app: dhclient
    messages:
      - "DHCPREQUEST for {ip} on ens160 to {server} port 67"
      - "DHCPACK of {ip} from {server}"
      - "bound to {ip} -- renewal in {renewal} seconds."

  - app: polkitd
    messages:
      - "Registered Authentication Agent for unix-process"
      - "Unregistered Authentication Agent for unix-process"
      - "Operator of unix-process:{} successfully authenticated as 'root'"

  - app: multipathd
    messages:
      - "sda: add missing path"
      - "sda: remaining active paths: 1"

  - app: accounts-daemon
    weight: 1
    messages:
      - "user 'admin' has logged in"

  - app: packagekitd
    messages:
      - "search-names transaction /{}"

  - app: unattended-upgr
    distro: ubuntu
    messages:
      - "Allowed origins are: o=Ubuntu,a=jammy"
      - "No packages found that can be upgraded unattended"
      - "dpkg --status-fd: processing triggers for man-db"

  - app: systemd-resolved
    distro: ubuntu
    messages:
      - "Using degraded feature set UDP instead of UDP+EDNS0 for DNS server {dns_server}."
      - "Grace period over, resuming full feature set for DNS server {dns_server}."
      - "Positive Trust Anchors: . IN DS 20326"

  - app: thermald
    messages:
      - "Unsupported cpu model, use default config"
      - "cooling device 0 intel_powerclamp type: 0x02"

  - app: irqbalance
    weight: 1
    messages:
      - "Balancing is ineffective IRQs are pinned and balanced"
