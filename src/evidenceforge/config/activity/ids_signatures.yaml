# Curated IDS signature pool for realistic false-positive alert generation.
#
# Sources:
#   - Snort Community Rules (sample_data/snort/snort_community/snort3-community-rules/sid-msg.map)
#   - Emerging Threats (sample_data/snort/emerging_threats/rules/sid-msg.map)
#
# Selection criteria: common false-positive triggers in enterprise environments.
# Excludes Suricata-internal SIDs (2100000-2299999 range).
#
# Fields:
#   sid: Snort/ET rule signature ID
#   rev: Rule revision number (from ET/Community ruleset — look up real values
#        in sample_data/snort/emerging_threats/rules/ before adding new entries)
#   message: Alert message text
#   classification: Snort classification string
#   priority: Alert priority (1=high, 2=medium, 3=low)
#   proto: Protocol (tcp, udp, icmp)
#   dst_port: Destination port the rule fires on (0 = any)
#   direction: "in" (external->internal) or "out" (internal->external)
#   target_services: Optional list of services the target system should run
#   target_os: Optional list of OS categories (windows, linux)
#   baseline_fp_allowed: Optional bool. Set false for signatures that require
#        source-native protocol/file artifacts the baseline false-positive
#        generator does not currently model.
#
# Depended on by: baseline.py (IDS alert generation)

signatures:
