# Traffic profiles: role-based and persona-based network connection patterns.
#
# Two sections:
#   role_traffic   — system-level connections based on host role
#     outbound: connections the host initiates (24/7)
#     inbound:  connections the host receives from other roles/external
#   persona_traffic — user-initiated connections during active sessions
#
# Connection entry fields:
#   role:      the other end of the connection. For outbound, this is the
#              destination; for inbound, this is the source. Special values:
#     _external    — random external IP (via dns_registry domain-first selection)
#     _any_server  — any system with type server or domain_controller
#     _any         — any system in the scenario
#     _dc          — alias for domain_controller
#   port:      destination port (for outbound) or listening port (for inbound)
#   proto:     tcp | udp (default: tcp)
#   service:   Zeek service label (optional)
#   weight:    relative frequency weight (higher = more connections)
#   os:        restrict to hosts with this OS: windows | linux (optional)
#   emit_dns:  emit a preceding DNS lookup (default: false)
#   dns_tags:  list of dns_registry tags for _external resolution (optional)
#              Falls back to ["background", <source_os>] if omitted.
#   description: human-readable note (optional, not used by engine)
#
# Depended on by: generation engine (drives all baseline network connections)
# Depends on: dns_registry.yaml (dns_tags must exist as tags on domains),
#             persona files (persona_traffic keys must match persona names)
#
# Full schema: see commands/eforge/references/config-traffic-profiles.md

role_traffic:

  domain_controller:
    outbound:
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 30, description: "AD replication"}
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 15, description: "Inter-DC Kerberos"}
      - {role: domain_controller, port: 53, proto: tcp, service: dns, weight: 10, description: "DNS zone transfer"}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 5, emit_dns: true, dns_tags: [background, windows], description: "CRL/OCSP/Windows Update"}
      - {role: _external, port: 80, proto: tcp, service: http, weight: 3, emit_dns: true, dns_tags: [background, windows], description: "CRL distribution point"}
      - {role: _any_server, port: 0, proto: icmp, weight: 5, description: "Monitoring pings"}
    inbound:
      - {role: _any, port: 88, proto: tcp, service: kerberos, weight: 40, description: "Kerberos auth from all hosts"}
      - {role: _any, port: 389, proto: tcp, service: ldap, weight: 30, description: "LDAP queries from all hosts"}
      - {role: _any, port: 53, proto: udp, service: dns, weight: 20, description: "DNS queries from all hosts"}
      - {role: _any, port: 445, proto: tcp, service: smb, weight: 10, description: "SYSVOL/GPO access"}

  file_server:
    outbound:
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 20}
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 10}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 3, emit_dns: true, description: "Windows Update"}
      - {role: _any_server, port: 0, proto: icmp, weight: 3, description: "Monitoring pings"}
    inbound:
      - {role: workstation, port: 445, proto: tcp, service: smb, weight: 60, description: "User file access"}
      - {role: _any_server, port: 445, proto: tcp, service: smb, weight: 15, description: "Server-to-server file share"}

  database:
    outbound:
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 15, os: windows}
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 10, os: windows}
      - {role: database, port: 1433, proto: tcp, service: mssql, weight: 20, os: windows, description: "Replication/AG"}
      - {role: database, port: 5432, proto: tcp, service: postgresql, weight: 20, os: linux, description: "Replication"}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 2, emit_dns: true, description: "Updates"}
    inbound:
      - {role: web_server, port: 3306, proto: tcp, service: mysql, weight: 40, description: "Web app queries (MySQL)"}
      - {role: web_server, port: 5432, proto: tcp, service: postgresql, weight: 40, description: "Web app queries (PG)"}
      - {role: web_server, port: 1433, proto: tcp, service: mssql, weight: 30, description: "Web app queries (MSSQL)"}
      - {role: app_server, port: 1433, proto: tcp, service: mssql, weight: 25, description: "App tier queries"}
      - {role: app_server, port: 5432, proto: tcp, service: postgresql, weight: 25}

  web_server:
    outbound:
      - {role: database, port: 1433, proto: tcp, service: mssql, weight: 40, description: "App-to-DB queries"}
      - {role: database, port: 3306, proto: tcp, service: mysql, weight: 40}
      - {role: database, port: 5432, proto: tcp, service: postgresql, weight: 40}
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 10, description: "Auth lookups"}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 5, emit_dns: true, description: "Outbound API calls"}
    inbound:
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 60, description: "HTTPS from internet clients"}
      - {role: _external, port: 80, proto: tcp, service: http, weight: 30, description: "HTTP from internet clients"}
      - {role: workstation, port: 443, proto: tcp, service: ssl, weight: 10, description: "Internal users accessing web apps"}

  app_server:
    outbound:
      - {role: database, port: 1433, proto: tcp, service: mssql, weight: 35}
      - {role: database, port: 5432, proto: tcp, service: postgresql, weight: 35}
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 15}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 10, emit_dns: true, description: "APIs/webhooks"}
    inbound:
      - {role: web_server, port: 8080, proto: tcp, service: http, weight: 40, description: "Frontend to backend API"}
      - {role: web_server, port: 443, proto: tcp, service: ssl, weight: 30, description: "Internal HTTPS API"}
      - {role: workstation, port: 443, proto: tcp, service: ssl, weight: 10, description: "Admin/dev direct access"}

  mail_server:
    outbound:
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 20, description: "Recipient lookup"}
      - {role: _external, port: 25, proto: tcp, service: smtp, weight: 30, description: "Outbound mail relay"}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 5, emit_dns: true, description: "Anti-spam/update checks"}
    inbound:
      - {role: _external, port: 25, proto: tcp, service: smtp, weight: 50, description: "Inbound SMTP from internet"}
      - {role: workstation, port: 443, proto: tcp, service: ssl, weight: 30, description: "OWA/webmail access"}
      - {role: workstation, port: 993, proto: tcp, service: ssl, weight: 15, description: "IMAPS client access"}

  log_server:
    outbound:
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 10, os: windows}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 2, emit_dns: true, description: "Package updates only"}
    inbound:
      - {role: _any, port: 514, proto: udp, service: syslog, weight: 40, description: "Syslog from all hosts"}
      - {role: _any_server, port: 443, proto: tcp, service: ssl, weight: 20, description: "Agent-based log forwarding"}

  workstation:
    outbound:
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 15, os: windows}
      - {role: domain_controller, port: 389, proto: tcp, service: ldap, weight: 10, os: windows}
      - {role: file_server, port: 445, proto: tcp, service: smb, weight: 20, os: windows}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 10, emit_dns: true, dns_tags: [background, windows], description: "System updates/CRL/telemetry"}
    # Workstations generally don't receive inbound connections

  # Fallback for roles not explicitly listed
  _default:
    outbound:
      - {role: domain_controller, port: 88, proto: tcp, service: kerberos, weight: 10, os: windows}
      - {role: _external, port: 443, proto: tcp, service: ssl, weight: 10, emit_dns: true, dns_tags: [background], description: "System updates/background checks"}


persona_traffic:

  developer:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 35, emit_dns: true, dns_tags: [git, dev], description: "git/npm/pip/cargo registries and dev APIs"}
      - {role: _any_server, port: 22, service: ssh, weight: 25, description: "SSH to dev/staging servers"}
      - {role: database, port: 5432, service: postgresql, weight: 15, description: "Dev DB access"}
      - {role: database, port: 1433, service: mssql, weight: 10}
      - {role: _external, port: 443, service: ssl, weight: 15, emit_dns: true, dns_tags: [web, saas], description: "Docker Hub/CI-CD"}
      - {role: _external, port: 443, service: ssl, weight: 10, emit_dns: true, dns_tags: [storage], description: "Cloud storage sync (Drive/Dropbox/OneDrive)"}

  sysadmin:
    outbound:
      - {role: _any_server, port: 22, service: ssh, weight: 30, description: "Server management"}
      - {role: _any_server, port: 3389, service: rdp, weight: 20, os: windows, description: "RDP admin sessions"}
      - {role: _external, port: 443, service: ssl, weight: 15, emit_dns: true, dns_tags: [web, saas], description: "Monitoring dashboards"}
      - {role: _external, port: 443, service: ssl, weight: 5, emit_dns: true, dns_tags: [storage], description: "Cloud storage/backup sync"}
      - {role: domain_controller, port: 389, service: ldap, weight: 15, description: "AD management"}

  security_analyst:
    outbound:
      - {role: _any_server, port: 22, service: ssh, weight: 20, description: "Investigation access"}
      - {role: log_server, port: 443, service: ssl, weight: 30, description: "SIEM/log access"}
      - {role: _external, port: 443, service: ssl, weight: 25, emit_dns: true, dns_tags: [web], description: "Threat intel feeds"}
      - {role: _external, port: 443, service: ssl, weight: 8, emit_dns: true, dns_tags: [storage], description: "Cloud storage for reports/evidence"}

  data_analyst:
    outbound:
      - {role: database, port: 1433, service: mssql, weight: 30, description: "Data warehouse queries"}
      - {role: database, port: 5432, service: postgresql, weight: 25}
      - {role: _external, port: 443, service: ssl, weight: 30, emit_dns: true, description: "BI tools/dashboards"}
      - {role: _external, port: 443, service: ssl, weight: 10, emit_dns: true, dns_tags: [storage], description: "Cloud storage for datasets/reports"}
      - {role: file_server, port: 445, service: smb, weight: 15, os: windows}

  analyst:
    outbound:
      - {role: database, port: 1433, service: mssql, weight: 25, description: "Report queries"}
      - {role: _external, port: 443, service: ssl, weight: 40, emit_dns: true, dns_tags: [web, saas], description: "Dashboards/SaaS"}
      - {role: _external, port: 443, service: ssl, weight: 8, emit_dns: true, dns_tags: [storage], description: "Cloud storage for reports"}
      - {role: file_server, port: 445, service: smb, weight: 15, os: windows}

  executive:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 60, emit_dns: true, dns_tags: [email, saas], description: "Email/calendar/news"}
      - {role: file_server, port: 445, service: smb, weight: 20, os: windows}

  legal_counsel:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 60, emit_dns: true, dns_tags: [web, saas], description: "Legal research/email"}
      - {role: file_server, port: 445, service: smb, weight: 25, os: windows, description: "Document management"}

  sales:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 65, emit_dns: true, dns_tags: [web, saas], description: "CRM/email/web"}
      - {role: file_server, port: 445, service: smb, weight: 15, os: windows}

  marketing:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 60, emit_dns: true, dns_tags: [social, web], description: "Social media/analytics"}
      - {role: file_server, port: 445, service: smb, weight: 20, os: windows}

  hr:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 55, emit_dns: true, dns_tags: [saas, email], description: "HRIS/email"}
      - {role: file_server, port: 445, service: smb, weight: 25, os: windows}

  accountant:
    outbound:
      - {role: database, port: 1433, service: mssql, weight: 20, description: "Financial systems"}
      - {role: _external, port: 443, service: ssl, weight: 45, emit_dns: true, dns_tags: [saas, web], description: "Banking/ERP"}
      - {role: file_server, port: 445, service: smb, weight: 20, os: windows}

  help_desk:
    outbound:
      - {role: _any_server, port: 3389, service: rdp, weight: 25, os: windows, description: "Remote support"}
      - {role: _external, port: 443, service: ssl, weight: 40, emit_dns: true, dns_tags: [web, saas], description: "Ticketing/KB"}
      - {role: _external, port: 443, service: ssl, weight: 5, emit_dns: true, dns_tags: [storage], description: "Cloud storage for tools/docs"}
      - {role: domain_controller, port: 389, service: ldap, weight: 15, description: "AD password resets"}

  project_manager:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 60, emit_dns: true, dns_tags: [saas, web], description: "PM tools/email"}
      - {role: _external, port: 443, service: ssl, weight: 8, emit_dns: true, dns_tags: [storage], description: "Cloud storage for project docs"}
      - {role: file_server, port: 445, service: smb, weight: 20, os: windows}

  intern:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 55, emit_dns: true, dns_tags: [web, saas], description: "Web/email"}
      - {role: file_server, port: 445, service: smb, weight: 15, os: windows}

  receptionist:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 50, emit_dns: true, dns_tags: [saas, email], description: "Calendar/email"}
      - {role: file_server, port: 445, service: smb, weight: 10, os: windows}

  # Server-admin profile for remote admin sessions (RDP/SSH) on machines
  # that aren't the user's own workstation.  Used instead of the user's
  # regular persona profile to avoid generating workstation-style SaaS
  # traffic (Outlook, Teams, Chrome) on servers or other users' machines.
  _server_admin:
    outbound:
      # Windows server admin
      - {role: domain_controller, port: 389, service: ldap, weight: 20, os: windows, description: "AD queries/diagnostics"}
      - {role: domain_controller, port: 88, service: kerberos, weight: 10, os: windows, description: "Kerberos service ticket"}
      - {role: _any_server, port: 445, service: smb, weight: 15, os: windows, description: "Admin share access (C$/ADMIN$)"}
      # Linux server admin
      - {role: _any_server, port: 22, service: ssh, weight: 15, os: linux, description: "SSH to other servers"}
      - {role: _external, port: 443, service: ssl, weight: 10, os: linux, emit_dns: true, dns_tags: [background, linux], description: "apt/yum repos, package updates"}
      # Cross-platform
      - {role: log_server, port: 443, service: ssl, weight: 15, description: "Check centralized logs/SIEM"}
      - {role: _external, port: 443, service: ssl, weight: 10, emit_dns: true, dns_tags: [background], description: "Monitoring dashboards/patch checks"}
      - {role: _any_server, port: 0, proto: icmp, weight: 5, description: "Diagnostic pings"}

  # Fallback for personas not explicitly listed
  _default:
    outbound:
      - {role: _external, port: 443, service: ssl, weight: 50, emit_dns: true, dns_tags: [web, saas]}
      - {role: file_server, port: 445, service: smb, weight: 25, os: windows}
      - {role: domain_controller, port: 389, service: ldap, weight: 10, os: windows}
