# tls_issuers.yaml — TLS certificate issuer configurations for realistic x509 generation.
#
# Purpose: Defines CA issuers, validity ranges, and key type distributions
#          for generating realistic Zeek x509/SSL certificate log entries.
#
# Each issuer has validity parameters matching real CA practices.
# validity_days_min/max define a range; the engine picks uniformly within it.
#
# Depended on by: generation engine (Zeek x509/SSL certificate generation)
# Depends on: nothing — standalone
#
# Full schema: see commands/eforge/references/config-tls-issuers.md

issuers:
  - name: "CN=R3, O=Let's Encrypt, C=US"
    weight: 30
    validity_days_min: 89
    validity_days_max: 90
    not_before_max_days: 60
    key_types:
      - {type: "ecdsa", length: 256, weight: 70}
      - {type: "rsa", length: 2048, weight: 30}

  - name: "CN=E1, O=Let's Encrypt, C=US"
    weight: 10
    validity_days_min: 89
    validity_days_max: 90
    not_before_max_days: 60
    key_types:
      - {type: "ecdsa", length: 256, weight: 100}

  - name: "CN=DigiCert Global G2 TLS RSA SHA256 2020 CA1, O=DigiCert Inc, C=US"
    weight: 15
    validity_days_min: 365
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 50}
      - {type: "rsa", length: 4096, weight: 25}
      - {type: "ecdsa", length: 256, weight: 25}

  - name: "CN=Sectigo RSA Domain Validation Secure Server CA, O=Sectigo Limited, L=Salford, ST=Greater Manchester, C=GB"
    weight: 10
    validity_days_min: 90
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 70}
      - {type: "rsa", length: 4096, weight: 20}
      - {type: "ecdsa", length: 256, weight: 10}

  - name: "CN=GTS CA 1C3, O=Google Trust Services LLC, C=US"
    weight: 15
    validity_days_min: 89
    validity_days_max: 90
    not_before_max_days: 60
    key_types:
      - {type: "ecdsa", length: 256, weight: 80}
      - {type: "rsa", length: 2048, weight: 20}

  - name: "CN=Amazon RSA 2048 M01, O=Amazon, C=US"
    weight: 10
    validity_days_min: 365
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 85}
      - {type: "ecdsa", length: 256, weight: 15}

  - name: "CN=GlobalSign Atlas R3 DV TLS CA 2024 Q1, O=GlobalSign nv-sa, C=BE"
    weight: 10
    validity_days_min: 90
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 50}
      - {type: "ecdsa", length: 256, weight: 50}

  - name: "CN=DigiCert SHA2 Extended Validation Server CA, O=DigiCert Inc, C=US"
    weight: 0  # Only used via domain_ca_overrides
    validity_days_min: 365
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 60}
      - {type: "rsa", length: 4096, weight: 30}
      - {type: "ecdsa", length: 256, weight: 10}

  - name: "CN=Microsoft Azure RSA TLS Issuing CA 08, O=Microsoft Corporation, C=US"
    weight: 0  # Only used via domain_ca_overrides
    validity_days_min: 365
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "rsa", length: 2048, weight: 90}
      - {type: "ecdsa", length: 256, weight: 10}

  - name: "CN=Cloudflare Inc ECC CA-3, O=Cloudflare Inc, C=US"
    weight: 0  # Only used via domain_ca_overrides
    validity_days_min: 14
    validity_days_max: 90
    not_before_max_days: 60
    key_types:
      - {type: "ecdsa", length: 256, weight: 100}

  - name: "CN=Apple Public EV Server ECC CA 1 - G1, O=Apple Inc., C=US"
    weight: 0  # Only used via domain_ca_overrides
    validity_days_min: 365
    validity_days_max: 397
    not_before_max_days: 300
    key_types:
      - {type: "ecdsa", length: 256, weight: 80}
      - {type: "rsa", length: 2048, weight: 20}

  - name: "CN=Acme Enterprise Issuing CA, O=Acme Corp, C=US"
    weight: 0  # Only used for private/internal domains via domain_ca_overrides
    validity_days_min: 180
    validity_days_max: 825
    not_before_max_days: 730
    key_types:
      - {type: "rsa", length: 2048, weight: 65}
      - {type: "rsa", length: 4096, weight: 25}
      - {type: "ecdsa", length: 256, weight: 10}

# Domain-to-CA overrides: well-known domains must use their real CA.
# Patterns use fnmatch glob syntax. First match wins.
domain_ca_overrides:
  "*.test": "CN=Acme Enterprise Issuing CA, O=Acme Corp, C=US"
  "*.local": "CN=Acme Enterprise Issuing CA, O=Acme Corp, C=US"
  "*.internal": "CN=Acme Enterprise Issuing CA, O=Acme Corp, C=US"
