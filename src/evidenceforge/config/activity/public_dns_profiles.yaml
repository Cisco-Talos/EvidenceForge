# public_dns_profiles.yaml - provider-style public DNS answer profiles.
#
# Purpose: Keeps public NS/MX/SOA companion answers from collapsing into
#          generated-looking ns1/ns2, mail, and hostmaster templates.
#
# User customizations go in:
#   .eforge/config/activity/public_dns_profiles.yaml
#
# Overlay behavior: profile lists merge by name.

nameserver_profiles:
  - name: google
    weight: 0
    match_suffixes:
      - google.com
      - googleapis.com
      - gstatic.com
      - googleusercontent.com
      - googlevideo.com
      - pki.goog
      - youtube.com
    answer_sets:
      - ["ns1.google.com", "ns2.google.com", "ns3.google.com", "ns4.google.com"]
    soa_rnames: ["dns-admin.google.com"]

  - name: canonical
    weight: 0
