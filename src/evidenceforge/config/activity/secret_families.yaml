#
# Secret/credential families and safety markers for the `spillage` event type.
#
# DATA-DRIVEN, USER-CUSTOMIZABLE. The template engine, surface handlers,
# deterministic synthesis, safety validation and ground-truth writing live in
# CODE (evidenceforge/generation/spillage.py); the family definitions, value
# templates, carrier-line templates, marker policy and approved fakes below are
# DATA and may be extended via a project-local overlay at
# .eforge/config/activity/secret_families.yaml.
#
# Per spillage event a fresh value is synthesized from the family `value_template`
# (so the same family does not emit an identical literal every time), then a
# carrier line is chosen for the target surface and the value is rendered into it
# with surface-appropriate encoding.
#
# TEMPLATE TOKENS (expanded deterministically per event by the CODE engine):
#   {upper:N}    N chars from [A-Z0-9]
#   {alnum:N}    N chars from [A-Za-z0-9]
#   {lower:N}    N chars from [a-z0-9]
#   {hex:N}      N lowercase hex chars
#   {digits:N}   N digits
#   {host}       a random allowlisted host, e.g. db7.example.com
#   {dbhost}     a random allowlisted database host, e.g. pg3.example.net
#   {user}       a random fake account name, e.g. svc_app
#   {db}         a random fake database/app name, e.g. payments
#   {dbscheme}   one of postgresql / mysql / mongodb
#   {marker}     a random poison marker
# In `carriers`, the literal {value} is replaced with the surface-encoded secret.
#
# SAFETY: every value EvidenceForge emits must be provably synthetic. A value is
# accepted only if it contains a poison marker OR is listed in vendor_fakes, every
# credential-shaped token within it carries a marker (or overlaps a vendor fake),
# any embedded host is allowlisted (or RFC 5737/3849/1918), and it is single-line.
# These checks apply to synthesized values AND user-supplied `value:` literals and
# run at scenario-load time, so unsafe scenarios never reach generation.

# Substrings that mark a string as synthetic/test content. Case-sensitive.
poison_markers:
  - EvidenceForge
  - EVIDENCEFORGE
  - EvidenceForgeFake
  - EXAMPLE
  - DO_NOT_USE
  - EFORGE_TEST

# Vendor-published canonical fake credentials — documented, non-secret example
# values real detectors are expected to recognise. Allowlisted even without a
# marker, and usable as a fixed `value:` literal. Adding one requires a docs link.
vendor_fakes:
  - AKIAIOSFODNN7EXAMPLE                                     # AWS docs access key id
  - wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY                 # AWS docs secret access key
  - sk_test_4eC39HqLyjWDarjtT1zdp7dc                         # Stripe test secret key
  - pk_test_TYooMQauvdEDq54NiTphI7jx                         # Stripe test publishable key

# Hosts permitted to appear inside an emitted value. RFC 5737 IPv4 / RFC 3849
# IPv6 / RFC 1918 private ranges are also accepted by the code.
network_allowlist:
  domains:
    - example.com
    - example.org
    - example.net
    - example.test
    - invalid          # RFC 6761 reserved TLD (e.g. canary.eforge.invalid)

# Credential families. Each declares:
#   name          stable identifier referenced by `family:` in a spillage event
#   description   human-readable summary
#   structured    true for high-entropy, distinctively-shaped secrets (their regex
#                 participates in the per-token safety sweep); false for broad
#                 catch-all shapes (e.g. generic passwords) that would false-match
#   regex         a literal `value:` for this family must match this
#   value_template  per-event synthesis template (must match regex AND embed a
#                   poison marker INSIDE any credential-shaped/high-entropy token —
#                   a marker elsewhere in the value does not vouch for that token)
#   default_app   syslog app_name to attribute syslog_message emissions to
#   carriers      per-surface list of carrier-line templates (each must contain {value})
families:
  - name: aws_iam
    description: AWS IAM access key id (long-term credential).
    structured: true
    regex: "AKIA[0-9A-Z]{16}"
    value_template: "AKIA{upper:9}EXAMPLE"
    default_app: awscli
    carriers:
      shell_history:
        - "export AWS_ACCESS_KEY_ID={value}"
        - "aws configure set aws_access_key_id {value}"
        - "AWS_ACCESS_KEY_ID={value} aws s3 ls s3://{db}-backups/"
      process_command_line:  # local commands only (no implied outbound network)
        - "/usr/bin/aws configure set aws_access_key_id {value}"
        - "/usr/bin/env AWS_ACCESS_KEY_ID={value} aws configure list"
      process_command_line_windows:
        - "aws.exe configure set aws_access_key_id {value}"
        - "cmd.exe /c set AWS_ACCESS_KEY_ID={value}"
      syslog_message:
        - "awscli: loaded access key {value} from environment"
        - "boto3.credentials: found static credential AWS_ACCESS_KEY_ID={value}"
      http_request_url:
        - "/api/v1/integrations/aws/sync?access_key_id={value}&region=us-east-1"

  - name: github_pat
    description: GitHub personal access token (classic).
    structured: true
    regex: "ghp_[A-Za-z0-9]{36}"
    value_template: "ghp_EvidenceForgeFake{alnum:19}"
    default_app: git
    carriers:
      shell_history:
        - "export GITHUB_TOKEN={value}"
        - "git clone https://{value}@github-mirror.{host}/{db}.git"
        - "gh auth login --with-token {value}"
      process_command_line:  # local commands only (no implied outbound network)
        - "/usr/bin/git config --global http.extraheader 'AUTHORIZATION: bearer {value}'"
        - "/usr/bin/npm config set //npm.pkg.github.com/:_authToken={value}"
      process_command_line_windows:
        - 'git.exe config --global http.extraheader "AUTHORIZATION: bearer {value}"'
        - "cmd.exe /c set GH_TOKEN={value}"
      syslog_message:
        - "git-credential-store: stored token {value} for github-mirror.{host}"
      http_referrer:
        - "https://ci.{host}/build/logs?repo={db}&gh_token={value}"

  - name: github_fine_pat
    description: GitHub fine-grained personal access token.
    structured: true
    regex: "github_pat_[A-Za-z0-9_]{50,}"
    value_template: "github_pat_11EvidenceForgeFake{alnum:60}"
    default_app: git
    carriers:
      shell_history:
        - "export GH_TOKEN={value}"
        - "echo {value} | gh auth login --with-token"
      syslog_message:
        - "actions/runner: registered with fine-grained token {value}"

  - name: gcp_api_key
    description: Google Cloud API key.
    structured: true
    regex: "AIza[0-9A-Za-z_-]{35}"
    value_template: "AIzaEvidenceForgeFake{alnum:18}"
    default_app: gcloud
    carriers:
      shell_history:
        - "export GOOGLE_API_KEY={value}"
        - "curl 'https://maps.{host}/api/geocode/json?key={value}&address=hq'"
      process_command_line:  # local commands only (no implied outbound network)
        - "/usr/bin/env GOOGLE_API_KEY={value} gcloud info"
      process_command_line_windows:
        - "cmd.exe /c set GOOGLE_API_KEY={value}"
      syslog_message:
        - "gcloud.auth: using API key {value} for project {db}"
      http_request_url:
        - "/maps/api/geocode/json?key={value}&address=hq"
        - "/language/translate/v2?key={value}&q=hello&target=fr"

  - name: slack_token
    description: Slack bot/user OAuth token.
    structured: true
    regex: "xox[bp]-[0-9A-Za-z-]{20,}"
    value_template: "xoxb-{digits:11}-{digits:13}-EvidenceForgeFake{alnum:24}"
    default_app: app
    carriers:
      shell_history:
        - "export SLACK_BOT_TOKEN={value}"
        - "curl -H 'Authorization: Bearer {value}' https://slack.{host}/api/auth.test"
      syslog_message:
        - "alertbot: posting to slack with token {value}"
      http_request_url:
        - "/api/chat.postMessage?token={value}&channel=alerts&text=deploy+ok"

  - name: stripe_key
    description: Stripe test secret key.
    structured: true
    regex: "sk_test_[A-Za-z0-9]{24,}"
    value_template: "sk_test_EvidenceForgeFake{alnum:12}"
    default_app: app
    carriers:
      shell_history:
        - "export STRIPE_SECRET_KEY={value}"
        - "stripe listen --api-key {value}"
      syslog_message:
        - "billing-svc: initialised Stripe client with {value}"
      http_request_url:
        - "/v1/charges?api_key={value}&amount=4200&currency=usd"

  - name: jwt
    description: JSON Web Token (signed bearer).
    structured: true
    regex: "eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    value_template: "eyJhbGciOiJIUzI1NiJ9.{alnum:22}EvidenceForgeFake.{alnum:32}"
    default_app: app
    carriers:
      shell_history:
        - "export AUTH_JWT={value}"
        - "curl -H 'Authorization: Bearer {value}' https://api.{host}/v1/me"
      syslog_message:
        - "auth-gateway: accepted bearer {value} for {user}"
      http_request_url:
        - "/auth/verify?token={value}&redirect=/app"
      http_referrer:
        - "https://app.{host}/dashboard?jwt={value}"

  - name: db_uri
    description: Database connection URI with embedded credentials.
    structured: true
    regex: "(?:postgresql|postgres|mysql|mongodb)://[^@\\s]+@[^\\s/]+/\\S+"
    value_template: "{dbscheme}://{user}:EvidenceForgeFake{alnum:8}@{dbhost}/{db}"
    default_app: app
    carriers:
      shell_history:
        - "export DATABASE_URL={value}"
        - "psql {value} -c 'select 1'"
        - "echo 'DATABASE_URL={value}' >> .env"
      process_command_line:  # local; {value} in an unquoted slot (no nested quoting)
        - "/usr/bin/env DATABASE_URL={value} printenv DATABASE_URL"
        - "/usr/bin/printf 'DATABASE_URL=%s' {value}"
      process_command_line_windows:
        - "cmd.exe /c set DATABASE_URL={value}"
        - "setx.exe DATABASE_URL {value}"
      syslog_message:
        - "migrate: connecting to {value}"
        - "app[{user}]: DB pool opened dsn={value}"

  - name: bearer_token
    description: Generic API bearer/access token.
    structured: true
    regex: "EvidenceForgeFake[A-Za-z0-9_-]{12,}"
    value_template: "EvidenceForgeFake{alnum:24}"
    default_app: app
    carriers:
      shell_history:
        - "export API_TOKEN={value}"
        - "curl -H 'Authorization: Bearer {value}' https://api.{host}/v2/account"
      syslog_message:
        - "api-client: refreshed access token {value}"
      http_request_url:
        - "/v2/account?access_token={value}"
      http_referrer:
        - "https://portal.{host}/login?token={value}"

  - name: password_generic
    description: Generic cleartext password / shared secret.
    structured: false
    regex: "[A-Za-z0-9_!@#%^&*-]{12,}"
    value_template: "EvidenceForgeFake-{alnum:10}!"
    default_app: app
    carriers:
      shell_history:
        - "export APP_SECRET={value}"
        - "sshpass -p {value} scp dump.sql {user}@{host}:/tmp/"
        - "mysql -u {user} -p{value} {db}"
      syslog_message:
        - "sshd[{user}]: password authentication for {user} using {value}"
        - "app: loaded shared secret {value} from /etc/{db}/secret.conf"
