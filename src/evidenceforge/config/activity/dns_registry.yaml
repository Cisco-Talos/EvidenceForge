# Long-tail domain generation templates for connections beyond the curated pool.
# Used for the ~30% of web connections that need CDN/SaaS diversity.
long_tail:
  prefixes:
    - cdn
    - static
    - assets
    - media
    - images
    - api
    - app
    - www
    - analytics
    - tracking
    - metrics
    - widget
    - embed
    - sdk
    - js
    - fonts
    - styles
    - content
    - data
    - edge
    - cache
    - proxy
  brands:
    - acmehealth
    - medflow
    - carepoint
    - healthnexus
    - rxportal
    - docusync
    - patientiq
    - wellbridge
    - vitalsource
    - mediquant
    - clearstream
    - dataforge
    - cloudmetrics
    - fastreach
    - signalwire
    - pixeltrack
    - growthkit
    - eventpulse
    - renderbase
    - snapwidget
    - formstack
    - pollfish
    - typekit
    - loadbalance
    - netscaler
    - appdynamic
    - sentry
    - bugsnag
    - rollbar
    - newrelic
    - pagerduty
    - opsgenie
    - statuspage
    - pingdom
    - uptime
    - segment
    - mixpanel
    - amplitude
    - hotjar
    - fullstory
  tlds:
    - com
    - com
    - com
    - com  # weighted toward .com
    - io
    - io
    - net
    - org
    - co
    - dev
    - app

# CDN IP ranges for hash-based IP derivation (_domain_to_ip).
# Each entry is [first_octet, second_octet] — third and fourth are derived from domain hash.
cdn_ranges:
  - [104, 16]   # Cloudflare
  - [104, 18]   # Cloudflare
  - [151, 101]  # Fastly
  - [23, 45]    # Akamai
  - [23, 72]    # Akamai
  - [52, 84]    # AWS CloudFront
  - [54, 230]   # AWS CloudFront
  - [13, 107]   # Microsoft/Azure
  - [142, 250]  # Google
  - [172, 217]  # Google

