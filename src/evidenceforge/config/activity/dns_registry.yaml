# Unified DNS registry — single source of truth for all domain↔IP mappings.
#
# Tags determine which connection types use each domain:
#   web        — baseline user web browsing
#   saas       — SaaS application traffic
#   email      — email server connections
#   git        — source control
#   background — OS-level background HTTPS (updates, telemetry, CRL)
#   windows    — Windows-specific background traffic
#   linux      — Linux-specific background traffic
#   internal   — internal infrastructure (DB servers, etc.)
#   storage    — cloud storage (potential exfiltration targets)
#
# Each domain can have multiple IPs (realistic for CDN/cloud services).
# The loader builds REVERSE_DNS, FORWARD_DNS, and tag-based lookups from this data.
#
# Depended on by: traffic_profiles.yaml (dns_tags), proxy_uri_templates.yaml (domain keys),
#                 site_maps.yaml (domain keys)
# Depends on: nothing — this is the root data source
#
# Full schema: see commands/eforge/references/config-dns-registry.md

