# SMB file-transfer observations for Zeek files.log.
#
# Zeek's file analysis framework can observe SMB file content transfers when
# the SMB analyzer and file analysis are enabled. This config controls when a
# successful SMB connection gets a files.log companion row and what that row
# looks like.

min_transfer_bytes: 32768
missing_bytes_probability: 0.06
timeout_probability: 0.01

mime_types:
  - mime_type: application/vnd.openxmlformats-officedocument.wordprocessingml.document
    weight: 22
  - mime_type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
    weight: 22
  - mime_type: application/pdf
    weight: 18
  - mime_type: application/vnd.openxmlformats-officedocument.presentationml.presentation
    weight: 10
  - mime_type: text/plain
    weight: 12
  - mime_type: application/octet-stream
    weight: 16

analyzer_sets:
  - analyzers: []
    weight: 75
  - analyzers: [MD5]
    weight: 15
  - analyzers: [SHA1]
    weight: 7
  - analyzers: [MD5, SHA1]
    weight: 3

filename_templates:
  - mime_types: [application/vnd.openxmlformats-officedocument.wordprocessingml.document]
    templates:
      - "\\\\{server}\\{share}\\{department}\\{basename}.docx"
      - "\\\\{server}\\{share}\\{project}\\{basename}.docx"
      - "\\\\{server}\\Users\\{user}\\Documents\\{basename}.docx"
    weight: 22
  - mime_types: [application/vnd.openxmlformats-officedocument.spreadsheetml.sheet]
    templates:
      - "\\\\{server}\\{share}\\Finance\\{basename}.xlsx"
      - "\\\\{server}\\{share}\\{department}\\Reports\\{basename}.xlsx"
      - "\\\\{server}\\Users\\{user}\\Documents\\{basename}.xlsx"
    weight: 22
  - mime_types: [application/pdf]
    templates:
      - "\\\\{server}\\{share}\\Policies\\{basename}.pdf"
      - "\\\\{server}\\{share}\\{department}\\{basename}.pdf"
      - "\\\\{server}\\Users\\{user}\\Downloads\\{basename}.pdf"
    weight: 18
  - mime_types: [application/vnd.openxmlformats-officedocument.presentationml.presentation]
    templates:
      - "\\\\{server}\\{share}\\Presentations\\{basename}.pptx"
      - "\\\\{server}\\{share}\\{project}\\{basename}.pptx"
    weight: 10
  - mime_types: [text/plain]
    templates:
      - "\\\\{server}\\{share}\\IT\\{basename}.txt"
      - "\\\\{server}\\Users\\{user}\\Desktop\\{basename}.txt"
    weight: 12
  - mime_types: [application/octet-stream]
    templates:
      - "\\\\{server}\\{share}\\Installers\\{basename}.{ext}"
      - "\\\\{server}\\{share}\\Backups\\{basename}.{ext}"
      - "\\\\{server}\\{share}\\{department}\\{basename}.{ext}"
    weight: 16
