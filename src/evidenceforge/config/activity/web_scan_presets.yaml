      - {uri: "/public", method: "GET", status: 200}
      - {uri: "/scripts", method: "GET", status: 404}
      - {uri: "/search", method: "GET", status: 404}
      - {uri: "/secret", method: "GET", status: 404}
      - {uri: "/secure", method: "GET", status: 404}
