workflow_model:
  selection_probability: 0.68

workflows:
  common:
    - name: orient_shell
      weight: 2
      steps:
        - ["pwd", "hostname -f", "whoami"]
        - ["ls -lah", "ls -ltr", "ls -lh"]
        - ["history | tail -15", "date", "uptime"]
    - name: quick_health_check
      weight: 2
      steps:
        - ["uptime", "hostnamectl", "timedatectl"]
        - ["df -h /", "free -h", "ss -s"]
        - ["journalctl -p warning --since '1 hour ago' --no-pager | tail -20", "systemctl --failed --no-pager"]
  sysadmin:
    - name: service_triage
      weight: 5
      steps:
        - ["systemctl is-active {service}", "systemctl status {service} --no-pager"]
        - ["journalctl -u {service} --since '30 min ago' --no-pager | tail -{n}", "journalctl -u {service} -n {n} --no-pager"]
        - ["ss -ltnp | grep {service}", "ps aux | grep {service}"]
        - ["systemctl cat {service} 2>/dev/null | head -40", "systemctl show {service} -p ActiveState -p SubState -p MainPID"]
    - name: login_review
      weight: 3
      steps:
        - ["last -20", "who -a"]
        - ["tail -{n} /var/log/auth.log", "journalctl -u sshd --since '2 hours ago' --no-pager | tail -30"]
        - ["grep -i 'failed password' /var/log/auth.log | tail -20", "grep -i 'session opened' /var/log/auth.log | tail -20"]
  dba:
    - name: database_health
      weight: 5
      steps:
        - ["pg_isready", "mysql --defaults-extra-file=~/.my.cnf -e 'SELECT NOW(), USER()'"]
        - ["psql -c 'SELECT count(*) FROM pg_stat_activity'", "mysql --defaults-extra-file=~/.my.cnf -e 'SHOW PROCESSLIST'"]
        - ["psql -c 'SELECT datname, numbackends FROM pg_stat_database'", "mysql --defaults-extra-file=~/.my.cnf -e 'SHOW GLOBAL STATUS LIKE \"Threads_connected\"'"]
        - ["tail -{n} /var/log/mysql/error.log", "du -sh /var/lib/mysql/*"]
  webadmin:
    - name: web_service_check
      weight: 5
      steps:
        - ["curl -s -o /dev/null -w '%{http_code}' http://localhost", "curl -sI https://localhost"]
        - ["tail -{n} /var/log/nginx/access.log", "tail -{n} /var/log/apache2/error.log"]
        - ["nginx -t", "apachectl configtest"]
        - ["systemctl reload nginx", "systemctl status nginx --no-pager"]
  developer:
    - name: repo_check
      weight: 5
      steps:
        - ["git status --short", "git status"]
        - ["git diff --stat", "git log --oneline -10"]
        - ["npm test", "python3 -m pytest -v", "make test"]
        - ["docker compose ps", "docker logs --tail 50 {container}"]
  security:
    - name: auth_investigation
      weight: 5
      steps:
        - ["tail -{n} /var/log/auth.log | grep 'Accepted'", "journalctl -u auditd --since today --no-pager | tail -30"]
        - ["lastb -20", "grep -i 'invalid user' /var/log/auth.log | tail -20"]
        - ["ss -tanp | grep ESTAB | head", "ip neigh show"]
        - ["find /var/tmp -type f -mtime -1 -ls 2>/dev/null | head", "find /etc -type f -mtime -1 2>/dev/null | head"]
  help_desk:
    - name: desktop_connectivity
      weight: 5
      steps:
        - ["nmcli device status", "nmcli general status", "nmcli connection show --active"]
        - ["ip -br addr", "ip -4 addr show", "ip route get 8.8.8.8", "ip route get 1.1.1.1"]
        - ["resolvectl query login.microsoftonline.com", "resolvectl query company.okta.com", "getent hosts login.microsoftonline.com", "resolvectl status 2>/dev/null | head -40"]
        - ["journalctl -u NetworkManager --since '1 hour ago' --no-pager | tail -20", "journalctl -b --no-pager | grep -i NetworkManager | tail -20", "systemctl --user status 2>/dev/null | head -30", "systemctl --user list-units --failed 2>/dev/null"]
  data_analyst:
    - name: analyst_data_check
      weight: 5
      steps:
        - ["python3 -c 'import pandas as pd; print(pd.__version__)'", "python3 --version"]
        - ["find . -name '*.csv' -o -name '*.xlsx' | head", "ls -lh ~/Downloads 2>/dev/null | head"]
        - ["head -5 data.csv 2>/dev/null", "wc -l data.csv 2>/dev/null"]
        - ["psql -c 'SELECT now(), current_database(), current_user'", "env | grep -E 'ODBC|PG|MYSQL|SQL' | head"]

# QWERTY keyboard adjacency map for generative typo model.
# Each key maps to its physical neighbors on a standard US keyboard.
typo_model:
  max_rate: 0.03
  short_history_threshold: 10
  short_history_max_typos: 0
  correction_probability: 0.85

package_manager_model:
  families:
    debian:
      os_keywords: ["ubuntu", "debian"]
      command_prefixes: ["apt ", "apt-get ", "apt-cache ", "dpkg "]
    rpm:
      os_keywords: ["centos", "fedora", "red hat", "rhel", "rocky", "alma"]
      command_prefixes: ["yum ", "dnf ", "rpm "]

keyboard_adjacency:
  q: [w, a, "1", "2"]
  w: [q, e, a, s, "2", "3"]
  e: [w, r, s, d, "3", "4"]
  r: [e, t, d, f, "4", "5"]
  t: [r, y, f, g, "5", "6"]
  y: [t, u, g, h, "6", "7"]
  u: [y, i, h, j, "7", "8"]
  i: [u, o, j, k, "8", "9"]
  o: [i, p, k, l, "9", "0"]
  p: [o, l, "0"]
  a: [q, w, s, z]
  s: [a, w, e, d, z, x]
  d: [s, e, r, f, x, c]
