# Per-role bash command vocabularies for realistic bash_history generation.
# The generator picks commands based on user persona + server role.
# {placeholder} tokens are resolved at generation time from the params section.
#
# Follows the same data-driven pattern as spawn_rules.yaml.
#
# Depended on by: generation engine (bash_history log generation)
# Depends on: persona names (role keys should match persona names)
#
# Role keys (sysadmin, developer, etc.) must match persona filenames
# in config/personas/.
#
# Full schema: see commands/eforge/references/config-bash-commands.md

common:
  - "pwd"
  - "ls"
  - "ls -la"
  - "ls -lh"
  - "ls /tmp"
  - "ls /var/log"
  - "cd /var/log"
  - "cd /tmp"
  - "cd ~"
  - "cd -"
  - "id"
  - "w"
  - "whoami"
  - "uname -a"
  - "uname -sr"
  - "uname -mrs"
  - "cat /proc/version | cut -d' ' -f1-3"
  - "uptime"
  - "df -h"
  - "df -h /"
  - "df -h /var"
  - "df -h /tmp"
  - "free -m"
  - "free -h"
  - "ps aux"
  - "ps -ef"
  - "ps -ef | head"
  - "ps aux --sort=-%mem | head"
  - "ps aux | grep {service}"
  - "clear"
  - "hostname -f"
  - "hostname"
  - "date"
  - "date -u"
  - "history"
  - "cat /etc/hostname"
  - "cat /etc/os-release"
  - "cat /etc/issue"
  - "cat /etc/passwd | head"
  - "ll"
  - "exit"
  - "cat /etc/resolv.conf"
  - "cat /proc/cpuinfo | grep 'model name' | head -1"
  - "grep -m1 'model name' /proc/cpuinfo"
  - "echo $SHELL"
  - "locale"
  - "umask"
  - "ulimit -n"
  - "env | head -20"
  - "env | sort | head"
  - "which python3"
  - "command -v python3"
  - "file /usr/bin/ls"
  - "stat /etc/passwd"
  - "getent hosts localhost"
  - "getent passwd $(whoami)"
  - "groups"
  - "users"
  - "last -5"
  - "who -a"
  - "ip -br addr"
  - "ip route"
  - "ip route get 8.8.8.8"
  - "ss -tan | head"
  - "ss -s"
  - "ls -ltr /var/log/ | tail -10"
  - "ls -lt /var/log | head"
  - "ls -ltr /var/log | tail"
  - "ls -ld /var/log"
  - "ls -lah /tmp | head"
  - "find /tmp -maxdepth 1 -type f | head"
  - "du -sh /var/log"
  - "du -sh /home/* 2>/dev/null | head"
  - "journalctl --no-pager -n 5"
  - "journalctl -p err --no-pager -n 10"
  - "journalctl --since '10 min ago' --no-pager -n 20"
  - "journalctl -xe --no-pager | tail -20"
  - "systemctl --failed --no-pager"
  - "tail -20 /var/log/syslog"
  - "tail -50 /var/log/auth.log"
  - "grep -i error /var/log/syslog | tail"
  - "grep -i failed /var/log/auth.log | tail"
  - "lsmod | head"
  - "dmesg --ctime | tail -20"

sysadmin:
  - "systemctl status sshd"
  - "systemctl status {service}"
  - "systemctl restart {service}"
  - "systemctl list-units --failed"
  - "journalctl -u sshd --since '1 hour ago'"
  - "journalctl -u {service} -n {n}"
  - "tail -{n} /var/log/auth.log"
  - "tail -{n} /var/log/syslog"
  - "tail -f /var/log/syslog"
  - "grep -i error /var/log/syslog | tail -{n}"
  - "grep -i 'failed password' /var/log/auth.log | wc -l"
  - "ss -tulnp"
  - "netstat -an | grep ESTABLISHED | wc -l"
  - "top -bn1 | head -20"
  - "htop"
  - "iostat -x 1 3"
  - "vmstat 1 5"
  - "du -sh /var/log/*"
  - "du -sh /tmp/*"
  - "last -20"
  - "who"
  - "iptables -L -n"
  - "cat /etc/fstab"
  - "mount | column -t"
  - "dmesg | tail -30"
  - "apt list --upgradable 2>/dev/null"
  - "yum check-update 2>/dev/null"
  - "cat /proc/meminfo | head -5"
  - "lsblk"
  - "ip addr show"
  - "ip route"
  - "timedatectl"
  - "hostnamectl"
  - "cat /etc/crontab"
  - "crontab -l"
  - "find /var/log -name '*.gz' -mtime +30 | wc -l"
  - "systemctl list-timers"
  - "ss -s"
  - "ss -ltnp | grep {service}"
  - "sysctl -a 2>/dev/null | grep net.ipv4.ip_forward"
  - "journalctl -u {service} --since '30 min ago' --no-pager | tail -20"

dba:
  - "mysql -u root -p -e 'SHOW DATABASES'"
  - "mysql -u root -p -e 'SHOW PROCESSLIST'"
  - "mysql -u root -p -e 'SHOW SLAVE STATUS\\G'"
  - "mysql -u root -p -e 'SELECT COUNT(*) FROM {db}.users'"
  - "mysqldump --single-transaction --routines {db} > /tmp/{db}_backup.sql"
  - "mytop"
  - "pt-query-digest /var/log/mysql/slow.log | head -50"
  - "tail -{n} /var/log/mysql/error.log"
  - "tail -f /var/log/mysql/error.log"
  - "ls -la /var/lib/mysql/"
  - "du -sh /var/lib/mysql/*"
  - "psql -c '\\l'"
  - "psql -c 'SELECT pg_size_pretty(pg_database_size(current_database()))'"
  - "pg_isready"
  - "cat /etc/mysql/my.cnf | grep -v '^#'"
  - "mysql -u root -p -e 'SHOW VARIABLES LIKE \"max_connections\"'"
  - "mysql -u root -p -e 'SHOW GLOBAL STATUS LIKE \"Threads_connected\"'"

webadmin:
  - "tail -f /var/log/apache2/access.log"
  - "tail -{n} /var/log/nginx/error.log"
  - "tail -{n} /var/log/nginx/access.log"
  - "tail -f /var/log/apache2/error.log"
  - "curl -s -o /dev/null -w '%{http_code}' http://localhost"
  - "curl -sI https://localhost"
  - "curl -s http://localhost/health"
  - "certbot certificates"
  - "certbot renew --dry-run"
  - "apachectl configtest"
  - "nginx -t"
  - "systemctl reload nginx"
  - "systemctl reload apache2"
  - "ls -la /var/www/html/"
  - "cat /etc/nginx/sites-enabled/default"
  - "cat /etc/apache2/sites-enabled/000-default.conf"
  - "openssl s_client -connect localhost:443 </dev/null 2>/dev/null | openssl x509 -noout -dates"
  - "ab -n 100 -c 10 http://localhost/"
  - "wc -l /var/log/apache2/access.log"

developer:
  - "git status"
  - "git log --oneline -10"
  - "git pull origin main"
  - "git diff --stat"
  - "git branch -a"
  - "git stash list"
  - "docker ps"
  - "docker ps -a"
  - "docker logs --tail 50 {container}"
  - "docker compose up -d"
  - "docker compose logs -f --tail 20"
  - "docker images"
  - "npm run build"
  - "npm test"
  - "npm install"
  - "make clean && make"
  - "make test"
  - "python3 -m pytest -v"
  - "pip install -r requirements.txt"
  - "pip freeze | grep {package}"
  - "vim {config_file}"
  - "nano {config_file}"
  - "grep -r 'TODO' src/"
  - "grep -rn 'FIXME' ."
  - "tail -f /var/log/app/application.log"
  - "cat {config_file}"
  - "env | grep -i path"
  - "git remote -v"
  - "git log --oneline --graph -15"
  - "docker stats --no-stream"
  - "docker system df"
  - "python3 --version"
  - "node --version"
  - "npm outdated"
  - "cargo build 2>&1 | tail -5"
  - "go build ./..."
