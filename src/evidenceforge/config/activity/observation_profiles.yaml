        delay_ms:
          min_ms: 0
          max_ms: 50

  messy_collection:
    description: More visibly incomplete source coverage for blind realism evaluation.
    default:
      missingness: 0.0
      delay_ms:
        min_ms: 0
        max_ms: 0
      host_missingness_multiplier:
