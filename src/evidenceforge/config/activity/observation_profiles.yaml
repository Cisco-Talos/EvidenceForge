# Source-observation profiles control optional realism gaps after canonical
# events are planned. The default complete profile preserves training-friendly
# perfect coverage and correlation.

profiles:
  complete:
    description: Perfect source coverage for training-friendly datasets.
    default:
      missingness: 0.0
      delay_ms:
        min_ms: 0
        max_ms: 0
      host_missingness_multiplier:
        min: 1.0
        max: 1.0
    sources: {}

  enterprise_standard:
    description: Mild source-native gaps for realistic enterprise collection.
    default:
      missingness: 0.0
      delay_ms:
        min_ms: 0
        max_ms: 0
      host_missingness_multiplier:
        min: 0.85
        max: 1.15
    sources:
      windows_security:
        missingness: 0.001
        delay_ms:
          min_ms: 0
          max_ms: 100
      sysmon:
        missingness: 0.005
        delay_ms:
          min_ms: 5
          max_ms: 250
      ecar:
        missingness: 0.01
        delay_ms:
          min_ms: 10
          max_ms: 500
      syslog:
        missingness: 0.003
        delay_ms:
          min_ms: 0
          max_ms: 250
      bash_history:
        missingness: 0.002
        delay_ms:
          min_ms: 0
          max_ms: 0
      zeek:
        missingness: 0.001
        format_missingness:
          zeek_conn: 0.001
          zeek_dns: 0.003
          zeek_http: 0.006
          zeek_ssl: 0.006
          zeek_files: 0.010
          zeek_x509: 0.010
          zeek_ocsp: 0.012
          zeek_ntp: 0.003
          zeek_weird: 0.006
          zeek_pe: 0.010
        delay_ms:
          min_ms: 0
          max_ms: 3
      proxy:
