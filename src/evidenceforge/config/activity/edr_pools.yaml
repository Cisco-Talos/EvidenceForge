  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\SharedAccess\\Parameters\\FirewallPolicy\\StandardProfile", "DWORD (0x00000001)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon", "explorer.exe"]
  - ["HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU", "DWORD (0x00000000)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management", "DWORD (0x00000000)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System", "DWORD (0x00000001)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters", "DWORD (0x00000001)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\W32Time\\Config", "DWORD (0x0000000f)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\LanmanWorkstation\\Parameters", "DWORD (0x00000001)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Component Based Servicing\\PackagesPending", "DWORD (0x00000001)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WINEVT\\Channels\\Microsoft-Windows-Sysmon/Operational", "DWORD (0x00000001)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\EventLog\\Application", "DWORD (0x01400000)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows Defender\\Real-Time Protection", "DWORD (0x00000000)"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Control\\SecurityProviders\\WDigest", "DWORD (0x00000000)"]
  - ["HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Shell Folders", "C:\\ProgramData\\Microsoft\\Windows\\Start Menu\\Programs\\Startup"]
  - ["HKLM\\SYSTEM\\CurrentControlSet\\Services\\DNS\\Parameters", "DWORD (0x00000001)"]
