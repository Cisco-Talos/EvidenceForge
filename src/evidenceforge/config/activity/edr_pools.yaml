# EDR object diversity pools for probabilistic file/registry/DLL events.
#
# Used by the generation engine to emit realistic ambient file creation,
# registry modification, and module load events alongside process activity.
# These events provide background noise that makes EDR telemetry realistic.
#
# Override via .eforge/config/activity/edr_pools.yaml — any top-level
# key you include fully replaces the corresponding default section.
#
# Template variables: {user} = process owner username, {rand} = 5-digit random,
# {hex} = 8-character hexadecimal token, {process_prefetch_name} = owning
# process basename uppercased for Windows Prefetch artifacts.

# Process-aware file side effects for ambient eCAR/Sysmon FILE telemetry.
# Only processes matching one of these profiles emit probabilistic file events;
# read-only recon tools intentionally have no profile, so they cannot create
# impossible side effects such as dsquery.exe writing installers or browsers
# deleting Security.evtx.
file_side_effect_profiles:
  - name: chrome_cache
    executables: ["chrome.exe", "chrome"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Users\\{user}\\AppData\\Local\\Google\\Chrome\\User Data\\Default\\Cache\\Cache_Data\\f_{hex}"
    paths_linux:
      - "/home/{user}/.cache/google-chrome/Default/Cache/Cache_Data/f_{hex}"

  - name: edge_cache
    executables: ["msedge.exe"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Users\\{user}\\AppData\\Local\\Microsoft\\Edge\\User Data\\Default\\Cache\\Cache_Data\\f_{hex}"

  - name: firefox_cache
    executables: ["firefox.exe", "firefox"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Users\\{user}\\AppData\\Local\\Mozilla\\Firefox\\Profiles\\default-release\\cache2\\entries\\{hex}"
    paths_linux:
      - "/home/{user}/.cache/mozilla/firefox/default-release/cache2/entries/{hex}"

  - name: shell_temp
    executables: ["cmd.exe", "powershell.exe", "pwsh.exe", "bash", "sh"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Users\\{user}\\AppData\\Local\\Temp\\tmp{rand}.tmp"
      - "C:\\Users\\{user}\\AppData\\Roaming\\Microsoft\\Windows\\PowerShell\\PSReadLine\\ConsoleHost_history.txt"
    paths_linux:
      - "/home/{user}/.cache/{hex}.tmp"
      - "/home/{user}/.bash_history"

  - name: package_manager
    executables: ["apt", "apt-get", "dnf", "yum", "dpkg", "rpm"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/apt/history.log"
      - "/var/lib/dpkg/status"
      - "/var/lib/dnf/history.sqlite"

  - name: linux_systemd_timesync_state
    executables: ["systemd-timesyncd"]
    actions: ["modify"]
    paths_linux:
      - "/var/lib/systemd/timesync/clock"
      - "/run/systemd/timesync/synchronized"

  - name: linux_chrony_state
    executables: ["chronyd"]
    actions: ["modify"]
    paths_linux:
      - "/var/lib/chrony/drift"
      - "/run/chrony/chronyd.pid"

  - name: linux_resolved_state
    executables: ["systemd-resolved"]
    actions: ["modify"]
    paths_linux:
      - "/run/systemd/resolve/resolv.conf"
      - "/run/systemd/resolve/stub-resolv.conf"

  - name: linux_journal_state
    executables: ["systemd-journald"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/journal/{hex}/system.journal"
      - "/run/log/journal/{hex}/system.journal"

  - name: linux_syslog_state
    executables: ["rsyslogd", "syslog-ng"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/syslog"
      - "/var/log/auth.log"
      - "/var/spool/rsyslog/imjournal.state"

  - name: linux_dbus_state
    executables: ["dbus-daemon"]
    actions: ["modify"]
    paths_linux:
      - "/var/lib/dbus/machine-id"
      - "/run/dbus/system_bus_socket"

  - name: linux_networkmanager_state
    executables: ["NetworkManager"]
    actions: ["modify"]
    paths_linux:
      - "/var/lib/NetworkManager/NetworkManager.state"
      - "/run/NetworkManager/no-stub-resolv.conf"

  - name: linux_snapd_state
    executables: ["snapd"]
    actions: ["modify"]
    paths_linux:
      - "/var/lib/snapd/state.json"
      - "/var/cache/snapd/names"

  - name: linux_sshd_listener_state
    executables: ["sshd"]
    actions: ["read"]
    paths_linux:
      - "/etc/ssh/sshd_config"

  - name: linux_proxy_service_state
    executables: ["squid"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/squid/access.log"
      - "/var/spool/squid/swap.state"

  - name: linux_apache_service_state
    executables: ["apache2", "httpd"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/apache2/access.log"

  - name: linux_nginx_service_state
    executables: ["nginx"]
    actions: ["modify"]
    paths_linux:
      - "/var/log/nginx/access.log"
      - "/var/cache/nginx/client_temp/{rand}"

  - name: installer_update
    executables: ["msiexec.exe", "tiworker.exe", "usoclient.exe"]
    executable_contains: ["install", "setup", "update", "patch"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Windows\\Temp\\MSI{rand}.tmp"
      - "C:\\Windows\\SoftwareDistribution\\Download\\{rand}\\update.cab"
    paths_linux:
      - "/var/tmp/pkg-{rand}.tmp"

  - name: windows_prefetch_execution
    executables:
      - "cmd.exe"
      - "powershell.exe"
      - "pwsh.exe"
      - "rundll32.exe"
      - "schtasks.exe"
      - "svchost.exe"
      - "taskhostw.exe"
      - "tiworker.exe"
      - "usoclient.exe"
      - "wmiprvse.exe"
      - "wscript.exe"
      - "cscript.exe"
    actions: ["modify"]
    probability: 0.35
    paths_windows:
      - "C:\\Windows\\Prefetch\\{process_prefetch_name}-{hex}.pf"

  - name: archive_and_runtime_artifacts
    executables: ["mysqldump", "gzip", "tar", "zip", "python", "python3", "node", "java"]
    actions: ["create", "modify"]
    paths_windows:
      - "C:\\Users\\{user}\\AppData\\Local\\Temp\\tmp{rand}.tmp"
    paths_linux:
      - "/tmp/.tmp-{rand}"

