# Registry keys for EDR events. Format: [key, value_name, details].
# TargetObject in Sysmon = key\value_name. Details = data written.
runmru_commands:
  - "cmd.exe /k dir"
  - "cmd.exe /k whoami"
  - "cmd.exe /c ipconfig"
  - "cmd.exe /c net use"
  - "cmd.exe /c hostname"
  - "powershell.exe -NoExit Get-ChildItem"
  - "powershell.exe -NoProfile Get-Process"
  - "notepad.exe"
  - "calc.exe"
  - "control.exe printers"
  - "mstsc.exe /v:DC-01"
  - "explorer.exe C:\\Users\\{user}\\Documents"
  - "explorer.exe \\\\FILE-SRV-01\\Shared"
  - "cmd.exe /k cd C:\\Users\\{user}\\Downloads"

