endpoint_clock:
  # Host-resident endpoint sources share the host clock. Windows Security,
  # Sysmon, and eCAR on Windows use the Windows host profile; Linux syslog,
  # bash history, and eCAR on Linux use the Linux host profile. Network,
  # proxy, firewall, and IDS sensors keep their independent appliance clocks.
  profiles:
    complete:
      windows:
        host_offset_ms:
          min: 0
          max: 0
        host_drift_ppm:
          min: 0
          max: 0
      linux:
        host_offset_ms:
          min: 0
          max: 0
        host_drift_ppm:
          min: 0
          max: 0
    enterprise_standard:
      windows:
        host_offset_ms:
          min: -1250
          max: 1800
        host_drift_ppm:
          min: -8
          max: 8
      linux:
        host_offset_ms:
          min: -900
          max: 1500
        host_drift_ppm:
          min: -8
          max: 8
    messy_collection:
      windows:
        host_offset_ms:
          min: -5500
          max: 7800
        host_drift_ppm:
          min: -35
          max: 35
      linux:
        host_offset_ms:
          min: -4200
          max: 6200
        host_drift_ppm:
          min: -30
          max: 30

network_sensor_observation:
  # Default assumes distributed security infrastructure where core, DMZ, and
  # packet-broker taps observe the same flow through different capture paths.
  # Sensor clocks remain controlled, but buffering and path differences should
  # not make dual-sensor rows look mechanically cloned.
  default_profile: distributed_taps
  profiles:
    distributed_taps:
      clock_offset_us:
        min: -18000
        max: 22000
      clock_drift_ppm:
        min: -2
        max: 2
      route_delay_us:
        min: 1200
        max: 18000
      event_jitter_us:
        min: -750
        max: 750
      capture_loss:
        probability: 0.0
        min_fraction: 0.0
        max_fraction: 0.0
        max_missed_bytes: 0
    well_synced:
      clock_offset_us:
        min: -4000
        max: 4000
      clock_drift_ppm:
        min: -1
        max: 1
      route_delay_us:
        min: 250
        max: 8000
      event_jitter_us:
        min: -250
        max: 250
      capture_loss:
        probability: 0.0
        min_fraction: 0.0
        max_fraction: 0.0
        max_missed_bytes: 0
    lossy_span:
      clock_offset_us:
        min: -24000
        max: 28000
      clock_drift_ppm:
        min: -4
        max: 4
      route_delay_us:
        min: 1800
        max: 24000
      event_jitter_us:
        min: -1200
        max: 1200
      capture_loss:
        probability: 0.12
        min_fraction: 0.001
        max_fraction: 0.035
        max_missed_bytes: 65536

firewall_observation:
  # ASA connection-table timers are device policy, not per-flow randomness.
  # Sensor-specific overrides may select another named policy without moving
  # timeout synthesis back into the emitter.
  default_policy: asa_default
  sensor_policies: {}
  policies:
    asa_default:
      tcp_embryonic_timeout_seconds: 30
      tcp_idle_timeout_seconds: 3600

windows_event_time:
  collision_spacing:
    # For small tied clusters, near-zero remains realistic.
    near_zero_until: 25
    near_gap_min_us: 50
    near_gap_max_us: 500
    # Larger tied clusters usually represent compound activity that should
    # unfold across seconds/minutes, not microseconds.
    large_gap_min_ms: 1000
    large_gap_max_ms: 4000
