network_sensor_observation:
  # Default assumes security infrastructure with good time sync and local tap
  # placement. These bounds apply when multiple Zeek sensors observe the same
  # packet/flow and should stay in the low-millisecond range. Packet and byte
  # counters remain canonical for lossless observations.
  default_profile: well_synced
  profiles:
    well_synced:
      clock_skew_us:
        min: -1500
        max: 1500
      path_delay_us:
        min: 50
        max: 2000

windows_event_time:
  collision_spacing:
    # For small tied clusters, near-zero remains realistic.
    near_zero_until: 25
    near_gap_min_us: 50
    near_gap_max_us: 500
    # Larger tied clusters usually represent compound activity that should
    # unfold across seconds/minutes, not microseconds.
    large_gap_min_ms: 1000
    large_gap_max_ms: 4000
