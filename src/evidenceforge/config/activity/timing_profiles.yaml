# Timing realism profiles for causal relationships and source-native rendering.
#
# Relationship classes:
# - same_observation: same packet/action observed by one source; near-zero is acceptable.
# - source_latency: same action rendered by different source pipelines.
# - causal_prerequisite: prerequisite work before the trigger.
# - human_workflow: human/operator actions; often seconds to minutes.
# - teardown: cleanup/session/process end after final dependent evidence.
#
# Values are intentionally conservative. Scenario-specific projects can override
# them with .eforge/config/activity/timing_profiles.yaml.

