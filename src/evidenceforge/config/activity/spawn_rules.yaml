      - ZoomUpdate.exe
      - vpnagent.exe
      - PanGPS.exe
      - ZSAService.exe
      - ZSATunnel.exe

  svchost.exe:
    command_templates:
      - "C:\\Windows\\System32\\svchost.exe -k netsvcs -p"
      - "C:\\Windows\\System32\\svchost.exe -k DcomLaunch -p"
      - "C:\\Windows\\System32\\svchost.exe -k LocalServiceNetworkRestricted -p"
      - "C:\\Windows\\System32\\svchost.exe -k LocalServiceNoNetwork -p"
    lifetime: long
    spawn_delay: [0.01, 0.5]
    children:
      - taskhostw.exe
      - dllhost.exe
      - WmiPrvSE.exe
      - conhost.exe
      - RuntimeBroker.exe
      - sihost.exe
      - backgroundTaskHost.exe

linux:
  sshd:
    command_templates:
      - "/usr/sbin/sshd -D"
    lifetime: long
    children:
      - bash
      - sh
      - zsh
      - sftp-server

  apache2:
    command_templates:
      - "/usr/sbin/apache2 -DFOREGROUND"
    lifetime: long
    children:
      - bash
      - sh
      - python3
      - curl
      - wget

  httpd:
    command_templates:
      - "/usr/sbin/httpd -DFOREGROUND"
    lifetime: long
    children:
      - bash
      - sh
      - python3
      - curl
      - wget

  bash:
    command_templates:
      - "-bash"
      - "/bin/bash"
    lifetime: long
    children:
      - vim
      - nano
      - emacs
      - code
      - git
      - make
      - gcc
      - npm
      - cargo
      - python3
      - pip
      - pip3
      - docker
      - kubectl
      - curl
      - wget
      - ssh
      - scp
      - rsync
      - mysql
      - psql
      - mysqldump
      - gzip
      - tar
      - unzip
      - ls
      - cat
      - grep
      - find
      - ps
      - top
      - htop
      - df
      - free
      - systemctl
      - journalctl
      - tail
      - head
      - less
      - nmap
      - ip
      - ss
      - netstat
      - id
      - whoami
      - uname
      - hostname
      - w
      - uptime
      - chmod
      - chown
      - ln
      - mv
      - cp
      - rm
      - mkdir
      - sed
      - awk
      - sort
      - wc
      - bash
      - sh
      - firefox
      - google-chrome
      - thunderbird
      - ldapsearch
      - redis-cli

  sh:
    command_templates:
      - "/bin/sh"
    lifetime: short
    max_children: 5
    spawn_delay: [0.01, 0.1]
    children:
      - make
      - gcc
      - bash
      - sh

  cron:
    command_templates:
      - "/usr/sbin/cron -f"
    lifetime: long
    spawn_delay: [0.01, 0.1]
    children:
      - sh
      - bash

  systemd:
    command_templates:
      - "/usr/lib/systemd/systemd --system"
    lifetime: long
    spawn_delay: [0.01, 0.5]
    children:
      - sshd
      - cron
      - rsyslogd
      - NetworkManager
      - chronyd
      - systemd-resolved
      - systemd-timesyncd
      - systemd-logind
      - dockerd
      - mysqld
      - nginx
      - apache2
      - containerd

  dockerd:
    command_templates:
      - "/usr/bin/dockerd"
    lifetime: long
    children:
      - containerd

  containerd:
    command_templates:
      - "/usr/bin/containerd"
    lifetime: long
    children:
      - runc
