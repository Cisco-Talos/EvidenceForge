# TLS realism knobs for SAN generation, OCSP behavior, and certificate chains.
#
# User customizations go in:
#   .eforge/config/activity/tls_realism.yaml
#
# Overlay behavior: nested dicts merge and lists extend.

san:
  # Multi-label public suffixes: registry/vendor zones under which one registers a name
  # (the parent zone itself is NOT registrable). ONE curated list, TWO consumers:
  #   1. TLS SAN + DNS realism — compute the registrable ("apex") domain for wildcard SAN
  #      generation (tls_realism.py) and mail/TXT owner names (dns_txt.py).
  #   2. `--oob-host` safety gate (cli/commands.py) — an operator-supplied live-callback
  #      host must be a concrete registrable domain or IP, never a bare public suffix, so a
  #      single entry can't allowlist a whole namespace (e.g. `co.uk` -> every `*.co.uk`).
  # This is a CURATED COMMON SUBSET, NOT the full Public Suffix List — deliberately, to
  # honor the "no external dependency / no vendored corpus" constraint (issue #284). It is
  # overlay-EXTENSIBLE (lists extend), so a deployment needing a less-common suffix adds it
  # in .eforge/config/activity/tls_realism.yaml. A suffix outside this list is treated as
  # registrable; for `--oob-host` that means an operator could still over-broaden to such a
  # suffix, but only behind the explicit opt-in + loud LIVE CALLBACK warning (a footgun,
  # not an attacker bypass). The egregious bare-TLD case (`com` -> `*.com`) is always closed
  # by the single-label rejection regardless of this list.
  multi_label_public_suffixes:
    # ICANN ccTLD second-levels
    - ac.uk
    - co.id
    - co.il
    - co.in
    - co.jp
    - co.kr
    - co.nz
    - co.th
    - co.uk
    - co.za
    - com.au
    - com.br
    - com.cn
    - com.hk
    - com.mx
    - com.sg
    - com.tr
    - edu.au
    - gov.au
    - gov.uk
    - ne.jp
    - net.au
    - net.nz
    - org.au
    - org.nz
    - org.uk
    # Vendor "private" public suffixes — hosting / OOB-receiver namespaces where each
    # customer gets a subdomain and the bare zone is not operator-registrable.
    - azurewebsites.net
    - firebaseapp.com
    - github.io
    - gitlab.io
    - herokuapp.com
    - netlify.app
    - ngrok.io
    - pages.dev
    - s3.amazonaws.com
    - vercel.app
    - web.app
    - workers.dev
  profile_weights:
    apex_exact: 34
    apex_www: 26
    apex_wildcard: 14
    subdomain_exact: 34
    subdomain_parent: 18
    subdomain_wildcard: 16
    subdomain_sibling: 12

serial_numbers:
  byte_lengths:
    - {bytes: 8, weight: 8}
    - {bytes: 9, weight: 6}
    - {bytes: 10, weight: 6}
    - {bytes: 12, weight: 14}
    - {bytes: 16, weight: 40}
    - {bytes: 18, weight: 12}
    - {bytes: 20, weight: 14}

ocsp:
  cache_bucket_seconds: 14400
  this_update_max_skew_seconds: 3600
  next_update_min_seconds: 28800
  next_update_max_seconds: 604800
  request_path:
    # OCSP-over-HTTP GET carries a base64-encoded DER OCSPRequest in the
    # path, not a short human-sized token. Prefixes mirror common DER/base64
    # sequence starts, then per-certificate bytes fill the body.
    min_encoded_chars: 72
    max_encoded_chars: 150
    include_padding_probability: 0.35
    der_prefixes:
      - "MFEwTzBNMEswSTAJBgUrDgMCGgUABB"
      - "MFUwUzBRME8wTTAJBgUrDgMCGgUABB"
      - "MFIwUDBOMEwwSjAJBgUrDgMCGgUABB"
  responders:
    - issuer_patterns: ["*Acme Enterprise*", "*Enterprise*"]
      domains: ["ocsp.meridianhcs.local"]
    - issuer_patterns: ["*Let's Encrypt*"]
      domains: ["r3.o.lencr.org", "ocsp.int-x3.letsencrypt.org"]
    - issuer_patterns: ["*DigiCert*"]
      domains: ["ocsp.digicert.com"]
    - issuer_patterns: ["*Google Trust Services*", "*Google Trust*"]
      domains: ["ocsp.pki.goog"]
    - issuer_patterns: ["*GlobalSign*"]
      domains: ["ocsp.globalsign.com"]
    - issuer_patterns: ["*Sectigo*"]
      domains: ["ocsp.sectigo.com"]
    - issuer_patterns: ["*"]
      domains: ["ocsp.digicert.com", "ocsp.sectigo.com", "ocsp.globalsign.com"]
  status_weights:
    good: 90
    unknown: 7
    revoked: 3
  suppress_revoked_suffixes:
    - .adobedtm.com
    - .amazon.com
    - .awsstatic.com
    - .bing.com
    - .cloudflare.com
    - .digicert.com
    - .fbcdn.net
    - .facebook.com
    - .github.com
    - .githubusercontent.com
    - .google.com
    - .googleapis.com
    - .gstatic.com
    - .lencr.org
    - .linkedin.com
    - .live.com
    - .microsoft.com
    - .microsoftonline.com
    - .office.com
    - .office.net
    - .office365.com
    - .pki.goog
    - .salesforce.com
    - .slack.com
    - .windowsupdate.com
    - .zoom.us

certificate_chains:
  include_intermediate_probability: 0.86
  include_second_intermediate_probability: 0.08
  intermediate_validity_days_min: 1825
  intermediate_validity_days_max: 3650
  intermediate_not_before_max_days: 1460
  key_types:
