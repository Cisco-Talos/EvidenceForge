# Maps executables to the network services they generate.
#
# Used in two directions:
#   exe → service: which connections a process initiates (for process-network correlation)
#   service → exe: which process to attribute a connection to (for PID lookup)
#
# Fields:
#   exe: list of executable basenames (case-sensitive as they appear in process events)
#   service: Zeek service label
#   port: destination port
#   external: true if the connection targets external IPs, false for internal
#   dns_tags: optional DNS registry tags that constrain external destinations
#
# Depended on by: generation engine (process-network correlation)
# Depends on: application_catalog.yaml (exe basenames should match catalog entries)
#
# Full schema: see commands/eforge/references/config-process-network-map.md

mappings:
  # Browsers → external HTTPS
  - exe: [chrome.exe, msedge.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [web, saas, cdn, social]

  - exe: [firefox.exe, firefox]
    service: ssl
    port: 443
    external: true
    dns_tags: [web, saas, cdn, social]

  # Office/productivity apps → external HTTPS (O365, cloud services)
  - exe: [OUTLOOK.EXE]
    service: ssl
    port: 443
    external: true
    dns_tags: [outlook]

  - exe: [Teams.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [teams]

  - exe: [OneDrive.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [onedrive]

  - exe: [Slack.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, cdn]

  - exe: [Zoom.exe, CptHost.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, cdn]

  - exe: [Webex.exe, CiscoCollabHost.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, cdn]

  - exe: [Dropbox.exe, DropboxUpdate.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [storage, cdn, background]

  - exe: [GoogleDriveFS.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, cdn, background]

  - exe: [SelfService.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, background]

  - exe: [vpnui.exe, vpnagent.exe, PanGPA.exe, PanGPS.exe, ZSATray.exe, ZSAService.exe, ZSATunnel.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [background, saas]

  - exe: [PBIDesktop.exe, tableau.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [saas, cdn]

  - exe: [Postman.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [dev, saas]

  - exe: [dbeaver.exe]
    service: ssl
    port: 443
    external: true
    dns_tags: [dev, background]

  # Dev tools → external HTTPS (registries, repos, CI/CD)
  - exe: [Code.exe, git, npm, cargo, docker, kubectl]
    service: ssl
    port: 443
    external: true
    dns_tags: [dev, git]

  # HTTP clients → external HTTPS
  - exe: [curl, wget]
    service: ssl
    port: 443
    external: true
    dns_tags: [web, cdn]

  # Database clients → internal DB
  - exe: [sqlcmd.exe]
    service: mssql
    port: 1433
    external: false

  - exe: [mysql]
    service: mysql
    port: 3306
    external: false

  - exe: [psql]
    service: postgresql
    port: 5432
    external: false

  - exe: [dbeaver.exe, PBIDesktop.exe]
    service: mssql
    port: 1433
    external: false

  - exe: [dbeaver.exe]
    service: mysql
    port: 3306
    external: false

  - exe: [dbeaver.exe, tableau.exe]
    service: postgresql
    port: 5432
    external: false

  # SSH clients → internal SSH
  - exe: [ssh]
    service: ssh
    port: 22
    external: false

  # SMB file access → internal file servers (Windows only)
  - exe: [explorer.exe]
    service: smb
    port: 445
    external: false

  # RDP clients → internal servers (Windows only)
  - exe: [mstsc.exe]
    service: rdp
    port: 3389
    external: false

  # LDAP/AD tools → domain controllers
  - exe: [dsquery.exe, ldapsearch]
    service: ldap
    port: 389
    external: false
