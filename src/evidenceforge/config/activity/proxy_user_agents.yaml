    - "Wget/1.21.3"
    - "python-requests/2.31.0"
    - "Go-http-client/1.1"
    - "Apache-HttpClient/4.5.14 (Java/17.0.9)"

  package_managers:
    debian:
      os_keywords: ["ubuntu", "debian"]
      hosts:
        - archive.ubuntu.com
        - security.ubuntu.com
        - changelogs.ubuntu.com
        - deb.debian.org
        - security.debian.org
        - packages.microsoft.com
      user_agents:
        - "apt-http/2.4.11 (amd64)"
        - "Debian APT-HTTP/1.3 (2.4.11)"

    fedora:
      os_keywords: ["fedora", "red hat", "rhel"]
