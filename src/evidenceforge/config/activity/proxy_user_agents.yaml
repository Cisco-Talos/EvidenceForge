# Proxy User-Agent pools for proxy_access generation.
#
# User customizations go in:
#   .eforge/config/activity/proxy_user_agents.yaml
#
# Overlay behavior: nested dicts merge and lists extend, so overlays can add
# generic agents, server roles, package-manager destinations, or OS families
# without copying this whole file.

domain_overrides:
  windows_update:
    os_keywords: ["windows"]
    hosts:
      - download.windowsupdate.com
      - ctldl.windowsupdate.com
    user_agents:
      - "Windows-Update-Agent/10.0.10011.16384 Client-Protocol/2.33"
  google_update_windows:
    os_keywords: ["windows"]
    hosts:
      - dl.google.com
      - update.googleapis.com
    user_agents:
      - "Google Update/1.3.36.372;winhttp"
  google_update_macos:
    os_keywords: ["mac", "darwin"]
    hosts:
      - dl.google.com
      - update.googleapis.com
    user_agents:
      - "GoogleSoftwareUpdateAgent/1.3.18.202 CFNetwork/1494.0.7 Darwin/23.4.0"
  windows_cryptoapi:
    os_keywords: ["windows"]
    hosts:
      - crl.microsoft.com
      - ocsp.digicert.com
      - crl3.digicert.com
      - crl4.digicert.com
      - crls.pki.goog
      - ocsp.pki.goog
      - ocsp.sectigo.com
      - ocsp.globalsign.com
      - ocsp.int-x3.letsencrypt.org
      - ocsp.meridianhcs.local
      - r3.o.lencr.org
      - x1.c.lencr.org
    user_agents:
      - "Microsoft-CryptoAPI/10.0"
  windows_telemetry:
    os_keywords: ["windows"]
    hosts:
      - settings-win.data.microsoft.com
      - arc.msn.com
    user_agents:
      - "Windows-Device-Management/10.0"
      - "Microsoft-WNS/10.0"
  adobe_update_windows:
    os_keywords: ["windows"]
    hosts:
      - armmf.adobe.com
      - swupmf.adobe.com
      - ccmdl.adobe.com
    user_agents:
      - "AdobeARM/1.0"
      - "Adobe Application Manager 2.0"
  dropbox_update_windows:
    os_keywords: ["windows"]
    hosts:
      - desktop.dropbox.com
    user_agents:
      - "DropboxUpdate/199.4.6287"
  google_drive_desktop:
    os_keywords: ["windows"]
    hosts:
      - clients6.google.com
      - clients4.google.com
    user_agents:
      - "GoogleDriveFS/97.0.1.0 Windows"
  enterprise_vpn_clients:
    os_keywords: ["windows"]
    hosts:
      - secure-client-updates.cisco.com
      - updates.paloaltonetworks.com
      - config.zscaler.net
      - gateway.zscaler.net
    user_agents:
      - "Cisco Secure Client/5.1.4 Windows"
      - "GlobalProtect/6.2.3 Windows"
      - "Zscaler Client Connector/4.3.0"
  workstation_oem_updaters:
    os_keywords: ["windows"]
    hosts:
      - download.lenovo.com
      - hpia.hpcloud.hp.com
      - dellupdater.dell.com
    user_agents:
      - "Lenovo System Update"
      - "HP Image Assistant"
      - "Dell Command Update/5.1"
  duo_device_health:
    os_keywords: ["windows"]
    hosts:
      - dl.duosecurity.com
      - api-17.duosecurity.com
    user_agents:
      - "Duo Device Health/5.6.0"

workstation:
  windows:
    # Browser UAs only. System-level Windows UAs are modeled as domain-specific
    # overrides in proxy_uri_templates.yaml.
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:120.0) Gecko/20100101 Firefox/120.0"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (Windows NT 10.0; WOW64; Trident/7.0; rv:11.0) like Gecko"

  linux:
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (X11; Ubuntu; Linux x86_64; rv:121.0) Gecko/20100101 Firefox/121.0"
    - "python-requests/2.31.0"
    - "curl/7.88.1"
    - "Wget/1.21.3"

  package_managers:
    debian:
      os_keywords: ["ubuntu", "debian"]
      hosts:
        - archive.ubuntu.com
        - security.ubuntu.com
        - changelogs.ubuntu.com
        - deb.debian.org
        - security.debian.org
        - packages.microsoft.com
      user_agents:
        - "apt-http/2.4.11 (amd64)"
        - "Debian APT-HTTP/1.3 (2.4.11)"

    fedora:
      os_keywords: ["fedora", "red hat", "rhel"]
      hosts:
        - download.fedoraproject.org
        - mirrors.fedoraproject.org
        - dl.fedoraproject.org
      user_agents:
        - "libdnf (Fedora Linux 39; workstation; Linux.x86_64)"

