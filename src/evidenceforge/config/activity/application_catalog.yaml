# Unified application catalog for process generation.
# Consolidates image paths, PE metadata, command-line templates,
# and persona-based filtering into a single data source.
#
# Fields:
#   id: Unique stable identifier
#   display_name: Human-readable name
#   platforms: Per-OS config (windows and/or linux)
#     image_path: Fully qualified executable path (no bare filenames)
#     pe_metadata: Windows PE header fields (windows only)
#     command_templates: List of realistic command lines with {placeholder} support
#   categories: List of category tags matching PERSONA_PROCESS_WEIGHTS keys
#     (user_app, code, build, query, browser, office)
#   personas: Which persona names may spawn this app (others never see it)
#
# Depended on by: spawn_rules.yaml (exe basenames), process_network_map.yaml (exe basenames)
# Depends on: persona files (personas: list must use valid persona names)
#
# Full schema: see commands/eforge/references/config-application-catalog.md

applications:
  # ===== Windows User Apps (process_user_apps) =====
  - id: chrome
    display_name: "Google Chrome"
    platforms:
      windows:
        image_path: 'C:\Program Files\Google\Chrome\Application\chrome.exe'
        pe_metadata:
          file_version: "120.0.6099.225"
          description: "Google Chrome"
          product: "Google Chrome"
          company: "Google LLC"
          original_filename: "chrome.exe"
        command_templates:
          - '"C:\Program Files\Google\Chrome\Application\chrome.exe" --single-argument {internal_url}'
          - '"C:\Program Files\Google\Chrome\Application\chrome.exe" --no-startup-window /prefetch:8'
        children:
          - '"C:\Program Files\Google\Chrome\Application\chrome.exe" --type=renderer --enable-features=NetworkService'
          - '"C:\Program Files\Google\Chrome\Application\chrome.exe" --type=gpu-process'
          - '"C:\Program Files\Google\Chrome\Application\chrome.exe" --type=utility --utility-sub-type=network.mojom.NetworkService'
        loaded_modules:
          - path: 'C:\Program Files\Google\Chrome\Application\chrome_elf.dll'
            signature: "Google LLC"
            pe_metadata:
              file_version: "120.0.6099.225"
              description: "Google Chrome ELF"
              product: "Google Chrome"
              company: "Google LLC"
              original_filename: "chrome_elf.dll"
          - path: 'C:\Program Files\Google\Chrome\Application\libEGL.dll'
            signature: "Google LLC"
            pe_metadata:
              file_version: "120.0.6099.225"
              description: "ANGLE libEGL"
              product: "Google Chrome"
              company: "Google LLC"
              original_filename: "libEGL.dll"
          - path: 'C:\Program Files\Google\Chrome\Application\libGLESv2.dll'
            signature: "Google LLC"
            pe_metadata:
              file_version: "120.0.6099.225"
              description: "ANGLE libGLESv2"
              product: "Google Chrome"
              company: "Google LLC"
              original_filename: "libGLESv2.dll"
          - path: 'C:\Windows\System32\user32.dll'
          - path: 'C:\Windows\System32\gdi32.dll'
          - path: 'C:\Windows\System32\ws2_32.dll'
          - path: 'C:\Windows\System32\dwrite.dll'
      linux:
        image_path: "/usr/bin/google-chrome"
        command_templates:
          - "google-chrome --new-tab {internal_url}"
    categories: [user_app, browser]
    personas: [developer, analyst, sysadmin, security_analyst, hr, accountant, intern, help_desk, default]
    system_types: [workstation]

