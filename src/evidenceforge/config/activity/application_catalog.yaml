          - '"C:\Program Files\Mozilla Firefox\firefox.exe" -contentproc -childID 5 -isForBrowser'
        loaded_modules:
          - path: 'C:\Program Files\Mozilla Firefox\mozglue.dll'
            signature: "Mozilla Corporation"
            pe_metadata:
              file_version: "121.0"
              description: "Mozilla Glue Library"
