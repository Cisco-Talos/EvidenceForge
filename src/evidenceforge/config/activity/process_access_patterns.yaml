# Sysmon Event 10 (ProcessAccess) baseline patterns.
#
# Each baseline pair names a long-lived source and target process from the
# StateManager system PID table. Access masks are weighted alternatives so
# benign ProcessAccess noise does not collapse to one mask per source/target
# pair.
#
# Override via .eforge/config/activity/process_access_patterns.yaml — the
# baseline_pairs list is extended by overlay entries.

baseline_pairs:
  - source_pid_key: msmpeng
    source_image: 'C:\ProgramData\Microsoft\Windows Defender\Platform\4.18.2301.6-0\MsMpEng.exe'
    target_pid_key: explorer
    target_image: 'C:\Windows\explorer.exe'
    access_masks:
      - {mask: "0x1410", weight: 45}
      - {mask: "0x1010", weight: 30}
      - {mask: "0x1400", weight: 15}
      - {mask: "0x0410", weight: 10}

  - source_pid_key: msmpeng
    source_image: 'C:\ProgramData\Microsoft\Windows Defender\Platform\4.18.2301.6-0\MsMpEng.exe'
    target_pid_key: svchost_netsvcs
    target_image: 'C:\Windows\System32\svchost.exe'
    access_masks:
      - {mask: "0x1010", weight: 40}
      - {mask: "0x1410", weight: 25}
      - {mask: "0x1400", weight: 20}
      - {mask: "0x1000", weight: 15}

  - source_pid_key: msmpeng
