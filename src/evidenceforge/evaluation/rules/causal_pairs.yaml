# Causal pair definitions for Temporal Realism (Dimension 4).
# Each pair defines a "before" and "after" event that must be correctly ordered.
# match_fields lists field names that must match between the two records to form a pair.

pairs:
  - name: "Logon before process creation"
    before:
      format: windows_event_security
      condition:
        EventID: 4624
    after:
      format: windows_event_security
      condition:
        EventID: 4688
    match_fields:
      before: TargetLogonId
      after: SubjectLogonId
    exclude_accounts: ["SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE", "DWM-1", "DWM-2", "DWM-3", "UMFD-0", "UMFD-1", "UMFD-2", "ANONYMOUS LOGON"]

  - name: "Logon before logoff"
    before:
      format: windows_event_security
      condition:
        EventID: 4624
    after:
      format: windows_event_security
      condition:
        EventID: 4634
    match_fields:
      before: TargetLogonId
      after: TargetLogonId

  - name: "eCAR login before process create"
    before:
      format: ecar
      condition:
        object: USER_SESSION
        action: LOGIN
    after:
      format: ecar
      condition:
        object: PROCESS
        action: CREATE
    match_fields:
      before: principal
      after: principal
    extra_match: hostname
    exclude_accounts: ["SYSTEM", "LOCAL SERVICE", "NETWORK SERVICE", "root"]

  - name: "Process creation before process termination"
    before:
      format: windows_event_security
      condition:
        EventID: 4688
    after:
      format: windows_event_security
      condition:
        EventID: 4689
    match_fields:
      before: NewProcessId
      after: ProcessId
    extra_match: Computer

  - name: "eCAR process create before process terminate"
    before:
      format: ecar
      condition:
        object: PROCESS
        action: CREATE
    after:
      format: ecar
      condition:
        object: PROCESS
        action: TERMINATE
    match_fields:
      before: pid
      after: pid
    extra_match: hostname

  - name: "Sysmon process create before process terminate"
    before:
      format: windows_event_sysmon
      condition:
        EventID: 1
    after:
      format: windows_event_sysmon
      condition:
        EventID: 5
    match_fields:
      before: ProcessGuid
      after: ProcessGuid
    extra_match: Computer

  - name: "SSH accept before bash commands"
    before:
      format: syslog
      message_contains: "Accepted"
    after:
      format: bash_history
      condition: {}
    match_fields:
      before: hostname
      after: hostname
